<script>
// ==========================================
// 🛡️ UNIVERSAL FILTER & SORTER ENGINE (DRY)
// ==========================================
window.universalFilterAndSort = function(data, config) {
    let result = [...data];
    if (config.searchQuery && config.searchFields) {
        const q = config.searchQuery.toLowerCase();
        if (q) {
            result = result.filter(item => {
                return config.searchFields.some(field => {
                    let val = item[field];
                    if (Array.isArray(val)) return val.join(' ').toLowerCase().includes(q);
                    return (val || '').toString().toLowerCase().includes(q);
                });
            });
        }
    }

    if (config.multiFilters) {
        Object.keys(config.multiFilters).forEach(key => {
            let activeFilters = config.multiFilters[key];
            if (activeFilters && activeFilters.length > 0) {
                result = result.filter(item => {
                    let val = item[key];
                    if (val === undefined || val === null || val === '') {
                        if (['accountManager', 'clientType', 'assignee', 'manager'].includes(key)) val = 'Not Set';
                    }
                    if (Array.isArray(val)) return val.some(v => activeFilters.includes(v));
                    return activeFilters.includes(val);
                });
            }
        });
    }

    if (config.customFilter) {
        result = result.filter(config.customFilter);
    }

    if (config.sortCol) {
        result.sort((a, b) => {
            let vA = a[config.sortCol];
            let vB = b[config.sortCol];

            if (config.sortType === 'currency') {
                vA = window.parseCurrency(vA);
                vB = window.parseCurrency(vB);
            } else if (config.sortType === 'date') {
                vA = vA || 0;
                vB = vB || 0;
            } else if (config.sortType === 'health') {
                if (vA === "N/A" && vB === "N/A") return 0;
                if (vA === "N/A") return 1;
                if (vB === "N/A") return -1;
            }

            if (config.sortType === 'date' && config.sortCol === 'releaseDateVal') {
                if (vA === 0 && vB !== 0) return 1;
                if (vB === 0 && vA !== 0) return -1;
            }

            return vA < vB ? (config.sortAsc ? -1 : 1) : (vA > vB ? (config.sortAsc ? 1 : -1) : 0);
        });
    }
    return result;
};

// ==========================================
// 🛡️ UNIVERSAL UI BUILDERS & EXPORTERS (DRY)
// ==========================================
window.universalRenderNotes = function(notesArray, containerId) {
    const nList = document.getElementById(containerId);
    if (!nList) return;

    if (!notesArray || notesArray.length === 0) {
        nList.innerHTML = `<div class="text-center text-sm text-muted-foreground mt-6">No logs available.</div>`;
        return;
    }

    nList.innerHTML = notesArray.map(n => {
        let nDate = window.sanitizeHTML(n.date);
        let nUser = window.sanitizeHTML(n.user);
        let nText = window.sanitizeHTML(n.text);
        return `<div class="p-5 bg-card border border-border rounded-xl shadow-sm border-l-4 border-l-primary flex flex-col gap-2.5"><p class="text-sm font-medium text-foreground leading-relaxed whitespace-pre-wrap">${nText}</p><div class="flex items-center gap-2 text-[10px] font-semibold text-muted-foreground pt-2 border-t border-border/50"><span>${nUser}</span><span class="w-1 h-1 rounded-full bg-border"></span><span>${nDate}</span></div></div>`;
    }).join('');
};

window.universalExportCSV = function(filenamePrefix, headers, data, rowMapperFunc) {
    if (!data || data.length === 0) {
        if(typeof window.showSyncToast === 'function') window.showSyncToast("No data to export", false, true);
        else alert("No data to export.");
        return;
    }

    let csvContent = headers.join(',') + "\n";
    data.forEach(item => {
        csvContent += rowMapperFunc(item) + "\n";
    });

    const blob = new Blob([csvContent], { type: 'text/csv;charset=utf-8;' });
    const link = document.createElement("a");
    const url = URL.createObjectURL(blob);
    link.setAttribute("href", url);
    let dateStr = new Date().toISOString().split('T')[0];
    link.setAttribute("download", `${filenamePrefix}_Export_${dateStr}.csv`);
    document.body.appendChild(link);
    link.click();
    document.body.removeChild(link);
};

// ==========================================
// 🛡️ BASE UTILITIES
// ==========================================
window.generateId = function(prefix) {
    const timestamp = Date.now().toString(36);
    const random = Math.random().toString(36).substring(2, 7);
    return `${prefix}-${timestamp}-${random}`.toUpperCase();
};

window.debounce = function(func, wait) {
    let timeout;
    return function executedFunction(...args) {
        const later = () => {
            clearTimeout(timeout);
            func(...args);
        };
        clearTimeout(timeout);
        timeout = setTimeout(later, wait);
    };
};

window.sanitizeHTML = function(str) {
    if (typeof str !== 'string' || !str) return str || '';
    if (typeof DOMPurify !== 'undefined') {
        return DOMPurify.sanitize(str);
    }
    const temp = document.createElement('div');
    temp.textContent = str;
    return temp.innerHTML;
};

window.validateForm = function(errorElId, conditions) {
    const errEl = document.getElementById(errorElId);
    for (let c of conditions) {
        if (c.isInvalid) {
            if (errEl) { errEl.innerText = c.message; errEl.classList.remove('hidden'); }
            return false;
        }
    }
    if (errEl) errEl.classList.add('hidden');
    return true;
};

window.safeSet = function(id, prop, val) {
    const el = document.getElementById(id);
    if(el) el[prop] = val;
};

window.safeClassRemove = function(id, cls) {
    const el = document.getElementById(id);
    if(el) el.classList.remove(cls);
};

window.safeClassAdd = function(id, cls) {
    const el = document.getElementById(id);
    if(el) el.classList.add(cls);
};

window.parseCurrency = function(val) {
    if (!val) return 0;
    if (typeof val === 'number') return val;
    return parseFloat(val.toString().replace(/[^0-9.-]+/g, "")) || 0;
};

window.formatCurrency = function(val) {
    return new Intl.NumberFormat('en-US', { style: 'currency', currency: 'USD' }).format(val || 0);
};

window.formatCurrencyInput = function(input) {
    let val = input.value.replace(/[^0-9]/g, '');
    if (val === '') {
        input.value = '';
        return;
    }
    let num = parseInt(val, 10) / 100;
    input.value = num.toLocaleString('en-US', {minimumFractionDigits: 2, maximumFractionDigits: 2});
};

// ==========================================
// 🛡️ DYNAMIC DRAWER Z-INDEX OBSERVER
// ==========================================
document.addEventListener('DOMContentLoaded', () => {
    const drawerMap = {
        'clientDrawer': 'drawerOverlay',
        'projectDrawer': 'projectDrawerOverlay',
        'serviceDrawer': 'serviceDrawerOverlay',
        'dashDrilldownDrawer': 'dashDrilldownOverlay'
    };

    const drawerObserver = new MutationObserver((mutations) => {
        mutations.forEach(m => {
            if (m.attributeName === 'class') {
                const el = m.target;
                if (!el.classList.contains('translate-x-full')) {
                    if (!el.style.zIndex) {
                        const rootStyles = getComputedStyle(document.documentElement);
                        let highestZ = parseInt(rootStyles.getPropertyValue('--z-drawer')) || 110;
                       
                        Object.keys(drawerMap).forEach(id => {
                            const d = document.getElementById(id);
                            if (d && d !== el && !d.classList.contains('translate-x-full')) {
                                let z = parseInt(window.getComputedStyle(d).zIndex);
                                if (!isNaN(z) && z >= highestZ) highestZ = z + 10;
                            }
                        });
                        el.style.zIndex = highestZ.toString();
                        const overlay = document.getElementById(drawerMap[el.id]);
                        if (overlay) overlay.style.zIndex = (highestZ - 1).toString();
                    }
                } else {
                    el.style.removeProperty('z-index');
                    const overlay = document.getElementById(drawerMap[el.id]);
                    if (overlay) overlay.style.removeProperty('z-index');
                }
            }
        });
    });

    Object.keys(drawerMap).forEach(id => {
        const el = document.getElementById(id);
        if (el) drawerObserver.observe(el, { attributes: true });
    });
});

window.toggleParkingLot = function() {
    const p = document.getElementById('parkingLot');
    if (p) p.classList.toggle('translate-x-full');
};

window.switchPage = function(pageId) {
    const pages = ['page-dashboard', 'page-health', 'page-tracker', 'page-services', 'page-settings'];
    pages.forEach(p => {
        const el = document.getElementById(p);
        if (el) { el.classList.add('hidden'); el.classList.remove('flex'); }
    });
    
    const navs = ['nav-dashboard', 'nav-health', 'nav-tracker', 'nav-services', 'nav-settings'];
    navs.forEach(n => {
        const el = document.getElementById(n);
        if (el) {
            el.setAttribute('data-active', 'false');
        }
    });
    
    const pEl = document.getElementById('page-' + pageId);
    if (pEl) {
        pEl.classList.remove('hidden');

        let headerBar = document.getElementById('global-header-bar');
        if (headerBar) {
            if (pageId === 'settings') {
                headerBar.style.display = 'none';
            } else {
                headerBar.style.display = '';
            }
        }
        pEl.classList.add('flex');
       
        pEl.style.opacity = '0';
        pEl.style.animation = 'none';
        void pEl.offsetHeight; 
        
        pEl.style.opacity = '';
        pEl.style.animation = 'fadeIn 0.25s ease-out forwards';
    }
   
    const nEl = document.getElementById('nav-' + pageId);
    if (nEl) {
        nEl.setAttribute('data-active', 'true');
    }
   
    const sb = document.getElementById('mobile-sidebar');
    if (sb) sb.classList.add('-translate-x-full');
};

window.closeAllDrawers = function() {
    if(typeof window.closeClientDrawer === 'function') window.closeClientDrawer();
    if(typeof window.closeProjectDrawer === 'function') window.closeProjectDrawer();
    if(typeof window.closeDashDrilldown === 'function') window.closeDashDrilldown();
    if(typeof window.forceCloseServiceDrawer === 'function') window.forceCloseServiceDrawer();
};

window.closeDrawer = function(drawerId, overlayId) {
    const d = document.getElementById(drawerId);
    const o = document.getElementById(overlayId);
    if(d) d.classList.add('translate-x-full');
    if(o) { o.classList.add('opacity-0'); setTimeout(() => o.classList.add('hidden'), 300); }
};

window.closeClientDrawer = () => { window.cancelInlineName('client'); window.closeDrawer('clientDrawer', 'drawerOverlay'); window.AvesdoState.ui.activeClient = null; };
window.closeProjectDrawer = () => { window.cancelInlineName('project'); window.closeDrawer('projectDrawer', 'projectDrawerOverlay'); window.AvesdoState.ui.activeProjectId = null; };
window.closeDashDrilldown = () => window.closeDrawer('dashDrilldownDrawer', 'dashDrilldownOverlay');
window.forceCloseServiceDrawer = () => { window.closeDrawer('serviceDrawer', 'serviceDrawerOverlay'); window.AvesdoState.ui.activeServiceId = null; window.isServiceModalDirty = false; window.closePopups(); };

    const overlay = document.getElementById('modalOverlay');

    let highestZ = parseInt(rootStyles.getPropertyValue('--z-modal')) || 210;
    document.querySelectorAll('[id^="modal-"]:not(.hidden)').forEach(m => {
        let currentZ = parseInt(window.getComputedStyle(m).zIndex);

        }
       
        const mSel = document.getElementById('ac-pop-mgr');
        if(mSel && typeof pt_managers !== 'undefined') {

        }
       
        window.safeSet('ac-type-text', 'innerText', 'Select Type');
        if(document.getElementById('ac-type-text')) document.getElementById('ac-type-text').dataset.val = '';
       
        window.safeSet('ac-mgr-text', 'innerText', 'Select Account Manager');
        if(document.getElementById('ac-mgr-text')) document.getElementById('ac-mgr-text').dataset.val = '';
       
        const pMod = document.getElementById('modal-add-project');
        if(pMod && !pMod.classList.contains('hidden')) { pMod.classList.add('blur-sm', 'brightness-75', 'pointer-events-none'); }
    }

    if (id === 'modal-add-project') {

        if(errEl) errEl.classList.add('hidden');
       
        window.safeSet('ap-name', 'value', '');
        window.safeSet('ap-date-text', 'value', 'Select date...');
        window.safeSet('ap-units', 'value', '');
        window.safeSet('ap-notes', 'value', '');
        window.safeSet('ap-checklist', 'value', '');
        window.safeSet('ap-kyc', 'value', '');
        const mSel = document.getElementById('ap-pop-mgr');
        if(mSel && typeof pt_managers !== 'undefined') {
            mSel.innerHTML = pt_managers.map(mgr => `<div class="radix-item" onclick="if(typeof window.setApMgr==='function') window.setApMgr('${mgr}')">${window.sanitizeHTML(mgr)}</div>`).join('') + `<div class="radix-item text-muted-foreground border-t border-border mt-1 pt-1" onclick="if(typeof window.setApMgr==='function') window.setApMgr('')">Clear Selection</div>`;
        }
       
        const apMgrText = document.getElementById('ap-mgr-text');
        if (apMgrText) {
        apMgrText.innerText = 'Select Account Manager';
        apMgrText.setAttribute('data-val', '');
    }
       
        if(typeof window.renderModalClientList === 'function') window.renderModalClientList();
        if (capturedClient) {

    if (overlay) {
        overlay.classList.remove('hidden');
        setTimeout(() => overlay.classList.remove('opacity-0'), 10);

window.closeModal = function(id) {
    const modal = document.getElementById(id);
    const overlay = document.getElementById('modalOverlay');
    if (modal) { modal.style.removeProperty('z-index'); modal.classList.add('hidden'); modal.classList.remove('flex'); }
    if (overlay) {
        const openModals = document.querySelectorAll('[id^="modal-"]:not(.hidden)');
        if (openModals.length === 0) { overlay.classList.add('opacity-0'); setTimeout(() => { overlay.style.removeProperty('z-index'); overlay.classList.add('hidden'); }, 300); }
    }
    const pMod = document.getElementById('modal-add-project');
    if(pMod && id === 'modal-add-client') pMod.classList.remove('blur-sm', 'brightness-75', 'pointer-events-none');
};

window.closeAllModals = function() {
    document.querySelectorAll('[id^="modal-"]').forEach(m => { m.style.removeProperty('z-index'); m.classList.add('hidden'); m.classList.remove('flex'); });
    const overlay = document.getElementById('modalOverlay');
    if (overlay) { overlay.classList.add('opacity-0'); setTimeout(() => { overlay.style.removeProperty('z-index'); overlay.classList.add('hidden'); }, 300); }
    const pMod = document.getElementById('modal-add-project');
    if(pMod) pMod.classList.remove('blur-sm', 'brightness-75', 'pointer-events-none');
};

                <span class="text-sm font-medium text-foreground truncate">${window.sanitizeHTML(c.name)}</span>

        ).join('');
    }
};

window.setAsClient = function(id, name) {
    window.safeSet('as-client-text', 'innerText', name);
    const act = document.getElementById('as-client-text');
    if(act) act.dataset.val = id;
    const pTrig = document.getElementById('as-project-trigger'); if(pTrig) pTrig.disabled = false;
    window.safeSet('as-project-text', 'innerText', 'Select Project');
    const apt = document.getElementById('as-project-text');
    if(apt) apt.dataset.val = '';
    if (typeof window.AvesdoState.data.projects !== 'undefined') {
        const clientProjs = window.AvesdoState.data.projects.filter(p => (p.clientIds || []).includes(id));
        const pList = document.getElementById('as-project-list');
        if(pList) {
            pList.innerHTML = `<div class="radix-item text-muted-foreground" onclick="window.setAsProject('', 'None')">None (Client Level)</div>` + clientProjs.map(p => `<div class="radix-item" onclick="window.setAsProject('${p.id}', '${window.sanitizeHTML(p.name).replace(/'/g, "\\'")}')">${window.sanitizeHTML(p.name)}</div>`).join('');
        }
    }
    window.closePopups();
};

window.setAsProject = function(id, name) {
    window.safeSet('as-project-text', 'innerText', name);
    const apt = document.getElementById('as-project-text'); if(apt) apt.dataset.val = id;
    window.closePopups();
};

window.openAddServiceForClient = function(context) {
    window.openModal('modal-add-service');
    if(typeof window.AvesdoState.ui.activeClient !== 'undefined' && window.AvesdoState.ui.activeClient) {
        window.setAsClient(window.AvesdoState.ui.activeClient.clientId, window.AvesdoState.ui.activeClient.companyName);
        window.setAsProject('', 'None');
    }
};

window.openAddServiceForProject = function(context) {
    window.openModal('modal-add-service');
    if(typeof window.AvesdoState.ui.activeProjectId !== 'undefined' && window.AvesdoState.ui.activeProjectId && typeof window.AvesdoState.data.projects !== 'undefined') {
        let p = window.AvesdoState.data.projects.find(x => x.id === window.AvesdoState.ui.activeProjectId);
        if(p) {
            window.setAsProject(p.id, p.name);
            const cList = document.getElementById('as-client-list');
            if (p.clientIds && p.clientIds.length > 0) {
                if (p.clientIds.length === 1) {

window.togglePop = function(e, id) {
    if(e) { e.preventDefault(); e.stopPropagation(); }
    const pop = document.getElementById(id);
    if(!pop) return;
    const isAct = pop.classList.contains('active');
   
    window.closePopups();
    if(!isAct) {
        pop.classList.remove('up-align', 'right-align');
        pop.classList.add('active');
        const parentRel = pop.closest('.relative') || pop.closest('td') || pop.closest('th');
        if (parentRel) { 
            parentRel.classList.add('popover-elevated-parent'); 
            
            // Elevate ancestor stacking contexts so popover is never overlapped
            let curr = parentRel.parentElement;
            while (curr && curr !== document.body) {
                const style = window.getComputedStyle(curr);
                if (style.position === 'relative' || style.position === 'absolute' || style.position === 'sticky' || curr.className.includes('z-')) {
                    curr.classList.add('popover-elevated-ancestor');
                }
                curr = curr.parentElement;
            }
        }
       
        const rect = pop.getBoundingClientRect();
        
        // Find scroll parent helper
        const getScrollParent = function(node) {
            if (!node || node === document.body) return null;
            if (node.scrollHeight > node.clientHeight) {
                const overflowY = window.getComputedStyle(node).overflowY;
                if (overflowY === 'auto' || overflowY === 'scroll') {
                    return node;
                }
            }
            return getScrollParent(node.parentNode);
        };

        const scrollParent = parentRel ? getScrollParent(parentRel) : null;
        const parentRect = parentRel ? parentRel.getBoundingClientRect() : null;
        
        let spaceBelow = window.innerHeight - (parentRect ? parentRect.bottom : rect.top);
        let spaceAbove = parentRect ? parentRect.top : rect.top;
        
        if (scrollParent && parentRect) {
            const scrollRect = scrollParent.getBoundingClientRect();
            spaceBelow = Math.min(spaceBelow, scrollRect.bottom - parentRect.bottom);
            spaceAbove = Math.min(spaceAbove, parentRect.top - scrollRect.top);
        }
        
        // Popover height threshold (approx 330px to clear calendar/dropdown)
        const popoverHeight = rect.height || 330;
        
        if (!pop.dataset.noup && (spaceBelow < popoverHeight && spaceAbove > spaceBelow)) {
            pop.classList.add('up-align');
        }
        if (rect.right > (window.innerWidth || document.documentElement.clientWidth)) {
            pop.classList.add('right-align');
        }
        const input = pop.querySelector('input[type="text"]');
        if(input) { setTimeout(() => { input.focus(); }, 50); }
    }
};

window.openPop = window.togglePop;

window.closePopups = function() {
    document.querySelectorAll('.radix-popover.active').forEach(p => {
        p.classList.remove('active');
        p.classList.remove('up-align', 'right-align');
    });
    document.querySelectorAll('.popover-elevated-parent').forEach(el => { el.classList.remove('popover-elevated-parent'); });
    document.querySelectorAll('.popover-elevated-ancestor').forEach(el => { el.classList.remove('popover-elevated-ancestor'); });
};

window.toggleNestedPop = function(e, id) {
    if (e) { e.preventDefault(); e.stopPropagation(); }
    const targetPop = document.getElementById(id); if (!targetPop) return;

    const parentContainer = targetPop.closest('.radix-popover') || document.body;
    parentContainer.querySelectorAll('.radix-popover.active').forEach(p => {
        if (p !== targetPop && p.id !== parentContainer.id) {
            p.classList.remove('active', 'up-align', 'right-align');
            p.style.display = ''; 
        }
    });

    const isAct = targetPop.classList.contains('active');
    if (!isAct) {
        targetPop.classList.remove('up-align', 'right-align');
        targetPop.classList.add('active');
        targetPop.style.display = ''; 
       
        const rect = targetPop.getBoundingClientRect();
        if (!targetPop.dataset.noup && rect.bottom > (window.innerHeight || document.documentElement.clientHeight)) {
            targetPop.classList.add('up-align');
        }
        if (rect.right > (window.innerWidth || document.documentElement.clientWidth)) {
            targetPop.classList.add('right-align');
        }
    } else {
        targetPop.classList.remove('active');
    }
};

                            let idx = p.clientIds.indexOf(window.AvesdoState.ui.activeClient.clientId);
                            if (idx > -1) p.clients[idx] = newName;
                        }
                    });
                }
              
                if(typeof window.AvesdoState.data.services !== 'undefined') {
                    window.AvesdoState.data.services.forEach(s => {
                        if (s.clientId === window.AvesdoState.ui.activeClient.clientId) s.clientName = newName;
                    });
                }
               
                if(typeof window.renderClientNotes === 'function') window.renderClientNotes(window.AvesdoState.ui.activeClient);

        }
    } else {
        if(typeof window.AvesdoState.ui.activeProjectId !== 'undefined' && window.AvesdoState.ui.activeProjectId) {
            let p = window.AvesdoState.data.projects.find(x => x.id === window.AvesdoState.ui.activeProjectId);

                            if (s.projectId === p.id) s.projectName = newName;
                        });
                    }
                   
                    if(typeof window.renderProjectNotes === 'function') window.renderProjectNotes(p);
                }
            }
        }

window.addAutoLog = function(type, id, msg) {
    const d = new Date().toLocaleDateString('en-US', {month: 'short', day: 'numeric', year: 'numeric', hour: 'numeric', minute: '2-digit'});
    const entry = { date: d, user: window.currentUser || "System", text: msg };

    if (type === 'project') {
        let p = window.AvesdoState.data.projects.find(x => x.id === id);
        if (p) {
            p.notes = p.notes || [];
            p.notes.unshift(entry);
            if (window.AvesdoState.ui.activeProjectId === id && document.getElementById('projectDrawer') && !document.getElementById('projectDrawer').classList.contains('translate-x-full')) {
                if(typeof window.renderProjectNotes === 'function') window.renderProjectNotes(p);
            }
        }
    }
    else if (type === 'client') {
        let c = window.AvesdoState.data.clients.find(x => x.clientId === id || x.companyName === id);
        if (c) {
            c.notes = c.notes || [];
            c.notes.unshift(entry);
            if (window.AvesdoState.ui.activeClient && window.AvesdoState.ui.activeClient.clientId === c.clientId && document.getElementById('clientDrawer') && !document.getElementById('clientDrawer').classList.contains('translate-x-full')) {
                if(typeof window.renderClientNotes === 'function') window.renderClientNotes(c);
            }
        }
    }
    else if (type === 'service') {
        let s = window.AvesdoState.data.services.find(x => x.id === id);
        if (s) {
            s.notes = s.notes || [];
            s.notes.unshift(entry);
        }
    }
};

        if(container) {

        if (!entityId) return;

             })
            .getHealthHistory(entityId);

    } catch (err) {
        console.error("updateTrendChart Error:", err);
        window.drawTrendChart(context, [], timeframe);
    }
};

window.drawTrendChart = window.drawTrendChart || function(context, history, timeframe) {
    var canvasId = context === 'cd' ? 'cd-trendChart' : 'pd-trendChart';
    var skeletonId = context === 'cd' ? 'cd-trend-skeleton' : 'pd-trend-skeleton';
    var canvas = document.getElementById(canvasId);
    var skeleton = document.getElementById(skeletonId);
    var tbody = document.getElementById(context === 'cd' ? 'cd-trend-list' : 'pd-trend-list');

    try {
        if (skeleton) skeleton.classList.add('hidden');
        if (canvas) canvas.classList.remove('hidden');

        var rawHistory = Array.isArray(history) ? history.slice() : [];
        var now = new Date().getTime();
           
        if (timeframe !== 'all') {
            var ms = timeframe * 24 * 60 * 60 * 1000;
            rawHistory = rawHistory.filter(function(h) { return (now - h.timeVal) <= ms; });
        }
       
        let dailyMap = {};
        let dailyKeys = [];
       
        rawHistory.forEach(h => {
            if (!h || !h.timeVal) return;
             let dStr = new Date(h.timeVal).toLocaleDateString('en-US');
            if (!dailyMap[dStr]) dailyKeys.push(dStr);
            dailyMap[dStr] = h;
        });
       
        let dailyHistory = dailyKeys.map(k => dailyMap[k]);
        let filteredHistory = [];
        let lastScore = null;
       
        dailyHistory.forEach((h, i) => {
             if (i === 0) {
                filteredHistory.push(h);
                lastScore = h.score;
                return;
            }
             if (h.score !== lastScore) {
                filteredHistory.push(h);
                lastScore = h.score;
            } else if (i === dailyHistory.length - 1) {
                filteredHistory.push(h);
            }
        });

        if (tbody) {
            if (filteredHistory.length === 0) {
                tbody.innerHTML = "<tr><td colspan=\"3\" class=\"px-4 py-8 text-center text-sm text-muted-foreground\">No historical data available for this timeframe.</td></tr>";
            } else {
                tbody.innerHTML = filteredHistory.slice().reverse().map(function(h, i, arr) {
                    var prevScore = i < arr.length - 1 ? arr[i+1].score : h.score;
                    var diff = h.score - prevScore;
                    var diffHtml = diff > 0 ? "<span class=\"text-emerald-600 font-bold\">+" + diff + "</span>" : (diff < 0 ? "<span class=\"text-red-600 font-bold\">" + diff + "</span>" : "<span class=\"text-muted-foreground\">-</span>");

                    var bgTint = diff > 0 ? "trend-up-row" : (diff < 0 ? "trend-down-row" : "");
                    var displayDate = new Date(h.timeVal).toLocaleDateString('en-US', {month: 'short', day: 'numeric', year: 'numeric'});

                    return "<tr class=\"transition-colors border-b border-border last:border-0 " + bgTint + "\"><td class=\"px-4 py-3 text-sm font-medium\">" + displayDate + "</td><td class=\"px-4 py-3 text-sm text-right font-bold\">" + h.score + "</td><td class=\"px-4 py-3 text-sm text-right\">" + diffHtml + "</td></tr>";
                }).join('');
            }
        }
           
        if (!canvas) return;
        var ctx = canvas.getContext('2d');
           
        if (window.trendChartInstances && window.trendChartInstances[canvasId]) {
             window.trendChartInstances[canvasId].destroy();
            window.trendChartInstances[canvasId] = null;
        }
           
        if (filteredHistory.length === 0) return;
       
        if (typeof Chart === 'undefined') {
            console.error("Chart.js is not loaded.");
            return;
        }

        window.trendChartInstances[canvasId] = new Chart(ctx, {
            type: 'line',
            data: {
                labels: filteredHistory.map(function(h) { return new Date(h.timeVal).toLocaleDateString('en-US', {month: 'short', day: 'numeric'}); }),
                datasets: [{
                    label: 'Health Score',
                    data: filteredHistory.map(function(h) { return h.score; }),
                    borderColor: '#00bdd9',
                    backgroundColor: '#00bdd91a',
                    borderWidth: 2,
                    pointBackgroundColor: '#00bdd9',
                    pointBorderColor: '#fff',
                    pointBorderWidth: 2,
                    pointRadius: 4,
                    fill: true,
                    tension: 0.3
                }]
            },
            options: {
                responsive: true,
                maintainAspectRatio: false,
                animation: { duration: 0 },
                scales: {
                    y: { min: 0, max: 100, grid: { color: 'hsla(214.3, 31.8%, 91.4%, 0.5)' } },
                    x: { grid: { display: false } }
                },
                plugins: {
                    legend: { display: false },
                    tooltip: { backgroundColor: 'hsl(222.2, 47.4%, 11.2%)', titleColor: '#fff', bodyColor: '#fff', padding: 10, cornerRadius: 4, displayColors: false }
                },
                interaction: { intersect: false, mode: 'index' }
            }
        });

    } catch (err) {
        console.error("drawTrendChart Error:", err);
        if (skeleton) skeleton.classList.add('hidden');
    }
};

window.renderInlineCalendar = function(id) {
  const container = document.getElementById(`inline-cal-${id}`); if(!container) return; 
  let state = window.AvesdoState.ui.rowCalState[id]; const today = new Date();
  const monthNames = ["January", "February", "March", "April", "May", "June", "July", "August", "September", "October", "November", "December"];
  const firstDay = new Date(state.viewYear, state.viewMonth, 1).getDay(); const daysInMonth = new Date(state.viewYear, state.viewMonth + 1, 0).getDate();
  let html = `<div class="flex items-center justify-between mb-2 px-1"><div class="text-sm font-semibold text-foreground">${monthNames[state.viewMonth]}, ${state.viewYear}</div><div class="flex gap-1"><button type="button" class="p-1 hover:bg-accent rounded text-muted-foreground transition-colors radix-trigger" onclick="window.changeRowCalMonth('${id}', -1);"><i data-lucide="chevron-left" class="w-4 h-4"></i></button><button type="button" class="p-1 hover:bg-accent rounded text-muted-foreground transition-colors radix-trigger" onclick="window.changeRowCalMonth('${id}', 1);"><i data-lucide="chevron-right" class="w-4 h-4"></i></button></div></div><div class="w-[240px] mx-auto"><div class="grid grid-cols-7 gap-1 text-center text-[10px] font-semibold text-muted-foreground mb-1"><div>Su</div><div>Mo</div><div>Tu</div><div>We</div><div>Th</div><div>Fr</div><div>Sa</div></div><div class="grid grid-cols-7 gap-y-1 gap-x-1 text-center font-medium text-xs">`;
  let totalRendered = 0;
  for (let i = 0; i < firstDay; i++) { html += `<div class="h-7"></div>`; totalRendered++; }
  for (let day = 1; day <= daysInMonth; day++) {
      const dateVal = `${state.viewYear}-${String(state.viewMonth+1).padStart(2,'0')}-${String(day).padStart(2,'0')}`;
      let isSelected = state.selected === dateVal; let isToday = (day === today.getDate() && state.viewMonth === today.getMonth() && state.viewYear === today.getFullYear());
      let cellClass = "flex items-center justify-center h-7 rounded-md cursor-pointer transition-colors ";
      if (isSelected) cellClass += " bg-primary text-primary-foreground shadow-sm";
      else if (isToday) cellClass += " border border-primary text-primary bg-background"; 
      else cellClass += " hover:bg-accent text-foreground bg-background";
      html += `<div class="${cellClass} radix-trigger" onclick="window.selectRowDate('${id}', '${dateVal}');"><span class="pointer-events-none">${day}</span></div>`; totalRendered++;
  }
  for (let i = totalRendered; i < 42; i++) { html += `<div class="h-7"></div>`; }
  let todayVal = `${today.getFullYear()}-${String(today.getMonth()+1).padStart(2,'0')}-${String(today.getDate()).padStart(2,'0')}`;
  html += `</div><div class="mt-1.5 pt-1.5 border-t border-border"><button type="button" class="w-full inline-flex items-center justify-center rounded-md text-xs font-medium transition-all border border-input bg-background hover:bg-accent hover:text-accent-foreground h-8 px-3 radix-trigger shadow-sm" onclick="window.selectRowDate('${id}', '${todayVal}');">Select Today</button></div></div>`;
  container.innerHTML = html;
  if(typeof lucide !== 'undefined' && lucide.createIcons) lucide.createIcons();
};

window.changeRowCalMonth = function(id, step) { 
    window.AvesdoState.ui.rowCalState[id].viewMonth += step; 
    if(window.AvesdoState.ui.rowCalState[id].viewMonth < 0) { window.AvesdoState.ui.rowCalState[id].viewMonth = 11; window.AvesdoState.ui.rowCalState[id].viewYear--; } 
    if(window.AvesdoState.ui.rowCalState[id].viewMonth > 11) { window.AvesdoState.ui.rowCalState[id].viewMonth = 0; window.AvesdoState.ui.rowCalState[id].viewYear++; } 
    window.renderInlineCalendar(id);
};

window.selectRowDate = function(id, val) {
    if (id === 'sd' || id === 'sd-comm') {
        window.handleManualDateEntry(id, val);
        window.closePopups();
    } else if (id === 'ap') { 
        const inputEl = document.getElementById('ap-date-text');
        if(inputEl) inputEl.value = val; 
        const textInput = document.getElementById('date-text-ap');
        if(textInput) textInput.value = val;
        window.AvesdoState.ui.rowCalState['ap'].selected = val; window.renderInlineCalendar('ap'); 
        if (val) {
            let parts = val.split('-'); let d = new Date(parts[0], parts[1]-1, parts[2]);
            window.safeSet('ap-date-text', 'innerText', d.toLocaleDateString('en-US', {month: 'short', day: 'numeric', year: 'numeric'}));
        } else {
            window.safeSet('ap-date-text', 'innerText', 'Select Date...');
        }
        window.closePopups();
    } else if (id === 'pd') { 
        const inputEl = document.getElementById('date-text-pd');
        if(inputEl) inputEl.value = val; 
        window.handleManualDateEntry('pd', val);
        window.closePopups();
    } else { 
        if (typeof window.updateProjectDateData === 'function') window.updateProjectDateData(id, val); 
        window.AvesdoState.ui.rowCalState[id].selected = val; window.renderInlineCalendar(id);
        window.closePopups();
    }
};

window.handleManualDateEntry = function(id, val) {
    const isValid = /^\d{4}-\d{2}-\d{2}$/.test(val);
    let parts = val && isValid ? val.split('-') : null;

    if (id === 'sd' || id === 'sd-comm') {
        if (val && isValid) {
            window.AvesdoState.ui.rowCalState[id] = { viewYear: parseInt(parts[0], 10), viewMonth: parseInt(parts[1], 10) - 1, selected: val };
        } else {
            window.AvesdoState.ui.rowCalState[id].selected = "";
        }
        window.renderInlineCalendar(id);
        let dStr = "No Date";
        if (val && isValid) {
            let d = new Date(parts[0], parts[1]-1, parts[2]);
            dStr = d.toLocaleDateString('en-US', {month: 'short', day: '2-digit', year: 'numeric'});
        }
        if(id === 'sd') {
            window.safeSet('sd-trig-date-text', 'innerText', dStr);
            if (typeof window.updateServiceField === 'function') window.updateServiceField('dateInput', val);
        }
        if(id === 'sd-comm') {
            window.safeSet('sd-trig-comm-date-text', 'innerText', dStr);
            if (typeof window.updateServiceField === 'function') window.updateServiceField('datePaidInput', val);
        }
        const textInput = document.getElementById(`date-text-${id}`);
        if(textInput && textInput.value !== val) textInput.value = val || "";

    } else if(id === 'ap') {
        if (val && isValid) { 
             window.AvesdoState.ui.rowCalState['ap'] = { viewYear: parseInt(parts[0], 10), viewMonth: parseInt(parts[1], 10) - 1, selected: val };
            let d = new Date(parts[0], parts[1]-1, parts[2]);
            window.safeSet('ap-date-text', 'innerText', d.toLocaleDateString('en-US', {month: 'short', day: 'numeric', year: 'numeric'}));
        } else {
            window.AvesdoState.ui.rowCalState['ap'].selected = "";
            window.safeSet('ap-date-text', 'innerText', 'Select date...');
        }
        window.renderInlineCalendar('ap'); 
    } else if(id === 'pd') {
        if(!window.AvesdoState.ui.activeProjectId) return; 
        if (typeof window.updateProjectDateData === 'function') window.updateProjectDateData(window.AvesdoState.ui.activeProjectId, val);
        if (val && isValid) { 
            window.AvesdoState.ui.rowCalState['pd'] = { viewYear: parseInt(parts[0], 10), viewMonth: parseInt(parts[1], 10) - 1, selected: val };
        }
        window.renderInlineCalendar('pd'); 
    } else {
        if (typeof window.updateProjectDateData === 'function') window.updateProjectDateData(id, val);
        if (val && isValid) { 
            window.AvesdoState.ui.rowCalState[id] = { viewYear: parseInt(parts[0], 10), viewMonth: parseInt(parts[1], 10) - 1, selected: val }; 
        } else { 
            window.AvesdoState.ui.rowCalState[id].selected = "";
        } 
        window.renderInlineCalendar(id);
    }
};

window.clearProjectDate = function(id) { 
    if (id === 'sd' || id === 'sd-comm') {
        if (window.AvesdoState.ui.rowCalState[id]) window.AvesdoState.ui.rowCalState[id].selected = "";
        window.renderInlineCalendar(id);
        if(id === 'sd') {
            window.safeSet('sd-trig-date-text', 'innerText', 'No Date');
            if (typeof window.updateServiceField === 'function') window.updateServiceField('dateInput', '');
        }
        if(id === 'sd-comm') {

        }
        const el = document.getElementById(`date-text-${id}`);
        if(el) el.value = '';

    } else if (id === 'pd') {

        window.renderInlineCalendar('ap'); 
        const el = document.getElementById('date-text-ap'); if(el) el.value = '';

        if (window.AvesdoState.ui.rowCalState[id]) window.AvesdoState.ui.rowCalState[id].selected = ""; 
        window.renderInlineCalendar(id);
    }
};

let globalSearchDebounceTimeout = null;
window.globalSearchActiveIndex = -1;

window.handleGlobalSearch = function(query) {
    const pop = document.getElementById('globalSearchResultsPop');
    const clearBtn = document.getElementById('globalSearchClear');
    if (!pop) return;

    if (clearBtn) {
        if (query.trim().length > 0) clearBtn.classList.remove('hidden');
        else clearBtn.classList.add('hidden');
    }

    if (!query || query.trim().length < 2) {
        pop.innerHTML = '';
        pop.classList.add('hidden');
        pop.classList.remove('flex');
        window.globalSearchActiveIndex = -1;
        return;
    }

    clearTimeout(globalSearchDebounceTimeout);
    globalSearchDebounceTimeout = setTimeout(() => {
        const cleanQuery = query.toLowerCase().trim();
        window.globalSearchActiveIndex = -1; 
       
        let matchedClients = [];
        for (let i = 0; i < window.AvesdoState.data.clients.length; i++) {
            let c = window.AvesdoState.data.clients[i];
            if ((c.companyName || '').toLowerCase().includes(cleanQuery) || (c.accountManager || '').toLowerCase().includes(cleanQuery)) {
                matchedClients.push(c);
                if (matchedClients.length >= 4) break;
            }
        }

        let matchedProjects = [];
        for (let i = 0; i < window.AvesdoState.data.projects.length; i++) {
            let p = window.AvesdoState.data.projects[i];
            if ((p.name || '').toLowerCase().includes(cleanQuery) || (p.assignee || '').toLowerCase().includes(cleanQuery) || (p.clients || []).some(c => c.toLowerCase().includes(cleanQuery))) {
                matchedProjects.push(p);
                if (matchedProjects.length >= 4) break;
            }
        }

        let matchedServices = [];
        for (let i = 0; i < window.AvesdoState.data.services.length; i++) {
             let s = window.AvesdoState.data.services[i];
            if ((s.name || '').toLowerCase().includes(cleanQuery) || (s.clientName || '').toLowerCase().includes(cleanQuery) || (s.invoiceNum || '').toLowerCase().includes(cleanQuery)) {
                matchedServices.push(s);
                if (matchedServices.length >= 4) break;
            }
        }

        if (matchedClients.length + matchedProjects.length + matchedServices.length === 0) {
             pop.innerHTML = `<div class="text-center text-xs text-muted-foreground py-8 italic font-medium flex flex-col items-center justify-center gap-2"><i data-lucide="search-x" class="w-6 h-6 opacity-50"></i>No matches found for "${window.sanitizeHTML(query)}"</div>`;
            pop.classList.remove('hidden');
            pop.classList.add('flex');
            if (typeof lucide !== 'undefined' && lucide.createIcons) lucide.createIcons();
            return;
        }

        let html = '';

        if (matchedClients.length > 0) {
            html += `<div class="px-2 pt-2 pb-1.5 text-[10px] font-semibold text-muted-foreground border-b border-border/60 mb-1.5 flex items-center gap-1.5"><i data-lucide="building-2" class="w-3 h-3"></i> Clients</div>`;
            matchedClients.forEach(c => {
                let name = window.sanitizeHTML(c.companyName); let am = window.sanitizeHTML(c.accountManager || 'Unassigned'); let hProps = window.getHealthBadgeProps(c.healthScore);
                html += `<div onclick="window.triggerGlobalSearchJump('client', '${c.clientId}')" class="search-result-item flex justify-between items-center px-3 py-2.5 rounded-lg hover:bg-muted/80 transition-all cursor-pointer group"><div class="truncate pr-4"><div class="text-sm font-semibold text-foreground group-hover:text-primary transition-colors truncate">${name}</div><div class="text-[10.5px] text-muted-foreground mt-0.5 truncate">Manager: ${am}</div></div>${window.buildBadge(hProps, c.healthScore, 'px-2 py-0.5 text-[10px] font-bold shrink-0')}</div>`;
            });
        }

        if (matchedProjects.length > 0) {
            html += `<div class="px-2 pt-3 pb-1.5 text-[10px] font-semibold text-muted-foreground border-b border-border/60 my-1.5 flex items-center gap-1.5"><i data-lucide="box" class="w-3 h-3"></i> Projects</div>`;
            matchedProjects.forEach(p => {
                let name = window.sanitizeHTML(p.name); let clientDisplay = window.sanitizeHTML((p.clients || []).join(', ') || 'Internal'); let phase = window.sanitizeHTML(p.onboardingPhase || 'Not Started'); let phProps = window.getBadgeProps('phase', p.onboardingPhase);
                html += `<div onclick="window.triggerGlobalSearchJump('project', '${p.id}')" class="search-result-item flex justify-between items-center px-3 py-2.5 rounded-lg hover:bg-muted/80 transition-all cursor-pointer group"><div class="truncate pr-4"><div class="text-sm font-semibold text-foreground group-hover:text-primary transition-colors truncate">${name}</div><div class="text-[10.5px] text-muted-foreground mt-0.5 truncate">${clientDisplay}</div></div>${window.buildBadge(phProps, phase, 'px-2 py-0.5 text-[10px] font-semibold shrink-0')}</div>`;
            });
        }

        if (matchedServices.length > 0) {
            html += `<div class="px-2 pt-3 pb-1.5 text-[10px] font-semibold text-muted-foreground border-b border-border/60 my-1.5 flex items-center gap-1.5"><i data-lucide="briefcase" class="w-3 h-3"></i> Services & Billings</div>`;
            matchedServices.forEach(s => {
                let name = window.sanitizeHTML(s.name); let client = window.sanitizeHTML(s.clientName || 'No Client'); let inv = s.invoiceNum ? ` • Inv #${window.sanitizeHTML(s.invoiceNum)}` : ''; let price = "$" + window.parseCurrency(s.price).toLocaleString('en-US', {maximumFractionDigits:0});
                html += `<div onclick="window.triggerGlobalSearchJump('service', '${s.id}')" class="search-result-item flex justify-between items-center px-3 py-2.5 rounded-lg hover:bg-muted/80 transition-all cursor-pointer group"><div class="truncate pr-4"><div class="text-sm font-semibold text-foreground group-hover:text-primary transition-colors truncate">${name}</div><div class="text-[10.5px] text-muted-foreground mt-0.5 truncate">${client}${inv}</div></div><div class="text-xs font-bold text-foreground shrink-0 bg-white px-2 py-0.5 rounded-md border border-border shadow-sm">${price}</div></div>`;
            });
        }

        pop.innerHTML = html; pop.classList.remove('hidden'); pop.classList.add('flex');
        if (typeof lucide !== 'undefined' && lucide.createIcons) lucide.createIcons();
    }, 200);
};

window.clearGlobalSearch = function() {
    const input = document.getElementById('globalSearchInput');
    if (input) input.value = '';
    window.handleGlobalSearch('');
};

window.triggerGlobalSearchJump = function(type, id) {
    window.clearGlobalSearch();
    const input = document.getElementById('globalSearchInput');
    if (input) input.blur();
   
    if (typeof window.closeAllDrawers === 'function') window.closeAllDrawers();
    if (typeof window.closeAllModals === 'function') window.closeAllModals();
   
    const sb = document.getElementById('mobile-sidebar');
    if (sb) sb.classList.add('-translate-x-full');
   
    setTimeout(() => {
         if (type === 'client') {
            let clientObj = window.AvesdoState.data.clients.find(c => c.clientId === id);
            if (clientObj && typeof window.openDrawer === 'function') window.openDrawer(clientObj, 'health');
        } else if (type === 'project') {
            if (typeof window.openProjectDrawer === 'function') window.openProjectDrawer(id, 'details');
        } else if (type === 'service') {
            if (typeof window.openServiceDrawer === 'function') window.openServiceDrawer(id);
        }
    }, 300);
};

window.updateGlobalSearchHighlight = function() {
    const pop = document.getElementById('globalSearchResultsPop');
    if (!pop) return;
    const items = pop.querySelectorAll('.search-result-item');
    items.forEach((item, index) => {
        if (index === window.globalSearchActiveIndex) {
            item.classList.add('bg-accent', 'ring-1', 'ring-primary/50');
            item.scrollIntoView({ block: 'nearest', behavior: 'smooth' });
        } else {
            item.classList.remove('bg-accent', 'ring-1', 'ring-primary/50');
        }
    });
};

document.addEventListener('click', (e) => {
    const container = document.getElementById('global-search-container');
    const pop = document.getElementById('globalSearchResultsPop');
    if (container && !container.contains(e.target) && pop && !pop.classList.contains('hidden')) {
        window.clearGlobalSearch();
        const input = document.getElementById('globalSearchInput');
        if (input) input.blur();
    }
});

document.addEventListener('keydown', function(e) {
    if (e.key === 'Escape' || e.keyCode === 27) {
        // 1. Popovers
        const openPopups = document.querySelectorAll('.radix-popover.active');
        if (openPopups.length > 0) { window.closePopups(); return; }
         
        // 2. Global Search
        const pop = document.getElementById('globalSearchResultsPop');
        if (pop && !pop.classList.contains('hidden')) { window.clearGlobalSearch(); return; }

        // 3. Modals (Sort mathematically by Z-Index)
        const openModals = Array.from(document.querySelectorAll('[id^="modal-"]:not(.hidden)'));
        if (openModals.length > 0) {
            openModals.sort((a, b) => (parseInt(b.style.zIndex) || 0) - (parseInt(a.style.zIndex) || 0));
            window.closeModal(openModals[0].id);
            return;
        }
       
        // 4. Drawers (Find all open, check calculated Z-Index, close ONLY the highest)
        const drawers = ['serviceDrawer', 'dashDrilldownDrawer', 'projectDrawer', 'clientDrawer', 'parkingLot'];
        let openDrawers = [];
        
        drawers.forEach(id => {
            let el = document.getElementById(id);
            if (el && !el.classList.contains('translate-x-full')) {
                 openDrawers.push(el);
            }
        });
        
        if (openDrawers.length > 0) {
            openDrawers.sort((a, b) => {
                let zA = parseInt(a.style.zIndex || window.getComputedStyle(a).zIndex) || 0;
                let zB = parseInt(b.style.zIndex || window.getComputedStyle(b).zIndex) || 0;
                return zB - zA;
            });
            
            let topDrawer = openDrawers[0];
            if (topDrawer.id === 'serviceDrawer') { if(typeof window.closeServiceDrawer === 'function') window.closeServiceDrawer(); }
            else if (topDrawer.id === 'dashDrilldownDrawer') { if(typeof window.closeDashDrilldown === 'function') window.closeDashDrilldown(); }
            else if (topDrawer.id === 'projectDrawer') { if(typeof window.closeProjectDrawer === 'function') window.closeProjectDrawer(); }
            else if (topDrawer.id === 'clientDrawer') { if(typeof window.closeClientDrawer === 'function') window.closeClientDrawer(); }
            else if (topDrawer.id === 'parkingLot') { if(typeof window.toggleParkingLot === 'function') window.toggleParkingLot(); }
            return;
        }
    }
});

window.getBadgeProps = function(type, name) {
    if(typeof window.AvesdoState.settings === 'undefined' || !window.AvesdoState.settings) return { bg: 'badge badge-slate', text: window.textColorMap['slate'], fill: window.solidColorMap['slate'], icon: window.iconMap['slate'], colorKey: 'slate' };
   
    let c = 'slate';
    let icon = window.iconMap['slate'];
    let resolvedName = name || 'Not Set';
    if (type === 'status') {
         let match = (window.AvesdoState.settings.statuses || []).find(x => x.name === resolvedName);
        if (match) { c = match.color; icon = match.icon || window.iconMap[c] || 'circle-dashed'; }
    }
    else if (type === 'timeline') {
        let match = (window.AvesdoState.settings.timelines || []).find(x => x.name === resolvedName);
        if (match) { c = match.color; icon = match.icon || window.iconMap[c] || 'circle-dashed'; }
    }
    else if (type === 'phase') {
        let match = (window.AvesdoState.settings.phases || []).find(x => x.name === resolvedName);
        if (match) { c = match.color; icon = match.icon || window.iconMap[c] || 'circle-dashed'; }
    }
    else if (type === 'ServiceStatus') {
        let match = (window.AvesdoState.settings.settingsData || []).find(x => x.category === 'ServiceStatus' && x.name === resolvedName);
        if (match) { c = match.attribute || match.color; icon = match.icon || window.iconMap[c] || 'circle-dashed'; }
        else {
            if(['Completed', 'Accepted'].includes(resolvedName)) { c = 'green'; icon = 'check-circle-2'; }
            else if(['Not Accepted'].includes(resolvedName)) { c = 'red'; icon = 'alert-octagon'; }
            else if(['In Progress'].includes(resolvedName)) { c = 'purple'; icon = 'play-circle'; }
            else if(['Awaiting Inputs'].includes(resolvedName)) { c = 'orange'; icon = 'alert-triangle'; }
            else { c = 'slate'; icon = 'circle-dashed'; }
        }
    }
    else if (type === 'ServiceOutcome') {
        let match = (window.AvesdoState.settings.settingsData || []).find(x => x.category === 'ServiceOutcome' && x.name === resolvedName);
        if (match) { c = match.attribute || match.color; icon = match.icon || window.iconMap[c] || 'circle-dashed'; }
        else {
            if (resolvedName === 'Won') { c = 'green'; icon = 'check-circle-2'; }
            else if (resolvedName === 'Lost') { c = 'red'; icon = 'alert-octagon'; }
            else if (resolvedName === 'Included') { c = 'green'; icon = 'package'; }
            else { c = 'slate'; icon = 'circle-dashed'; }
        }
    }

    else if (type === 'ClientType') {
        let match = (window.AvesdoState.settings.clientTypes || []).find(x => x.name === resolvedName);
        if (match) { c = match.color; icon = match.icon || window.iconMap[c] || 'circle-dashed'; }
    }
    else if (type === 'ServiceType') {
        let match = (window.AvesdoState.settings.serviceTypes || []).find(x => x.name === resolvedName);
        if (match) { c = match.color; icon = match.icon || window.iconMap[c] || 'circle-dashed'; }
    }
    else if (type === 'Manager') {
        let match = (window.AvesdoState.settings.managers || []).find(x => (typeof x === 'string' ? x : x.name) === resolvedName);
        if (match && typeof match === 'object') { c = match.color || 'slate'; }
        else if (resolvedName === 'Not Set' || resolvedName === 'Unassigned') { c = 'slate'; }
        else { c = 'indigo'; }
        icon = 'user';
    }
    else if (type === 'raw') {
        c = resolvedName;
        icon = window.iconMap[c] || window.iconMap['slate'];
    }

    return {
        bg: 'badge ' + (window.colorMap[c] || window.colorMap['slate']),
        text: window.textColorMap[c] || window.textColorMap['slate'],
        fill: window.solidColorMap[c] || window.solidColorMap['slate'],
        icon: icon || window.iconMap['slate'],
        colorKey: c
    };
};

window.getHealthBadgeProps = function(score) {
    if (score === "N/A" || score === null || score === undefined || score === '') {
        return { bg: 'badge badge-slate', text: window.textColorMap['slate'], fill: window.solidColorMap['slate'], icon: 'minus-circle', colorKey: 'slate' };
    }
    let h = window.AvesdoState.settings && window.AvesdoState.settings.scoring ? window.AvesdoState.settings.scoring.thresholds.healthy : 80;
    let w = window.AvesdoState.settings && window.AvesdoState.settings.scoring ? window.AvesdoState.settings.scoring.thresholds.warning : 50;
    let s = Number(score);
    let c = s >= h ? 'lime' : (s >= w ? 'amber' : 'red');
    let icon = s >= h ? 'check-circle-2' : (s >= w ? 'alert-triangle' : 'alert-octagon');
   
    return {
        bg: 'badge ' + (window.colorMap[c] || window.colorMap['slate']),
        text: window.textColorMap[c] || window.textColorMap['slate'],
        fill: window.solidColorMap[c] || window.solidColorMap['slate'],
        icon: icon,
        colorKey: c
    };
};

window.getFeatureBadgeProps = function(pct) {
    let h = window.AvesdoState.settings && window.AvesdoState.settings.scoring ? window.AvesdoState.settings.scoring.thresholds.healthy : 80;
    let w = window.AvesdoState.settings && window.AvesdoState.settings.scoring ? window.AvesdoState.settings.scoring.thresholds.warning : 50;
    let p = Number(pct);
    let c = p >= h ? 'green' : (p >= w ? 'orange' : 'red');
    return {
        bg: 'badge ' + (window.colorMap[c] || window.colorMap['slate']),
        text: window.textColorMap[c] || window.textColorMap['slate'],
        fill: window.solidColorMap[c] || window.solidColorMap['slate'],
        icon: 'play-circle',
        colorKey: c
    };
};

window.buildBadge = function(props, label, customClasses = '') {
    return `<span class="${props.bg} ${customClasses}"><i data-lucide="${props.icon}" class="w-3 h-3 mr-1 inline-block shrink-0"></i>${window.sanitizeHTML(label)}</span>`;
};

window.getStatusBadge = function(val) { return window.getBadgeProps('status', val).bg; };
window.getTimelineBadge = function(val) { return window.getBadgeProps('timeline', val).bg; };
window.getPhaseBadge = function(val) { return window.getBadgeProps('phase', val).bg; };
window.getStatusTextColor = function(val) { return window.getBadgeProps('status', val).text; };
window.getTimelineTextColor = function(val) { return window.getBadgeProps('timeline', val).text; };
window.getPhaseTextColor = function(val) { return window.getBadgeProps('phase', val).text; };

window.getTrendHtml = function(current, previous, prefix = '', suffix = '', colorClass = 'text-foreground', periodText = 'last 30 days', inverted = false) {
    let diff = current - previous;
    let pct = previous === 0 ? (current > 0 ? 100 : 0) : Math.abs(Math.round((diff / previous) * 100));
    let isUp = diff >= 0;
   
    let tColor = diff === 0 ? 'text-muted-foreground' : (isUp ? (inverted ? 'text-red-600' : 'text-emerald-600') : (inverted ? 'text-emerald-600' : 'text-red-600'));

    let w3 = "http" + "://" + "www.w3.org/2000/svg";
    let iconUp = `<svg xmlns="${w3}" width="24" height="24" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round" class="h-3 w-3"><path d="M16 7h6v6"></path><path d="m22 7-8.5 8.5-5-5L2 17"></path></svg>`;
    let iconDown = `<svg xmlns="${w3}" width="24" height="24" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round" class="h-3 w-3"><path d="M16 17h6v-6"></path><path d="m22 17-8.5-8.5-5 5L2 7"></path></svg>`;
    let iconFlat = `<svg xmlns="${w3}" width="24" height="24" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round" class="h-3 w-3"><path d="M5 12h14"></path></svg>`;

    let icon = isUp ? iconUp : iconDown;
    if(diff === 0) icon = iconFlat;

    let displayVal = prefix + current.toLocaleString('en-US', {minimumFractionDigits: 0, maximumFractionDigits: 0}) + suffix;
    let trendWord = diff === 0 ? "Trending neutral" : (isUp ? "Trending up" : "Trending down");

    return `<div class="flex items-center gap-3"><p class="text-3xl font-semibold ${colorClass}">${displayVal}</p><span class="inline-flex w-fit shrink-0 items-center justify-center overflow-hidden rounded-full border border-border px-2 py-0.5 text-xs font-semibold ${tColor} gap-1">${icon} ${diff===0?"0%":(isUp?"+":"-")+pct+"%"}</span></div><p class="text-xs text-muted-foreground mt-2">${trendWord} ${periodText}</p>`;
};

document.addEventListener('DOMContentLoaded', () => {
    setTimeout(() => {
        if (typeof window.fetchSparklineData === 'function' && !window.fetchSparklineData.isLocked) {
            const originalFetch = window.fetchSparklineData;
            window.fetchSparklineData = function(...args) {
                if (window.globalHealthHistory) return;
                originalFetch.apply(this, args);
           
                setTimeout(() => {
                     if (window.isFetchingHistory && !window.globalHealthHistory) {
                        console.warn("Sparkline fetch timeout! Releasing the lock manually.");
                        window.isFetchingHistory = false;
                        if (typeof window.fetchSparklineData === 'function') {
                            window.fetchSparklineData();
                        }
                    }
                }, 15000);
            };
             window.fetchSparklineData.isLocked = true;
        }
    }, 1000);
});

window.populateHeaderProjectDropdown = function() {
    const listEl = document.getElementById('header-project-list');
    if (!listEl) return;
    
    if (!window.AvesdoState.data.projects) {
        listEl.innerHTML = '';
        return;
    }
    
    // Sort projects by name
    const activeProjects = [...window.AvesdoState.data.projects]
        .filter(p => p.projectStatus !== 'Closed')
        .sort((a, b) => (a.name || '').localeCompare(b.name || ''));
        
    let html = '';
    activeProjects.forEach(p => {
        const pId = p.id;
        const pName = window.sanitizeHTML(p.name || 'Unnamed');
        html += `<div class="radix-item font-semibold rounded-md text-xs md:text-sm" onclick="window.setHeaderActiveProject('${pId}', '${pName.replace(/'/g, "\\'")}')">${pName}</div>`;
    });
    
    listEl.innerHTML = html;
};

window.setHeaderActiveProject = function(projectId, projectName) {
    const btnText = document.getElementById('header-active-project-text');
    if (btnText) {
        btnText.innerText = projectName;
    }
    
    // Hide the popover after selection
    const pop = document.getElementById('header-project-select-pop');
    if (pop) pop.classList.remove('active');
    
    if (projectId !== 'all') {
        // Bind selection event to open the project drawer
        if (typeof window.openProjectDrawer === 'function') {
            window.openProjectDrawer(projectId);
        }
    }
};</script>
