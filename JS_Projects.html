<script>
// ==========================================
// 1. SEARCH, PAGINATION & DELEGATION STATE
// ==========================================
let p_displayLimit = 50;

var p_tabFilter = 'active-onboarding';
var p_colFilters = { name: [], clients: [], assignee: [], projectStatus: [], timelineStatus: [], onboardingPhase: [], features: [], healthBucket: [], dateFrom: null, dateTo: null };
var p_sort = { col: 'releaseDateVal', asc: true };

document.addEventListener('DOMContentLoaded', () => {
    const searchEl = document.getElementById('projectSearch');
    if (searchEl) {
        searchEl.removeAttribute('onkeyup');
        searchEl.addEventListener('input', window.debounce(() => {
            p_displayLimit = 50;
            window.renderProjectTracker();
        }, 300));
    }

    const listView = document.getElementById('tracker-viewport');
    if(listView) {
        listView.addEventListener('scroll', function() {
            if (this.scrollTop + this.clientHeight >= this.scrollHeight - 50) {
                if (p_displayLimit < (window.currentFilteredProjects || []).length) {
                    window.loadMoreProjects();
                }
            }
        });
    }

    const projectTable = document.getElementById('projectTableBody');
    if (projectTable) {
        projectTable.addEventListener('click', function(e) {
            if(e.target.closest('.radix-trigger') ||
               e.target.closest('.radix-popover') || 
               e.target.closest('button') || 
               e.target.closest('a') || 
               e.target.closest('input') || 
               e.target.closest('.filter-icon') || 
               e.target.closest('.date-trigger') ||
               e.target.closest('.pt-bulk-checkbox')) {
                return;
            }
            
            const tr = e.target.closest('tr[data-id]');
            if (!tr) return;
            
            const pId = tr.dataset.id;
            let targetTab = 'details';
            
            if (e.target.closest('.td-features')) targetTab = 'features';
            else if (e.target.closest('.sparkline-trigger')) targetTab = 'trends';

            else if (e.target.closest('.score-trigger')) targetTab = 'health';
            
            if(typeof window.openProjectDrawer === 'function') {
                window.openProjectDrawer(pId, targetTab);
            }
        });
    }
});

window.updateApPills = function() {
    let selectedCb = document.querySelectorAll('.ap-client-cb:checked');
    let countF = document.querySelectorAll('.ap-feat-cb:checked').length;
    let clientText = "Select clients...";
    if (selectedCb.length > 0) {
        let names = Array.from(selectedCb).map(cb => cb.dataset.name);
        clientText = names.join(', ');
    }
    window.safeSet('ap-text-clients', 'innerText', clientText);
    window.safeSet('ap-text-feat', 'innerText', countF > 0 ? `${countF} Feature${countF>1?'s':''} Selected` : "Select features...");
}

// ==========================================
// 2. PROJECT TRACKER LOGIC & SANITIZATION
// ==========================================
let bulkSelectedProjects = [];
let pt_dateFilterTemp = { fromMonth: 'all', fromYear: 'all', toMonth: 'all', toYear: 'all' };

window.sanitizePtFilters = function() {
    if (typeof p_colFilters === 'undefined') window.p_colFilters = { dateFrom: null, dateTo: null };
    const arrayKeys = ['name', 'clients', 'assignee', 'projectStatus', 'timelineStatus', 'onboardingPhase', 'features', 'healthBucket'];
    arrayKeys.forEach(key => {
        if (!Array.isArray(p_colFilters[key])) {
            if (p_colFilters[key] && p_colFilters[key] !== 'all') p_colFilters[key] = [p_colFilters[key]];
            else p_colFilters[key] = [];
        }
    });
}

window.resetPtFilters = function() { 
    const searchEl = document.getElementById('projectSearch');
    if (searchEl) searchEl.value = '';
    p_colFilters = { name: [], clients: [], assignee: [], projectStatus: [], timelineStatus: [], onboardingPhase: [], features: [], healthBucket: [], dateFrom: null, dateTo: null };
    document.querySelectorAll('#page-tracker input[type=checkbox]:not(.pt-bulk-checkbox):not(#pt-bulk-select-all)').forEach(cb => cb.checked = false); 
    p_displayLimit = 50;
    window.clearDateFilter(); 
}

window.toggleHeaderFilter = function(type, val) { 
    window.sanitizePtFilters();
    if (p_colFilters[type].includes(val)) p_colFilters[type] = p_colFilters[type].filter(v => v !== val);
    else p_colFilters[type].push(val); 
    p_displayLimit = 50;
    window.renderProjectTracker();
}

window.updatePtCol = function(key, val) { 
    window.sanitizePtFilters();
    if (p_colFilters[key].includes(val)) p_colFilters[key] = p_colFilters[key].filter(v => v !== val);
    else p_colFilters[key].push(val);
    p_displayLimit = 50;
    window.renderProjectTracker();
}

window.removeFilter = function(type, val) { 
    if (type === 'date') { window.clearDateFilter(); return; } 
    window.sanitizePtFilters();
    if (Array.isArray(p_colFilters[type])) {
        p_colFilters[type] = p_colFilters[type].filter(v => v !== val);
        document.querySelectorAll(`.pt-cb-${type}, .pt-cb-healthBucket`).forEach(cb => {
            if (cb.value === val) cb.checked = false;
        });
    }
    p_displayLimit = 50;
    window.renderProjectTracker(); 
}

window.sortPt = function(col) { 
    if(p_sort.col === col) p_sort.asc = !p_sort.asc;
    else { p_sort.col = col; p_sort.asc = true; } 
    p_displayLimit = 50;
    window.renderProjectTracker();
}

window.setupPtPopovers = function() {
  window.sanitizePtFilters();
  const createMultiMenu = (id, list, key) => { 
      const menu = document.getElementById(id);
      if(!menu) return; 
      let filterArr = p_colFilters[key] || [];
      menu.innerHTML = list.map(item => `<label class="radix-item hover:bg-[#f1f5f9] cursor-pointer flex items-center gap-2 p-1.5 rounded-md"><input type="checkbox" class="pt-cb-${key} w-3.5 h-3.5 rounded border-input text-primary focus:border-primary focus:ring-[3px] focus:ring-primary/20 transition-all shadow-sm outline-none" value="${window.sanitizeHTML(item)}" onchange="window.updatePtCol('${key}', '${window.sanitizeHTML(item)}')" ${filterArr.includes(item) ? 'checked' : ''}> <span class="truncate text-sm font-medium text-foreground">${window.sanitizeHTML(item)}</span></label>`).join('');
  };
  
  window.populateYearDropdowns(); 
  
  if (typeof pt_managers !== 'undefined') createMultiMenu('pt-f-am-list', pt_managers, 'assignee'); 
  if (typeof pt_statuses !== 'undefined') createMultiMenu('pt-f-status-list', pt_statuses, 'projectStatus');
  if (typeof pt_timelines !== 'undefined') createMultiMenu('pt-f-timeline-list', pt_timelines, 'timelineStatus'); 
  if (typeof pt_phases !== 'undefined') createMultiMenu('pt-f-phase-list', pt_phases, 'onboardingPhase');
  if (typeof pt_features !== 'undefined') createMultiMenu('pt-f-feat-list', pt_features, 'features');
  
  const names = [...new Set(window.AvesdoState.data.projects.map(p => p.name || 'Unnamed'))].sort(); 
  createMultiMenu('pt-f-name-list', names, 'name');
  const cNames = [...new Set(window.AvesdoState.data.clients.map(c => c.companyName || 'Unnamed'))].sort(); 
  createMultiMenu('pt-f-clients-list', cNames, 'clients'); 

  const bulkStatus = document.getElementById('pt-bulk-pop-status');
  if (bulkStatus) bulkStatus.innerHTML = pt_statuses.map(s => `<div class="radix-item font-medium rounded-md" onclick="window.applyBulkAction('projectStatus', '${s}')">${window.sanitizeHTML(s)}</div>`).join('');
  
  const bulkMgr = document.getElementById('pt-bulk-pop-mgr');
  if (bulkMgr) bulkMgr.innerHTML = pt_managers.map(m => `<div class="radix-item font-medium rounded-md" onclick="window.applyBulkAction('assignee', '${m}')">${window.sanitizeHTML(m)}</div>`).join('');
}

window.populateYearDropdowns = function() {
    const currentYear = new Date().getFullYear();
    let years = new Set([currentYear - 1, currentYear, currentYear + 1, currentYear + 2]);
    if (window.AvesdoState.data.projects.length > 0) { 
        window.AvesdoState.data.projects.forEach(p => { if (p.releaseDateVal) years.add(new Date(p.releaseDateVal).getFullYear()); });
    }
    const sortedYears = [...years].sort((a,b) => a - b);
    const options = `<div class="radix-item font-medium rounded-md" onclick="window.setDateFilterVal('year-from', 'all', 'Select...')">Clear</div>` + sortedYears.map(y => `<div class="radix-item font-medium rounded-md" onclick="window.setDateFilterVal('year-from', ${y}, '${y}')">${y}</div>`).join(''); 
    const popFrom = document.getElementById('pt-f-year-from-pop');
    const popTo = document.getElementById('pt-f-year-to-pop'); 
    if (popFrom) popFrom.innerHTML = options; 
    if (popTo) popTo.innerHTML = options.replace(/year-from/g, 'year-to');
}

window.setDateFilterVal = function(type, val, label) {
    if(type === 'month-from') { pt_dateFilterTemp.fromMonth = val; window.safeSet('pt-txt-month-from', 'innerText', label); }
    if(type === 'year-from') { pt_dateFilterTemp.fromYear = val; window.safeSet('pt-txt-year-from', 'innerText', label); }
    if(type === 'month-to') { pt_dateFilterTemp.toMonth = val; window.safeSet('pt-txt-month-to', 'innerText', label); }
    if(type === 'year-to') { pt_dateFilterTemp.toYear = val; window.safeSet('pt-txt-year-to', 'innerText', label); }
    
    ['pt-f-month-from-pop', 'pt-f-year-from-pop', 'pt-f-month-to-pop', 'pt-f-year-to-pop'].forEach(pid => {
        let p = document.getElementById(pid);
        if(p) { p.style.display = 'none'; p.classList.remove('active'); }
    });
    window.validateDateFilter(); 
}

window.validateDateFilter = function() { 
    const btn = document.getElementById('btn-apply-date-filter'); if(!btn) return;
    if (pt_dateFilterTemp.fromMonth !== 'all' && pt_dateFilterTemp.fromYear !== 'all' && pt_dateFilterTemp.toMonth !== 'all' && pt_dateFilterTemp.toYear !== 'all') { 
        btn.disabled = false;
        btn.classList.remove('opacity-50', 'cursor-not-allowed'); 
    } else { 
        btn.disabled = true; btn.classList.add('opacity-50', 'cursor-not-allowed');
    } 
}

window.applyDateFilter = function() { 
    if (pt_dateFilterTemp.fromMonth !== 'all' && pt_dateFilterTemp.fromYear !== 'all') {
        p_colFilters.dateFrom = new Date(pt_dateFilterTemp.fromYear, pt_dateFilterTemp.fromMonth, 1).getTime();
    }
    if (pt_dateFilterTemp.toMonth !== 'all' && pt_dateFilterTemp.toYear !== 'all') {
        p_colFilters.dateTo = new Date(pt_dateFilterTemp.toYear, pt_dateFilterTemp.toMonth + 1, 0, 23, 59, 59).getTime();
    }
    if(typeof window.closePopups === 'function') window.closePopups(); 
    p_displayLimit = 50;
    window.renderProjectTracker();
}

window.clearDateFilter = function() { 
    pt_dateFilterTemp = { fromMonth: 'all', fromYear: 'all', toMonth: 'all', toYear: 'all' };
    window.safeSet('pt-txt-month-from', 'innerText', 'Select...'); window.safeSet('pt-txt-year-from', 'innerText', 'Select...'); 
    window.safeSet('pt-txt-month-to', 'innerText', 'Select...'); window.safeSet('pt-txt-year-to', 'innerText', 'Select...');
    p_colFilters.dateFrom = null; p_colFilters.dateTo = null; 
    window.validateDateFilter();
    if(typeof window.closePopups === 'function') window.closePopups(); 
    p_displayLimit = 50;
    window.renderProjectTracker(); 
}

// ==========================================
// 4. TAB ROUTING & ACTIVE FILTERS
// ==========================================
window.setPtFilter = function(type, el) {
  p_tabFilter = type;
  document.querySelectorAll('.pt-tab').forEach(t => { 
      t.setAttribute('data-state', 'inactive'); 
      t.classList.remove('bg-white', 'text-foreground', 'shadow-sm', 'border', 'border-black/5'); 
      t.classList.add('text-muted-foreground', 'hover:text-foreground');
  });
  if(el) { 
      el.setAttribute('data-state', 'active'); 
      el.classList.add('bg-white', 'text-foreground', 'shadow-sm', 'border', 'border-black/5');
      el.classList.remove('text-muted-foreground', 'hover:text-foreground');
  }
  
  if (type === 'active-onboarding' || type === 'upcoming') p_sort = { col: 'releaseDateVal', asc: true };
  else if (type === 'no-date' || type === 'suspended') p_sort = { col: 'name', asc: true };
  else if (type === 'released' || type === 'all') p_sort = { col: 'releaseDateVal', asc: false };
  
  const dateFilterBtn = document.getElementById('pt-f-date-col-btn'); 
  if(dateFilterBtn) { 
      if (type === 'released' || type === 'all') dateFilterBtn.classList.remove('hidden');
      else { dateFilterBtn.classList.add('hidden'); window.clearDateFilter(); } 
  }
  
  p_displayLimit = 50;
  window.renderProjectTracker();
}

window.toggleTrackerView = function(view) {
  const listBtn = document.getElementById('view-list-btn'); 
  const calBtn = document.getElementById('view-cal-btn'); 
  const listView = document.getElementById('tracker-list-view');
  const calView = document.getElementById('tracker-calendar-view');
  const ptTabs = document.getElementById('pt-tabs-container-wrapper');
  const searchCont = document.getElementById('pt-search-container');

  const pl = document.getElementById('parkingLot');
  if (pl && !pl.classList.contains('translate-x-full')) pl.classList.add('translate-x-full');

  if(!listView || !calView) return;
  if (view === 'calendar') {
    if(listBtn) { listBtn.classList.remove('bg-white', 'text-foreground', 'shadow-sm', 'border', 'border-black/5'); listBtn.classList.add('text-muted-foreground', 'hover:text-foreground'); }
    if(calBtn) { calBtn.classList.add('bg-white', 'text-foreground', 'shadow-sm', 'border', 'border-black/5'); calBtn.classList.remove('text-muted-foreground', 'hover:text-foreground'); }
    listView.classList.add('hidden'); listView.classList.remove('flex'); 
    calView.classList.remove('hidden'); calView.classList.add('flex');
    if(ptTabs) { ptTabs.classList.add('hidden'); ptTabs.classList.remove('flex'); }
    if(searchCont) { searchCont.classList.add('hidden'); }
    window.renderCalendar();
  } else {
    if(listBtn) { listBtn.classList.add('bg-white', 'text-foreground', 'shadow-sm', 'border', 'border-black/5'); listBtn.classList.remove('text-muted-foreground', 'hover:text-foreground'); }
    if(calBtn) { calBtn.classList.remove('bg-white', 'text-foreground', 'shadow-sm', 'border', 'border-black/5'); calBtn.classList.add('text-muted-foreground', 'hover:text-foreground'); }
    listView.classList.remove('hidden'); listView.classList.add('flex'); 
    calView.classList.add('hidden'); calView.classList.remove('flex');
    if(ptTabs) { ptTabs.classList.remove('hidden'); ptTabs.classList.add('flex'); }
    if(searchCont) { searchCont.classList.remove('hidden'); }
  }
}

window.setPtKpiFilter = function(type) {
    window.resetPtFilters();
    
    if (type === 'onboarding') {
        let tab = document.querySelector('[onclick*="setPtFilter(\'all\'"]');
        if(tab) window.setPtFilter('all', tab);
        window.updatePtCol('projectStatus', 'Onboarding');
        
    } else if (type === 'pipeline') {
        let tab = document.querySelector('[onclick*="setPtFilter(\'active-onboarding\'"]');
        if(tab) window.setPtFilter('active-onboarding', tab);
        
    } else if (type === 'risk') {
        let tab = document.querySelector('[onclick*="setPtFilter(\'all\'"]');
        if(tab) window.setPtFilter('all', tab);
        p_colFilters.healthBucket = ['risk'];
        document.querySelectorAll('.pt-cb-healthBucket[value="risk"]').forEach(cb => cb.checked = true);
        window.renderProjectTracker();
        
    } else if (type === 'units') {
        let tab = document.querySelector('[onclick*="setPtFilter(\'released\'"]');
        if(tab) window.setPtFilter('released', tab);
    }
}

window.updatePtKPIs = function(projects = window.AvesdoState.data.projects) {
    let warningThresh = window.AvesdoState.settings && window.AvesdoState.settings.scoring ? window.AvesdoState.settings.scoring.thresholds.warning : 50;
    let thirtyDaysAgo = new Date().getTime() - (30 * 24 * 60 * 60 * 1000);
    let fortyFiveDays = new Date().getTime() + (45 * 24 * 60 * 60 * 1000);
    let fifteenDays = new Date().getTime() + (15 * 24 * 60 * 60 * 1000);

    let onbCount = 0, prevOnbCount = 0;
    let pipelineCount = 0, prevPipelineCount = 0;
    let riskCount = 0, prevRiskCount = 0;
    let unitsCount = 0, prevUnitsCount = 0;

    projects.forEach(p => {
        let u = parseInt(p.units) || 0;
        let isSuspended = p.projectStatus === 'Suspended';

        if (p.projectStatus === 'Active' || isSuspended) {
            unitsCount += u;
            if (p.releaseDateVal && p.releaseDateVal <= thirtyDaysAgo) {
                prevUnitsCount += u; 
            }
        }

        if (p.projectStatus === 'Onboarding') {
            onbCount++;
            prevOnbCount++; 
            
            if (p.releaseDateVal && p.releaseDateVal <= fortyFiveDays) pipelineCount++;
            if (p.releaseDateVal && p.releaseDateVal <= fifteenDays) prevPipelineCount++;
        }
        
        if ((p.projectStatus === 'Active' || isSuspended) && p.releaseDateVal && p.releaseDateVal > thirtyDaysAgo) {
            prevOnbCount++;
            if (p.releaseDateVal <= fortyFiveDays) prevPipelineCount++;
        }

        if ((p.projectStatus === 'Active' || isSuspended) && p.score !== "N/A" && typeof p.score === 'number') {
            if (p.score < warningThresh) riskCount++;

            let pastScore = null;
            if (window.globalHealthHistory && window.globalHealthHistory[p.id]) {
                let pastRecords = window.globalHealthHistory[p.id].filter(h => h.timeVal <= thirtyDaysAgo).sort((a,b) => b.timeVal - a.timeVal);
                if (pastRecords.length > 0) pastScore = pastRecords[0].score;
                else pastScore = p.score;
            } else {
                pastScore = p.score;
            }

            if (pastScore !== null && pastScore < warningThresh) {
                prevRiskCount++;
            }
        }
    });

    window.safeSet('pt-kpi-onb', 'innerHTML', window.getTrendHtml(onbCount, prevOnbCount, '', '', 'text-foreground', 'last 30 days', false));
    window.safeSet('pt-kpi-pipe', 'innerHTML', window.getTrendHtml(pipelineCount, prevPipelineCount, '', '', 'text-foreground', 'last 30 days', false));
    window.safeSet('pt-kpi-risk', 'innerHTML', window.getTrendHtml(riskCount, prevRiskCount, '', '', 'text-destructive', 'last 30 days', true));
    window.safeSet('pt-kpi-units', 'innerHTML', window.getTrendHtml(unitsCount, prevUnitsCount, '', '', 'text-foreground', 'last 30 days', false));
}

window.renderActiveFilters = function() {
    const container = document.getElementById('pt-active-filters'); if(!container) return; let html = '';
    window.sanitizePtFilters();
    
    const makePill = (type, rawVal, displayVal, label) => `<span class="inline-flex items-center gap-1.5 bg-muted border border-border text-foreground text-xs font-medium px-2.5 py-1 rounded-full shadow-sm">${label}: ${window.sanitizeHTML(displayVal)} <button onclick="window.removeFilter('${type}', '${rawVal.replace(/'/g, "\\'")}')" class="hover:text-destructive transition-colors active:scale-95 transition-all duration-200"><i data-lucide="x" class="w-3 h-3"></i></button></span>`;
    
    if (p_colFilters.assignee) p_colFilters.assignee.forEach(v => html += makePill('assignee', v, v, 'Manager'));
    if (p_colFilters.projectStatus) p_colFilters.projectStatus.forEach(v => html += makePill('projectStatus', v, v, 'Status'));
    if (p_colFilters.timelineStatus) p_colFilters.timelineStatus.forEach(v => html += makePill('timelineStatus', v, v, 'Timeline'));
    if (p_colFilters.onboardingPhase) p_colFilters.onboardingPhase.forEach(v => html += makePill('onboardingPhase', v, v, 'Phase'));
    if (p_colFilters.features) p_colFilters.features.forEach(v => html += makePill('features', v, v, 'Feature'));
    if (p_colFilters.healthBucket) p_colFilters.healthBucket.forEach(v => html += makePill('healthBucket', v, v.charAt(0).toUpperCase() + v.slice(1), 'Health'));
    if (p_colFilters.name) p_colFilters.name.forEach(n => html += makePill('name', n, n, 'Name')); 
    if (p_colFilters.clients) p_colFilters.clients.forEach(c => html += makePill('clients', c, c, 'Client'));
    
    if (p_colFilters.dateFrom || p_colFilters.dateTo) { 
        let l = "Date: ";
        if (p_colFilters.dateFrom) l += new Date(p_colFilters.dateFrom).toLocaleDateString('en-US', {month: 'short', day: 'numeric', year: 'numeric'});
        l += " - ";
        if (p_colFilters.dateTo) l += new Date(p_colFilters.dateTo).toLocaleDateString('en-US', {month: 'short', day: 'numeric', year: 'numeric'});
        html += `<span class="inline-flex items-center gap-1.5 bg-muted border border-border text-foreground text-xs font-medium px-2.5 py-1 rounded-full shadow-sm">${l} <button onclick="window.clearDateFilter()" class="hover:text-destructive transition-colors active:scale-95 transition-all duration-200"><i data-lucide="x" class="w-3 h-3"></i></button></span>`;
    }
    if (html !== '') { html += `<button onclick="window.resetPtFilters()" class="text-xs font-medium text-muted-foreground hover:text-foreground ml-1 underline decoration-border underline-offset-2 transition-colors focus:outline-none active:scale-95 transition-all duration-200">Clear Filters</button>`; }
    container.innerHTML = html;
    if(typeof lucide !== 'undefined' && lucide.createIcons) lucide.createIcons();
}

// ==========================================
// 5. RENDER TRACKER & DOM BUILDERS
// ==========================================
window.buildProjectRow = function(p, showScore) {
    let pName = window.sanitizeHTML(p.name || 'Unnamed');
    
    let displayClients = [...(p.clients || [])].sort(); 
    let allClientsList = displayClients.join(', ');
    
    let displayClientText = displayClients.length > 1 
        ? `<div class="group/tooltip relative flex items-center w-full cursor-help"><span class="truncate flex-1 text-foreground font-medium">${window.sanitizeHTML(displayClients[0])}, <span class="text-muted-foreground">+${displayClients.length-1}</span></span><div class="absolute top-full left-0 mt-1 hidden group-hover/tooltip:block bg-popover text-popover-foreground text-xs p-2.5 rounded-md shadow-xl border border-border z-[100] whitespace-normal min-w-[200px] leading-relaxed font-medium">${window.sanitizeHTML(allClientsList)}</div></div>` 
        : `<span class="truncate flex-1 text-foreground font-medium">${window.sanitizeHTML(displayClients[0] || "Select Client")}</span>`;
    
    const pct = Math.round(((p.features||[]).length / pt_features.length) * 100); 
    
    let stProps = window.getBadgeProps('status', p.projectStatus);
    let tlProps = window.getBadgeProps('timeline', p.timelineStatus);
    let phProps = window.getBadgeProps('phase', p.onboardingPhase);
    let mProps = window.getBadgeProps('Manager', p.assignee);
    let fProps = window.getFeatureBadgeProps(pct);

    let bulkCb = `<td class="px-2 py-4 align-middle w-8 text-center sticky left-0 z-10 bg-white group-hover:bg-[#f1f5f9] transition-colors">
        <div class="relative block w-4 h-4 mx-auto shrink-0">
            <input type="checkbox" class="peer absolute inset-0 w-full h-full m-0 appearance-none border border-input rounded bg-white checked:bg-primary checked:border-primary cursor-pointer transition-all outline-none shadow-sm pt-bulk-checkbox focus-visible:ring-[3px] focus-visible:ring-primary/20 focus-visible:border-primary" value="${p.id}" ${bulkSelectedProjects.includes(p.id) ? 'checked' : ''} onclick="window.toggleBulkSelect('${p.id}', this.checked); event.stopPropagation();">
            <svg viewBox="0 0 24 24" fill="none" stroke="white" stroke-width="3" stroke-linecap="round" stroke-linejoin="round" class="w-3 h-3 absolute left-1/2 top-1/2 -translate-x-1/2 -translate-y-1/2 pointer-events-none opacity-0 peer-checked:opacity-100 transition-opacity"><polyline points="20 6 9 17 4 12"></polyline></svg>
        </div>
    </td>`;
    
    let scoreTd = `<td class="px-4 py-2.5 align-middle pt-td-score hidden"></td>`;
    if (showScore) {
        let hProps = window.getHealthBadgeProps(p.score);
        let slHtml = (typeof window.createSparkline === 'function') ? window.createSparkline(p.id) : '';

window.loadMoreProjects = function() {
    const btnRow = document.getElementById("pt-load-more-row");
    if (!btnRow) return;

    const tbody = document.getElementById('projectTableBody');
    let filtered = window.currentFilteredProjects || window.AvesdoState.data.projects;
    let newSlice = filtered.slice(p_displayLimit, p_displayLimit + 50);
    p_displayLimit += 50;

    let showScore = (p_tabFilter === 'released' || p_tabFilter === 'all');
    let html = newSlice.map(p => window.buildProjectRow(p, showScore)).join('');

    if (p_displayLimit < filtered.length) {
        let remaining = filtered.length - p_displayLimit;
        let colSpan = showScore ? 12 : 11;
        html += `<tr id="pt-load-more-row"><td colspan="${colSpan}" class="py-6 text-center border-0"><button onclick="window.loadMoreProjects()" class="inline-flex items-center justify-center rounded-md text-sm font-medium transition-all duration-200 active:scale-95 border border-input bg-white hover:bg-[#f8fafc] hover:text-accent-foreground h-9 px-6 shadow-sm"><i data-lucide="chevron-down" class="w-4 h-4 mr-2"></i>Load More (${remaining} Remaining)</button></td></tr>`;
    }

    btnRow.remove();
    tbody.insertAdjacentHTML('beforeend', html);
    if(typeof lucide !== 'undefined' && lucide.createIcons) lucide.createIcons();
};

window.renderProjectTracker = function(isAppend = false, isSilent = false) {
    window.sanitizePtFilters();
    
    if (typeof window.fetchSparklineData === 'function' && typeof window.globalHealthHistory !== 'undefined' && !window.globalHealthHistory && typeof window.isFetchingHistory !== 'undefined' && !window.isFetchingHistory) {
        window.fetchSparklineData();
    }

    const tbody = document.getElementById('projectTableBody'); if(!tbody) return; 
    const searchEl = document.getElementById('projectSearch');
    
    const suspendedTab = document.getElementById('pt-tab-suspended');
    if (suspendedTab) {
        let hasSuspended = (typeof window.AvesdoState.data.projects !== 'undefined') ? window.AvesdoState.data.projects.some(p => p.projectStatus === 'Suspended') : false;
        if (hasSuspended) { suspendedTab.classList.remove('hidden'); suspendedTab.classList.add('inline-flex'); } 
        else { 
            suspendedTab.classList.add('hidden'); suspendedTab.classList.remove('inline-flex');
            if(p_tabFilter === 'suspended') { window.setPtFilter('active-onboarding', document.querySelector('.pt-tab')); } 
        }
    }

    let showScore = (p_tabFilter === 'released' || p_tabFilter === 'all');
    let colSpan = showScore ? 12 : 11;

    const scoreTh = document.getElementById('pt-th-score');
    if (scoreTh) {
        if (showScore) { scoreTh.classList.remove('hidden'); scoreTh.classList.add('sm:table-cell'); } 
        else { scoreTh.classList.add('hidden'); scoreTh.classList.remove('sm:table-cell'); }
    }

    const featTh = document.getElementById('th-col-features');
    if(featTh) {
        if (p_tabFilter === 'upcoming' || p_tabFilter === 'no-date' || p_tabFilter === 'active-onboarding') { featTh.classList.add('hidden'); featTh.classList.remove('xl:table-cell'); }
        else { featTh.classList.remove('hidden'); featTh.classList.add('xl:table-cell'); }
    }

    const tlTh = document.getElementById('th-col-timeline');
    if(tlTh) {
        if (p_tabFilter === 'released' || p_tabFilter === 'all') { tlTh.classList.add('hidden'); tlTh.classList.remove('lg:table-cell'); }
        else { tlTh.classList.remove('hidden'); tlTh.classList.add('lg:table-cell'); }
    }

    const chkTh = document.getElementById('th-col-checklist');
    if(chkTh) {
        if (p_tabFilter === 'released' || p_tabFilter === 'all') { chkTh.classList.add('hidden'); chkTh.classList.remove('md:table-cell'); }
        else { chkTh.classList.remove('hidden'); chkTh.classList.add('md:table-cell'); }
    }

    if (!isAppend) {
        p_displayLimit = 50;
    }

    if(typeof window.isInitialLoad !== 'undefined' && window.isInitialLoad) return;

    let filtered = window.universalFilterAndSort(window.AvesdoState.data.projects, {
        searchQuery: searchEl ? searchEl.value : '',
        searchFields: ['name', 'clients'],
        multiFilters: { 
            name: p_colFilters.name, 
            clients: p_colFilters.clients, 
            features: p_colFilters.features, 
            assignee: p_colFilters.assignee, 
            projectStatus: p_colFilters.projectStatus, 
            timelineStatus: p_colFilters.timelineStatus, 
            onboardingPhase: p_colFilters.onboardingPhase 
        },
        customFilter: (p) => {
            const diff = p.releaseDateVal ? Math.ceil((p.releaseDateVal - new Date().getTime()) / 86400000) : null;
            
            const isReleased = (p.timelineStatus || '').toLowerCase() === 'released' || (p.onboardingPhase || '').toLowerCase() === 'released';
            const isSuspended = p.projectStatus === 'Suspended';
            const isClosed = (p.projectStatus || '').toLowerCase() === 'closed';
            
            if (p_tabFilter !== 'all') {
                if (p_tabFilter === 'released') {
                    if (!isReleased) return false;
                } else if (p_tabFilter === 'suspended') {
                    if (!isSuspended) return false;
                } else if (p_tabFilter === 'no-date') {
                    if (p.releaseDateVal && p.releaseDateVal !== 0) return false;
                    if (p.projectStatus !== 'Onboarding') return false;
                } else {
                    if (isReleased || isSuspended || isClosed) return false;
                    
                    if (p_tabFilter === 'active-onboarding' && !(diff !== null && diff <= 45)) return false;
                    if (p_tabFilter === 'upcoming' && !(diff !== null && diff > 45)) return false;
                }
            }

            if (p_colFilters.healthBucket && p_colFilters.healthBucket.length > 0) {
                if (p.score === "N/A" || !p.score) return false;
                let s = Number(p.score);
                let h = window.AvesdoState.settings && window.AvesdoState.settings.scoring ? window.AvesdoState.settings.scoring.thresholds.healthy : 80;
                let w = window.AvesdoState.settings && window.AvesdoState.settings.scoring ? window.AvesdoState.settings.scoring.thresholds.warning : 50;

                let isHealth = s >= h;
                let isWarn = s >= w && s < h;
                let isRisk = s < w;

                let bucketPass = false;
                if (p_colFilters.healthBucket.includes('healthy') && isHealth) bucketPass = true;
                if (p_colFilters.healthBucket.includes('warning') && isWarn) bucketPass = true;
                if (p_colFilters.healthBucket.includes('risk') && isRisk) bucketPass = true;
                if (!bucketPass) return false;
            }

            if(p_colFilters.dateFrom && p.releaseDateVal < p_colFilters.dateFrom) return false;
            if(p_colFilters.dateTo && p.releaseDateVal > p_colFilters.dateTo) return false;
            return true;
        },
        sortCol: p_sort.col, sortAsc: p_sort.asc,
        sortType: p_sort.col === 'releaseDateVal' ? 'date' : (p_sort.col === 'score' ? 'health' : 'string')
    });

    window.currentFilteredProjects = filtered;
    
    if (typeof window.updatePtKPIs === 'function') window.updatePtKPIs(window.AvesdoState.data.projects);
    
    let totalUnits = 0;
    filtered.forEach(p => totalUnits += parseInt(p.units) || 0);

    const totProjEl = document.getElementById('pt-total-projects');
    if(totProjEl) totProjEl.innerText = filtered.length;
    const totEl = document.getElementById('pt-total-units'); 
    if(totEl) totEl.innerText = totalUnits.toLocaleString();

    const allCb = document.getElementById('pt-bulk-select-all');
    if (allCb) {
        if (filtered.length === 0) allCb.checked = false;
        else allCb.checked = filtered.every(p => bulkSelectedProjects.includes(p.id));
    }

    if (filtered.length === 0) { 
        tbody.innerHTML = `<tr><td colspan="${colSpan}" class="px-4 py-16 text-center text-muted-foreground bg-white border-b-0">
            <i data-lucide="folder-search" class="w-12 h-12 mx-auto text-muted mb-4 opacity-50"></i>
            <p class="text-base font-semibold text-foreground mb-1">No Projects Found</p>
            <p class="text-sm text-muted-foreground mb-6 max-w-md mx-auto">It looks like there are no projects matching your current filters. You can clear your filters, or add a new project below.</p>
            <button onclick="window.openModal('modal-add-project')" class="inline-flex items-center justify-center gap-2 rounded-md text-sm font-medium transition-all duration-200 active:scale-95 bg-primary text-primary-foreground hover:bg-primary/90 shadow-sm px-5 py-2.5 mx-auto focus-visible:outline-none focus-visible:ring-[3px] focus-visible:ring-primary/20">
                <i data-lucide="plus" class="w-4 h-4"></i> Add New Project
            </button>
        </td></tr>`;
        window.renderActiveFilters(); window.renderParkingLot(); 
        if(typeof lucide !== 'undefined' && lucide.createIcons) lucide.createIcons(); 
        return;
    }

    let visibleProjects = filtered.slice(0, p_displayLimit);
    let tableHtml = visibleProjects.map(p => window.buildProjectRow(p, showScore)).join('');
    
    if (p_displayLimit < filtered.length) {
        let remaining = filtered.length - p_displayLimit;
        tableHtml += `<tr id="pt-load-more-row"><td colspan="${colSpan}" class="py-6 text-center border-0"><button onclick="window.loadMoreProjects()" class="inline-flex items-center justify-center rounded-md text-sm font-medium transition-all duration-200 active:scale-95 border border-input bg-white hover:bg-[#f8fafc] hover:text-accent-foreground h-9 px-6 shadow-sm"><i data-lucide="chevron-down" class="w-4 h-4 mr-2"></i>Load More (${remaining} Remaining)</button></td></tr>`;
    }
    
    if (isAppend) {
        const btnRow = document.getElementById("pt-load-more-row");
        if (btnRow) btnRow.remove();
        tbody.insertAdjacentHTML('beforeend', tableHtml);
    } else {
        tbody.innerHTML = tableHtml;
        if (!isSilent) {
            tbody.style.animation = 'none';
            void tbody.offsetHeight; 
            tbody.style.animation = 'fadeIn 0.3s ease-out forwards';
        }
    }
    
    const calView = document.getElementById('tracker-calendar-view');
    if (calView && !calView.classList.contains('hidden')) { window.renderCalendar(); }
    window.renderActiveFilters(); window.renderParkingLot(); 
    if(typeof lucide !== 'undefined' && lucide.createIcons) lucide.createIcons();
};

window.updateProjectInline = function(id, field, val) {
  let proj = window.AvesdoState.data.projects.find(p => p.id === id); if(!proj) return;
  const oldVal = proj[field] || 'Not Set'; const newVal = val === 'Not Set' ? '' : val;
  if (oldVal === newVal) return; 
  proj[field] = newVal; 
  if(typeof window.calculateProjectScore === 'function') window.calculateProjectScore(proj);
  const fieldNames = { assignee: "Manager", projectStatus: "Status", timelineStatus: "Timeline", onboardingPhase: "Phase", checklistUrl: "Checklist URL", kyc: "KYC Details", csat: "Onboarding CSAT", units: "Units" };
  if(typeof window.addAutoLog === 'function') window.addAutoLog('project', id, `Updated ${fieldNames[field] || field} to '${newVal || 'Not Set'}'`);
  if (field === 'timelineStatus' && newVal === 'Released') { 
      proj.onboardingPhase = 'Released';
      proj.projectStatus = 'Active'; 
      if(typeof window.setProjectDateToToday === 'function') window.setProjectDateToToday(proj); 
      if(typeof window.addAutoLog === 'function') window.addAutoLog('project', id, `Auto-updated Phase to Released, Status to Active, and Date to Today`);
      (proj.clientIds || []).forEach(cId => { if(typeof window.addAutoLog === 'function') window.addAutoLog('client', cId, `Project '${proj.name}' was released.`); });
  } 
  else if (field === 'onboardingPhase' && newVal === 'Released') { 
      proj.timelineStatus = 'Released';
      proj.projectStatus = 'Active'; 
      if(typeof window.setProjectDateToToday === 'function') window.setProjectDateToToday(proj); 
      if(typeof window.addAutoLog === 'function') window.addAutoLog('project', id, `Auto-updated Timeline to Released, Status to Active, and Date to Today`);
      (proj.clientIds || []).forEach(cId => { if(typeof window.addAutoLog === 'function') window.addAutoLog('client', cId, `Project '${proj.name}' was released.`); });
  } 
  else if (field === 'timelineStatus' && newVal === 'Indefinitely Delayed') { 
      proj.releaseDate = "";
      proj.releaseDateVal = 0; proj.releaseDateStr = "No Date"; 
      if(typeof window.addAutoLog === 'function') window.addAutoLog('project', id, `Auto-cleared Release Date due to Indefinite Delay.`);
  }
  
  if (field === 'projectStatus' && newVal === 'Closed') { 
      (proj.clientIds || []).forEach(cId => { if(typeof window.addAutoLog === 'function') window.addAutoLog('client', cId, `Project '${proj.name}' status changed to Closed.`); });
  }
 
  if(typeof window.calculateAllScores === 'function') window.calculateAllScores(); 
  
  window.renderProjectTracker(false, true); 
  if (typeof window.populateHeaderProjectDropdown === 'function') window.populateHeaderProjectDropdown();
  
  if(typeof window.renderDashboard === 'function') window.renderDashboard();
  if(typeof window.syncProject === 'function') window.syncProject(id);
  const clientDrawer = document.getElementById('clientDrawer');
  if(window.AvesdoState.ui.activeClient && clientDrawer && !clientDrawer.classList.contains('translate-x-full') && (proj.clientIds || []).includes(window.AvesdoState.ui.activeClient.clientId)) { 
      window.AvesdoState.ui.activeClient = window.AvesdoState.data.clients.find(c => c.clientId === window.AvesdoState.ui.activeClient.clientId) || window.AvesdoState.ui.activeClient;
      if(typeof window.openDrawer === 'function') window.openDrawer(window.AvesdoState.ui.activeClient, cd_activeTab);
  }
  const pDrawer = document.getElementById('projectDrawer');
  if(window.AvesdoState.ui.activeProjectId === id && pDrawer && !pDrawer.classList.contains('translate-x-full')) { 
       if(typeof window.openProjectDrawer === 'function') window.openProjectDrawer(id, window.pd_activeTab);
  }
}

// ==========================================
window.toggleBulkSelectAll = function(isChecked) {
    const checkboxes = document.querySelectorAll('.pt-bulk-checkbox');
    checkboxes.forEach(cb => {
        cb.checked = isChecked;
        if(isChecked && !bulkSelectedProjects.includes(cb.value)) bulkSelectedProjects.push(cb.value);
        else if(!isChecked) bulkSelectedProjects = bulkSelectedProjects.filter(id => id !== cb.value);
    });
    window.updateBulkActionBar();
}

window.toggleBulkSelect = function(id, isChecked) {
    if(isChecked && !bulkSelectedProjects.includes(id)) bulkSelectedProjects.push(id);
    else if(!isChecked) bulkSelectedProjects = bulkSelectedProjects.filter(pId => pId !== id);
    
    const allCb = document.getElementById('pt-bulk-select-all');
    const visibleCbs = document.querySelectorAll('.pt-bulk-checkbox');
    if(allCb && visibleCbs.length > 0) {
        const allChecked = Array.from(visibleCbs).every(cb => cb.checked);
        allCb.checked = allChecked;
    }
    window.updateBulkActionBar();
}

window.clearBulkSelection = function() {
    bulkSelectedProjects = [];
    const allCb = document.getElementById('pt-bulk-select-all');
    if(allCb) allCb.checked = false;
    document.querySelectorAll('.pt-bulk-checkbox').forEach(cb => cb.checked = false);
    window.updateBulkActionBar();
}

window.updateBulkActionBar = function() {
    const bar = document.getElementById('pt-bulk-action-bar');
    const count = document.getElementById('pt-bulk-count');
    if(!bar || !count) return;
    if(bulkSelectedProjects.length > 0) {
        count.innerText = bulkSelectedProjects.length;
        bar.classList.remove('translate-y-24', 'opacity-0', 'pointer-events-none');
    } else {
        bar.classList.add('translate-y-24', 'opacity-0', 'pointer-events-none');
    }
}

window.applyBulkAction = function(field, value, attempt = 1) {
    if(bulkSelectedProjects.length === 0) return;
    if(typeof window.closePopups === 'function') window.closePopups();
    
    if(attempt === 1) window.showSyncToast(`Checking for conflicts...`, true);
    else window.showSyncToast(`Retrying update... (${attempt}/3)`, true);
    
    let updates = {};
    updates[field] = value;

    if (field === 'timelineStatus' && value === 'Released') {
        updates.onboardingPhase = 'Released';
        updates.projectStatus = 'Active';
        let d = new Date(); updates.releaseDate = `${d.getFullYear()}-${String(d.getMonth() + 1).padStart(2, '0')}-${String(d.getDate()).padStart(2, '0')}`;
    }
    if (field === 'onboardingPhase' && value === 'Released') {
        updates.timelineStatus = 'Released';
        updates.projectStatus = 'Active';
        let d = new Date(); updates.releaseDate = `${d.getFullYear()}-${String(d.getMonth() + 1).padStart(2, '0')}-${String(d.getDate()).padStart(2, '0')}`;
    }

    google.script.run.withSuccessHandler(function(serverTime) {
        if (attempt === 1 && window.lastKnownSync && window.lastKnownSync !== "0" && serverTime !== "0" && serverTime !== window.lastKnownSync) {
            window.showSyncToast("Conflict: Another user updated data. Refreshing...", false, true);
            if(typeof window.runSyncCheck === 'function') window.runSyncCheck(true);
            return;
        }

        if (attempt === 1) {
            window.showSyncToast(`Updating ${bulkSelectedProjects.length} projects...`, true);
             bulkSelectedProjects.forEach(id => {
                let p = window.AvesdoState.data.projects.find(x => x.id === id);
                if(p) {
                    p[field] = value;
                    if(field === 'timelineStatus' && value === 'Released') { p.onboardingPhase = 'Released'; p.projectStatus = 'Active'; if(typeof window.setProjectDateToToday === 'function') window.setProjectDateToToday(p); }
                    if(field === 'onboardingPhase' && value === 'Released') { p.timelineStatus = 'Released'; p.projectStatus = 'Active'; if(typeof window.setProjectDateToToday === 'function') window.setProjectDateToToday(p); }
                    
                    if(typeof window.calculateProjectScore === 'function') window.calculateProjectScore(p);
                }
            });

            if(typeof window.calculateAllScores === 'function') window.calculateAllScores();
            window.renderProjectTracker(false, true);
            if(typeof window.renderDashboard === 'function') window.renderDashboard();
        }
        
        google.script.run
            .withSuccessHandler((res) => {
                if(res.success) {
                    if(typeof window.showSyncToast === 'function') window.showSyncToast("Bulk update successful!");
                    window.clearBulkSelection();
                    google.script.run.withSuccessHandler(t => window.lastKnownSync = t).checkGlobalTimestamp();
                } else {
                    if(attempt < 3) window.applyBulkAction(field, value, attempt + 1);
                    else if(typeof window.showSyncToast === 'function') window.showSyncToast("Bulk update failed", false, true);
                }
            })
            .withFailureHandler((err) => {
                if (err.message && err.message.includes("SYNC_CONFLICT")) {
                    window.showSyncToast("Conflict: Data modified during save. Refreshing...", false, true);
                    if(typeof window.runSyncCheck === 'function') window.runSyncCheck(true);
                }
                else if(attempt < 3) window.applyBulkAction(field, value, attempt + 1);
                else {
                     if(typeof window.showSyncToast === 'function') window.showSyncToast("Connection error", false, true);
                     console.error("Bulk Action Error:", err);
                }
            })
            .bulkUpdateProjects(bulkSelectedProjects, updates, window.lastKnownSync);

    }).checkGlobalTimestamp();
}

window.toggleClientArrayItem = function(id, cId, cName) { 
    let p = window.AvesdoState.data.projects.find(x => x.id === id); if(!p) return;
    p.clientIds = p.clientIds || []; 
    p.clients = p.clients || [];
    
    if (p.clientIds.includes(cId)) { 
        p.clientIds = p.clientIds.filter(v => v !== cId);
        p.clients = p.clients.filter(v => v !== cName);
        if(typeof window.addAutoLog === 'function') window.addAutoLog('project', id, `Removed Client: ${cName}`);
    } else { 
        p.clientIds.push(cId); 
        p.clients.push(cName);
        if(typeof window.addAutoLog === 'function') window.addAutoLog('project', id, `Added Client: ${cName}`);

window.syncProject = function(id) {
    let p = window.AvesdoState.data.projects.find(x => x.id === id);
    if(!p) return;

    window.universalSync({
        type: 'projects',
        id: id,
        entity: p,
        apiAction: 'updateProject',
        successMsg: 'Project Saved',
        onRollback: (isPreCheck) => {
            if (!isPreCheck) {
                window.calculateProjectScore(p);
                (p.clientIds || []).forEach(cId => {
                    let parentClient = window.AvesdoState.data.clients.find(c => c.clientId === cId);
                    if (parentClient) window.calculateClientScore(parentClient);
                });
            }
            if(typeof window.renderProjectTracker === 'function') window.renderProjectTracker(false, true);
            if(document.getElementById('projectDrawer') && !document.getElementById('projectDrawer').classList.contains('translate-x-full')) {
                if(typeof window.openProjectDrawer === 'function') window.openProjectDrawer(p.id, window.pd_activeTab);

window.renderCalendar = function() {
  try {
    const container = document.getElementById('calendar-container');
    const monthYearHeader = document.getElementById('calendar-month-year'); if(!container) return; container.innerHTML = "";
    const year = currentDate.getFullYear(); const month = currentDate.getMonth();
    const monthNames = ["January", "February", "March", "April", "May", "June", "July", "August", "September", "October", "November", "December"];
    if(monthYearHeader) {
        monthYearHeader.innerHTML = `<span>${monthNames[month]} ${year}</span>`;
    }
    
    let htmlStr = "";
    const days = ['Sun', 'Mon', 'Tue', 'Wed', 'Thu', 'Fri', 'Sat']; days.forEach(d => htmlStr += `<div class="calendar-header-cell bg-white border-b border-border shadow-sm">${d}</div>`);
    const firstDay = new Date(year, month, 1).getDay(); const daysInMonth = new Date(year, month + 1, 0).getDate();
    const daysInPrevMonth = new Date(year, month, 0).getDate();
    
    for (let i = firstDay - 1; i >= 0; i--) { htmlStr += `<div class="calendar-day bg-slate-100 border border-transparent"><div class="text-xs font-medium mb-2 opacity-40 text-muted-foreground">${daysInPrevMonth - i}</div></div>`; }
    
    for (let day = 1; day <= daysInMonth; day++) {
      const dateStr = `${year}-${String(month + 1).padStart(2, '0')}-${String(day).padStart(2, '0')}`;
      let dayProjects = window.AvesdoState.data.projects.filter(p => p.releaseDate === dateStr && p.projectStatus !== 'Closed'); dayProjects.sort((a, b) => (a.name || '').localeCompare(b.name || ''));
      const isWeekend = (firstDay + day - 1) % 7 === 0 || (firstDay + day - 1) % 7 === 6; 
      
      let dayBgClass = 'bg-white';
      if (window.isToday(day, month, year)) dayBgClass = 'bg-primary/5 ring-inset ring-2 ring-primary';
      else if (isWeekend) dayBgClass = 'bg-slate-50';

      const maxVisible = 3; const visibleProjs = dayProjects.slice(0, maxVisible);
      const hiddenCount = dayProjects.length - maxVisible;
      
      const renderProjBlock = (p) => { 
          let tlProps = window.getBadgeProps('timeline', p.timelineStatus);
          let cName = tlProps.colorKey; 
          let bgClass, borderClass, textClass;
          if(cName === 'green') { bgClass='bg-lime-500/10'; borderClass='border-lime-500/20'; textClass='text-lime-700'; } 
          else if(cName === 'red') { bgClass='bg-destructive/10'; borderClass='border-destructive/20'; textClass='text-destructive'; } 
          else if(cName === 'orange') { bgClass='bg-orange-500/10'; borderClass='border-orange-500/20'; textClass='text-orange-700'; } 
          else if(cName === 'blue') { bgClass='bg-blue-500/10'; borderClass='border-blue-500/20'; textClass='text-blue-700'; } 
          else if(cName === 'purple') { bgClass='bg-purple-500/10'; borderClass='border-purple-500/20'; textClass='text-purple-700'; } 
          else if(cName === 'fuchsia') { bgClass='bg-fuchsia-500/10'; borderClass='border-fuchsia-500/20'; textClass='text-fuchsia-700'; } 
          else if(cName === 'sky') { bgClass='bg-sky-500/10'; borderClass='border-sky-500/20'; textClass='text-sky-700'; } 
          else if(cName === 'indigo') { bgClass='bg-indigo-500/10'; borderClass='border-indigo-500/20'; textClass='text-indigo-700'; } 
          else { bgClass='bg-muted'; borderClass='border-border'; textClass='text-muted-foreground'; }
          
          let pName = window.sanitizeHTML(p.name || 'Unnamed');
          let mgr = window.sanitizeHTML(p.assignee || 'Not Set'); let pPhase = window.sanitizeHTML(p.onboardingPhase || 'Not Started');
          return `<div class="p-1.5 mb-1 rounded border ${bgClass} ${borderClass} cursor-pointer hover:shadow-md transition-all group" onclick="if(typeof window.openProjectDrawer === 'function') window.openProjectDrawer('${p.id}')"><div class="font-bold truncate ${textClass} group-hover:opacity-80 leading-tight mb-0.5 text-[11px]">${pName}</div><div class="truncate text-[10px] ${textClass} opacity-80 font-semibold leading-none">${mgr} • ${pPhase}</div></div>`;
      };
      
      let projectHtml = visibleProjs.map(renderProjBlock).join('');
      if(hiddenCount > 0) { 
          const allProjectsHtml = dayProjects.map(renderProjBlock).join('');
          projectHtml += `<div class="relative w-full text-center mt-1"><button onclick="if(typeof window.togglePop === 'function') window.togglePop(event, 'pop-more-${dateStr}')" class="text-[11px] font-bold text-muted-foreground hover:text-primary transition-colors bg-white border border-border hover:bg-slate-50 w-full py-1 rounded-md shadow-sm radix-trigger active:scale-95 duration-200">+${hiddenCount} More</button><div id="pop-more-${dateStr}" class="radix-popover w-56 p-2 shadow-xl border border-border rounded-xl z-[90]"><div class="text-xs font-bold text-muted-foreground mb-2 pb-2 border-b border-border">${monthNames[month]} ${day}, ${year}</div><div class="max-h-64 overflow-y-auto space-y-1 text-left flex flex-col">${allProjectsHtml}</div></div></div>`;
      }
      htmlStr += `<div class="calendar-day border border-border/50 ${dayBgClass} relative" onmouseenter="this.style.zIndex=50" onmouseleave="this.style.zIndex=1"><div class="text-xs font-bold mb-2 ${window.isToday(day, month, year) ? 'text-primary' : 'text-foreground opacity-70'}">${day}</div><div class="space-y-1 w-full flex-1 flex flex-col">${projectHtml}</div></div>`;
    }
    
    const totalCells = firstDay + daysInMonth;
    const trailingCells = totalCells % 7 === 0 ? 0 : 7 - (totalCells % 7);
    for(let i = 1; i <= trailingCells; i++) { htmlStr += `<div class="calendar-day bg-slate-100 border border-transparent"><div class="text-xs font-medium mb-2 opacity-40 text-muted-foreground">${i}</div></div>`; }
    
    container.innerHTML = htmlStr;
    if(typeof lucide !== 'undefined' && lucide.createIcons) lucide.createIcons();
  } catch (err) { console.error("Calendar render error:", err); }
}

window.changeMonth = function(step, isTodaySnap = false) { 
    if (isTodaySnap) { currentDate = new Date(); } else { currentDate.setMonth(currentDate.getMonth() + step); } 
    window.renderCalendar();
}

window.isToday = function(d, m, y) { 
    const today = new Date();
    return d === today.getDate() && m === today.getMonth() && y === today.getFullYear();
}

window.setProjectDateToToday = function(proj) { 
    let today = new Date(); 
    let yyyy = today.getFullYear();
    let mm = String(today.getMonth() + 1).padStart(2, '0'); 
    let dd = String(today.getDate()).padStart(2, '0'); 
    let val = `${yyyy}-${mm}-${dd}`; 
    proj.releaseDate = val;
    proj.releaseDateVal = new Date(yyyy, today.getMonth(), today.getDate()).getTime(); 
    proj.releaseDateStr = new Date(yyyy, today.getMonth(), today.getDate()).toLocaleDateString('en-US', {month: 'short', day: 'numeric', year: 'numeric'});
}

window.updateProjectDateData = function(id, val) {
  let proj = window.AvesdoState.data.projects.find(p => p.id === id);
  if(!proj) return; 
  const oldVal = proj.releaseDateStr || "No Date"; const isValidFormat = /^\d{4}-\d{2}-\d{2}$/.test(val);
  if (val && isValidFormat) { 
      proj.releaseDate = val; 
      let parts = val.split('-');
      let d = new Date(parts[0], parts[1]-1, parts[2]); 
      proj.releaseDateVal = d.getTime(); 
      proj.releaseDateStr = d.toLocaleDateString('en-US', {month: 'short', day: 'numeric', year: 'numeric'});
  } else if (!val) { 
      proj.releaseDate = ""; proj.releaseDateVal = 0;
      proj.releaseDateStr = "No Date"; 
  }
  
  if(oldVal !== proj.releaseDateStr) { if(typeof window.addAutoLog === 'function') window.addAutoLog('project', id, `Updated Release Date from '${oldVal}' to '${proj.releaseDateStr}'`); }
  
  const triggerSpan = document.getElementById(`trig-date-text-${id}`); if(triggerSpan) triggerSpan.innerText = proj.releaseDateStr;
  const pdTriggerSpan = document.getElementById(`pd-trig-date-text`);
  if(pdTriggerSpan && id === window.AvesdoState.ui.activeProjectId) pdTriggerSpan.innerText = proj.releaseDateStr;
  const textInput = document.getElementById(`date-text-${id}`);
  if(textInput && textInput.value !== val) textInput.value = val || "";
  
  window.renderProjectTracker(false, true); 
  if(typeof window.renderDashboard === 'function') window.renderDashboard();
  if(typeof window.syncProject === 'function') window.syncProject(id);
}

      if(popClients) popClients.innerHTML = (window.AvesdoState.data.globalClients || []).map(c => `<label class="radix-item hover:bg-[#f1f5f9] cursor-pointer p-1.5 rounded-md"><input type="checkbox" class="w-3.5 h-3.5 rounded border-input text-primary focus:border-primary focus:ring-[3px] focus:ring-primary/20 transition-all shadow-sm outline-none" onchange="window.toggleClientArrayItem('${p.id}', '${c.id}', '${window.sanitizeHTML(c.name).replace(/'/g, "\\'")}')" ${(p.clientIds||[]).includes(c.id)?'checked':''}> <span class="truncate text-sm font-medium text-foreground">${window.sanitizeHTML(c.name)}</span></label>`).join('');
      const popStatus = document.getElementById('pd-pop-status');
      if(popStatus) popStatus.innerHTML = pt_statuses.map(s => `<div class="radix-item font-medium rounded-md" onclick="window.updateDrawerField('projectStatus', '${s}')">${window.sanitizeHTML(s)}</div>`).join('');
      const popPhase = document.getElementById('pd-pop-phase');
      if(popPhase) popPhase.innerHTML = pt_phases.map(ph => `<div class="radix-item font-medium rounded-md" onclick="window.updateDrawerField('onboardingPhase', '${ph}')">${window.sanitizeHTML(ph)}</div>`).join('');
      const popTimeline = document.getElementById('pd-pop-timeline');
      if(popTimeline) popTimeline.innerHTML = pt_timelines.map(t => `<div class="radix-item font-medium rounded-md" onclick="window.updateDrawerField('timelineStatus', '${t}')">${window.sanitizeHTML(t)}</div>`).join('');
      const popMgr = document.getElementById('pd-pop-manager');
      if(popMgr) popMgr.innerHTML = pt_managers.map(m => `<div class="radix-item font-medium rounded-md" onclick="window.updateDrawerField('assignee', '${m}')">${window.sanitizeHTML(m)}</div>`).join('') + `<div class="radix-item font-medium text-muted-foreground border-t border-border mt-1 pt-1 rounded-md" onclick="window.updateDrawerField('assignee', '')">Clear Selection</div>`;
      
      const chkHtml = p.checklistUrl ? `<div class="flex items-center gap-1.5"><a href="${encodeURI(p.checklistUrl)}" target="_blank" onclick="event.stopPropagation()" class="inline-flex shrink-0 items-center justify-center text-sm font-medium whitespace-nowrap transition-all border border-input bg-white shadow-sm hover:bg-[#f8fafc] hover:text-accent-foreground h-9 px-4 gap-1.5 rounded-md active:scale-95 duration-200">Open Link <i data-lucide="external-link" class="w-3.5 h-3.5"></i></a><button onclick="navigator.clipboard.writeText('${encodeURI(p.checklistUrl)}'); if(typeof window.showSyncToast === 'function') window.showSyncToast('URL Copied');" class="inline-flex shrink-0 items-center justify-center rounded-md text-sm font-medium transition-all hover:bg-[#f8fafc] hover:text-accent-foreground h-9 w-9 bg-white border border-input shadow-sm active:scale-95 duration-200" title="Copy URL"><i data-lucide="copy" class="w-4 h-4"></i></button></div>` : `<span class="text-muted-foreground text-xs italic">None</span>`;
      window.safeSet('pd-chk-view', 'innerHTML', chkHtml); window.safeSet('pd-input-chk-pop', 'value', p.checklistUrl || "");

      const pct = Math.round(((p.features||[]).length / pt_features.length) * 100); 
      let fProps = window.getFeatureBadgeProps(pct);
      
      window.safeSet('pd-feat-text', 'innerText', `${pct}% Active`);
      const featBar = document.getElementById('pd-feat-bar'); if(featBar) { featBar.style.width = pct + "%"; featBar.className = `h-full rounded-full transition-all duration-500 ${fProps.fill}`; }
      
      const featToggles = document.getElementById('pd-feat-toggles');
      if(featToggles) { 
          featToggles.innerHTML = pt_features.map(f => {
              let isActive = (p.features||[]).includes(f);
              let borderClass = isActive ? 'border-primary bg-primary/5 shadow-sm' : 'border-border bg-white hover:border-primary/40';
              let textClass = isActive ? 'text-primary' : 'text-muted-foreground';
              return `<label class="flex items-center gap-3 cursor-pointer p-3 rounded-xl border ${borderClass} transition-all duration-200 group">
                  <input type="checkbox" class="w-4 h-4 rounded border-input text-primary outline-none focus:border-primary focus:ring-[3px] focus:ring-primary/20 transition-all shadow-sm" onchange="window.updateDrawerArray('features', '${f}')" ${isActive?'checked':''}>
                  <span class="text-sm font-bold ${textClass} group-hover:text-primary transition-colors">${window.sanitizeHTML(f)}</span>
              </label>`;
          }).join(''); 
      }

      window.safeSet('pd-score-feat-count', 'innerText', `${(p.features||[]).length} of ${pt_features.length}`);

      let csatNumeric = "N/A";
      if(p.csat === 'Satisfied') csatNumeric = 100; else if(p.csat === 'Neutral') csatNumeric = 50; else if(p.csat === 'Dissatisfied') csatNumeric = 0;
      const updatePillar = (idVal, idBar, val) => {
          let el = document.getElementById(idVal); let bar = document.getElementById(idBar);
          if (el) {
              let props = window.getHealthBadgeProps(val);
              el.innerText = val !== "N/A" && val !== null ? val : '0';
              el.className = `w-8 text-right font-bold text-xl tabular-nums transition-colors ${props.text}`;
              if (bar) { bar.style.width = `${val !== "N/A" && val !== null ? val : 0}%`; bar.className = `h-full transition-all ${props.fill}`; }
          }
      };

      updatePillar('pd-score-op-val', 'pd-score-op-bar', p.opActivity || 0);
      updatePillar('pd-score-usr-val', 'pd-score-usr-bar', p.userVol || 0);
      updatePillar('pd-score-feat-val', 'pd-score-feat-bar', pct);
      updatePillar('pd-score-csat-val', 'pd-score-csat-bar', csatNumeric);
      
      window.safeSet('pd-csat-text', 'innerText', p.csat || 'No Rating');

      if(typeof window.renderProjectNotes === 'function') window.renderProjectNotes(p);
      if(typeof window.renderProjectDrawerServicesList === 'function') window.renderProjectDrawerServicesList(p);
      
      const dWrap = document.getElementById('pd-kyc-display'); const eWrap = document.getElementById('pd-kyc-edit'); const txt = document.getElementById('pd-kyc-textarea');
      if(dWrap) { dWrap.classList.remove('hidden'); dWrap.innerText = p.kyc || 'No KYC details provided.'; }
      if(eWrap) eWrap.classList.add('hidden');
      if(txt) txt.value = p.kyc || '';
      
      const delBtn = document.querySelector('#projectDrawer button[onclick*="deleteActiveProject"]');
      if(delBtn) {
          delBtn.dataset.confirm = '';
          if(delBtn.dataset.originalCssText) delBtn.style.cssText = delBtn.dataset.originalCssText;
          if(delBtn.dataset.originalHtml) delBtn.innerHTML = delBtn.dataset.originalHtml;
          delBtn.classList.remove('border-destructive', 'bg-destructive/10', 'text-destructive', 'shadow-md');
      }

      if(typeof window.switchProjectTab === 'function') window.switchProjectTab(targetTab);
      
      const overlay = document.getElementById('projectDrawerOverlay'); if(overlay) { overlay.classList.remove('hidden'); setTimeout(() => overlay.classList.remove('opacity-0'), 10); }
      drawer.classList.remove('translate-x-full');
      if(typeof lucide !== 'undefined' && lucide.createIcons) lucide.createIcons({ root: document.getElementById('projectDrawer') });
} catch (err) { console.error("Error opening project drawer", err); }
}

window.deleteActiveProject = function() {
    if (!window.AvesdoState.ui.activeProjectId) return;
    const btn = document.querySelector('#projectDrawer button[onclick*="deleteActiveProject"]');
   
    if (btn) {
        if (!btn.dataset.confirm) {
            btn.dataset.confirm = 'true';
            btn.dataset.originalHtml = btn.innerHTML;
            btn.dataset.originalCssText = btn.style.cssText;
           
            btn.innerHTML = `<span class="text-destructive font-bold flex items-center gap-1.5 whitespace-nowrap"><i data-lucide="alert-triangle" class="w-4 h-4 shrink-0"></i> Confirm Delete</span>`;
            btn.classList.add('border-destructive', 'bg-destructive/10', 'shadow-md');
            btn.style.position = 'absolute';
            btn.style.right = '3.5rem';
            btn.style.zIndex = '50';
           
            if(typeof lucide !== 'undefined') lucide.createIcons();
           
            setTimeout(() => {
                if (btn && btn.dataset.confirm === 'true') {
                    btn.dataset.confirm = '';
                    btn.innerHTML = btn.dataset.originalHtml;
                    btn.style.cssText = btn.dataset.originalCssText || '';
                    btn.classList.remove('border-destructive', 'bg-destructive/10', 'shadow-md');
                    if(typeof lucide !== 'undefined') lucide.createIcons();
                }
            }, 3000);
            return;
        }
    } else {
        if(!confirm("Are you sure you want to delete this project?")) return;
    }
   
    let pId = window.AvesdoState.ui.activeProjectId;
    let proj = window.AvesdoState.data.projects.find(p => p.id === pId);
    
    window.AvesdoState.data.projects = window.AvesdoState.data.projects.filter(x => x.id !== pId);
    
    bulkSelectedProjects = bulkSelectedProjects.filter(id => id !== pId);
    if(typeof window.updateBulkActionBar === 'function') window.updateBulkActionBar();
    
    if(proj && proj.clientIds) {
        proj.clientIds.forEach(cId => {
            let c = window.AvesdoState.data.clients.find(x => x.clientId === cId);
            if (c) window.calculateClientScore(c);
        });
    }

    let syncDelay = 0;
    if (typeof window.AvesdoState.data.services !== 'undefined') {
        window.AvesdoState.data.services.forEach(s => {
            if (s.projectId === pId) {
                s.projectId = '';
                s.projectName = 'Client Level';
                setTimeout(() => { if(typeof window.syncService === 'function') window.syncService(s.id, 1, "Removed deleted project"); }, syncDelay);
                syncDelay += 800;
            }
        });
    }

    window.closeProjectDrawer();
    if (typeof window.renderProjectTracker === 'function') window.renderProjectTracker(false, true);
    if (typeof window.applyFiltersAndSort === 'function') window.applyFiltersAndSort(false, true); 
    
    if (typeof window.populateServiceDropdowns === 'function') window.populateServiceDropdowns();
    if (typeof window.populateHeaderProjectDropdown === 'function') window.populateHeaderProjectDropdown();
    
    if (typeof window.renderDashboard === 'function') window.renderDashboard(true);
   
    if(typeof window.showSyncToast === 'function') window.showSyncToast("Deleting...", true);
    google.script.run
        .withSuccessHandler((res) => {
            if(res.success) {
                if(typeof window.hideSyncToast === 'function') window.hideSyncToast("Project Deleted");
                google.script.run.withSuccessHandler(t => window.lastKnownSync = t).checkGlobalTimestamp();
            }
        })
        .withFailureHandler((err) => {
            if (err.message === "SYNC_CONFLICT") {
                window.showSyncToast("Conflict: Could not delete, data out of sync. Refreshing...", false, true);
                if(typeof window.runSyncCheck === 'function') window.runSyncCheck(true);
            } else {
                window.showSyncToast("Failed to delete.", false, true);
            }
        })
        .deleteProjectRecord(pId, window.lastKnownSync);
}

window.updateDrawerField = function(field, val) { 
    if(!window.AvesdoState.ui.activeProjectId) return;
    if(typeof window.closePopups === 'function') window.closePopups(); 
    window.updateProjectInline(window.AvesdoState.ui.activeProjectId, field, val); 
    if(typeof window.openProjectDrawer === 'function') window.openProjectDrawer(window.AvesdoState.ui.activeProjectId, window.pd_activeTab);
}

window.toggleKycEdit = function(editing) {
    let p = window.AvesdoState.data.projects.find(x => x.id === window.AvesdoState.ui.activeProjectId);
    if(!p) return;
    const dWrap = document.getElementById('pd-kyc-display'); const eWrap = document.getElementById('pd-kyc-edit'); const txt = document.getElementById('pd-kyc-textarea');
    if (editing) { 
        if(dWrap) dWrap.classList.add('hidden'); 
        if(eWrap) eWrap.classList.remove('hidden'); 
        if(txt) txt.value = p.kyc || ''; 
    } else { 
        let val = txt ? txt.value : '';
        if(p.kyc !== val) { 
            p.kyc = val;
            if(typeof window.addAutoLog === 'function') window.addAutoLog('project', p.id, 'Updated KYC Details'); 
            if(typeof window.syncProject === 'function') window.syncProject(p.id);
            if(typeof window.renderProjectNotes === 'function') window.renderProjectNotes(p);
        } 
        if(dWrap) { dWrap.classList.remove('hidden'); dWrap.innerText = p.kyc || 'No KYC details provided.'; } 
        if(eWrap) eWrap.classList.add('hidden');
    }
}

window.renderProjectNotes = function(p) { 
    if(typeof window.universalRenderNotes === 'function') window.universalRenderNotes(p.notes, 'pd-NotesList');
};

window.addProjectNote = function() { 
    const t = document.getElementById('pd-newNoteText').value; 
    if (!t.trim() || !window.AvesdoState.ui.activeProjectId) return;
    if(typeof window.addAutoLog === 'function') window.addAutoLog('project', window.AvesdoState.ui.activeProjectId, t); 
    document.getElementById('pd-newNoteText').value = ''; 
    let p = window.AvesdoState.data.projects.find(x => x.id === window.AvesdoState.ui.activeProjectId);
    if(p) { 
        window.renderProjectNotes(p); 
        if(typeof window.syncProject === 'function') window.syncProject(p.id);
    } 
}

window.unscheduleDrawerProject = function() { 
    if(!window.AvesdoState.ui.activeProjectId) return;
    if(typeof window.clearProjectDate === 'function') window.clearProjectDate('pd'); 
    if(typeof window.openProjectDrawer === 'function') window.openProjectDrawer(window.AvesdoState.ui.activeProjectId, window.pd_activeTab);
}

// 9. EXPORTS

window.exportProjectsCSV = function() {
    const dataToExport = window.currentFilteredProjects || window.AvesdoState.data.projects;
    
    if (!dataToExport || dataToExport.length === 0) {
        if(typeof window.showToast === 'function') window.showToast("No data to export.", "error");
        return;
    }

    if(typeof window.showToast === 'function') window.showToast("Preparing export...", "success");

    const headers = ["Project Name", "Clients", "Score", "Release Date", "Manager", "Status", "Timeline", "Phase", "Units", "Features Active", "Checklist URL"];
    const rowMapper = (p) => {
        let name = `"${(p.name || '').replace(/"/g, '""')}"`;
        let clients = `"${(p.clients || []).join(', ').replace(/"/g, '""')}"`;
        let score = p.score === "N/A" || !p.score ? "N/A" : p.score;
        let rDate = `"${(p.releaseDateStr || 'No Date')}"`;
        let mgr = `"${(p.assignee || '').replace(/"/g, '""')}"`;
        let status = `"${(p.projectStatus || '').replace(/"/g, '""')}"`;
        let timeline = `"${(p.timelineStatus || '').replace(/"/g, '""')}"`;
        let phase = `"${(p.onboardingPhase || '').replace(/"/g, '""')}"`;
        let units = p.units || 0;
        let feats = `"${(p.features || []).join(', ').replace(/"/g, '""')}"`;
        let chk = `"${(p.checklistUrl || '').replace(/"/g, '""')}"`;
        return `${name},${clients},${score},${rDate},${mgr},${status},${timeline},${phase},${units},${feats},${chk}`;
    };

    if(typeof window.universalExportCSV === 'function') window.universalExportCSV("Project_Tracker", headers, dataToExport, rowMapper);
};

window.renderProjectDrawerServicesList = function(p) {
    const sList = document.getElementById('pd-svc-list');
    if(!sList) return;
    let pServices = (typeof window.AvesdoState.data.services !== 'undefined') ? window.AvesdoState.data.services.filter(s => s.projectId === p.id) : [];
    if (!pServices || pServices.length === 0) { 
        sList.innerHTML = `<div class="col-span-full flex flex-col items-center justify-center py-12 text-center"><i data-lucide="briefcase" class="w-12 h-12 text-muted-foreground opacity-20 mb-3"></i><p class="text-sm font-medium text-muted-foreground">No services attached to this project.</p></div>`;
        if(typeof lucide !== 'undefined') lucide.createIcons();
        return; 
    }
    
    pServices.sort((a,b) => b.dateVal - a.dateVal);
    
    let html = pServices.map((s) => { 
        let dStr = s.dateVal ? new Date(s.dateVal).toLocaleDateString('en-US', {month: 'short', day: 'numeric', year: 'numeric'}) : (s.dateStr || '-');
        let val = "$" + window.parseCurrency(s.price).toLocaleString('en-US', {minimumFractionDigits: 2, maximumFractionDigits: 2});
        
        let iconName = s.type === 'Included' ? 'package' : 'plus-circle';
        let iconColor = s.type === 'Included' ? 'text-sky-600 bg-sky-500/10' : 'text-emerald-600 bg-emerald-500/10';

        let sName = window.sanitizeHTML(s.name || '-');
        let cName = window.sanitizeHTML(s.clientName || s.projectName || 'No Client attached');

        return `
        <div class="flex justify-between items-center p-3 -mx-2 rounded-lg hover:bg-[#f1f5f9] transition-colors cursor-pointer group border-b border-border/50 last:border-0" onclick="if(typeof window.openServiceDrawer === 'function') window.openServiceDrawer('${s.id}')">
            <div class="flex items-center gap-3 min-w-0 pr-3 w-[70%]">
                <div class="w-8 h-8 rounded-full ${iconColor} flex items-center justify-center shrink-0 shadow-sm border border-black/5">
                    <i data-lucide="${iconName}" class="w-4 h-4"></i>
                </div>
                <div class="flex flex-col min-w-0">
                    <span class="text-sm font-bold text-foreground truncate group-hover:text-primary transition-colors" title="${sName}">${sName}</span>
                    <span class="text-[11px] font-semibold text-muted-foreground mt-0.5 truncate" title="${cName}">${cName}</span>
                </div>
            </div>
            <div class="flex flex-col items-end justify-center shrink-0 w-[30%]">
                <span class="text-sm font-bold text-foreground tabular-nums">${val}</span>
                <span class="text-[11px] text-muted-foreground font-semibold tabular-nums mt-0.5">${dStr}</span>
            </div>
        </div>`;
    }).join('');
    
    sList.innerHTML = html;
    if(typeof lucide !== 'undefined') lucide.createIcons();
}
</script>
