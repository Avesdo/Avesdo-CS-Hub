<script>
// ==========================================
// 1. GLOBALS & STATE
// ==========================================
window.AvesdoState = {
    data: { projects: [], clients: [], services: [], globalClients: [] },
    settings: null,
    ui: { rowCalState: {}, activeClient: null, activeProjectId: null, activeServiceId: null }
};

// 🧹 THE CLEANUP: Removed dead variables
var currentDate = new Date();
var pt_managers = [];
var pt_statuses = [];
var pt_timelines = [];
var pt_phases = [];
var pt_features = [];
var pt_services = [];
var globalTypes = [];

var c_colFilters = { companyName: [], clientType: 'all', accountManager: 'all', healthBucket: 'all' };
var currentKpiFilter = 'all';
var c_sort = { col: 'healthScore', ascending: true };

var drawerSortState = {
    proj_Active: { column: 'releaseDateVal', ascending: false },
    proj_Onboarding: { column: 'releaseDateVal', ascending: true },
    proj_Closed: { column: 'releaseDateVal', ascending: false },
    services: { column: 'dateVal', ascending: false }
};

var p_tabFilter = 'active-onboarding';
var p_sort = { col: 'releaseDateVal', asc: true };
var pd_activeTab = 'details';

var p_colFilters = {
    name: [], clients: [], assignee: 'all', projectStatus: 'all',
    timelineStatus: 'all', onboardingPhase: 'all', releaseFrom: null,
    releaseTo: null, features: []
};

var isServiceModalDirty = false;
var sv_displayLimit = 50;

var dash_amFilter = 'all';
var dashDrilldownData = {};

window.editingSetting = { key: null, idx: -1 };
window.deletingSetting = { key: null, idx: -1 };
var cd_activeTab = 'health';

window.trendChartInstances = {};
window.globalHealthHistory = null;
window.isFetchingHistory = false;

window.currentUser = "System";
window.isInitialLoad = true;
window.lastKnownSync = "0";

// ==========================================
// 2. INITIALIZATION & SETUP
// ==========================================
document.addEventListener('DOMContentLoaded', () => {
    window.AvesdoAPI.run('getInitialAppState', null,
        function(state) {
            if(!state) {
                const errEl = document.getElementById('global-error-state');
                if(errEl) errEl.classList.remove('hidden');
                return;
            }
           
            window.lastKnownSync = state.timestamp;
            window.AvesdoState.settings = state.settings || { managers: [], clientTypes: [],
    serviceTypes: [{name: 'Implementation', color: 'blue', icon: 'tool'}, {name: 'Consulting', color: 'amber', icon: 'briefcase'}, {name: 'Training', color: 'emerald', icon: 'award'}], features: [], services: [], statuses: [], timelines: [], phases: [], scoring: { weights: {}, clientWeights: {}, thresholds: {} } };
           
            if(typeof window.initSettingsUI === 'function') window.initSettingsUI();
           
            window.AvesdoState.data.clients = state.clients || [];
            window.AvesdoState.data.projects = state.projects || [];
            window.AvesdoState.data.services = state.services || [];
           
            window.AvesdoState.data.globalClients = window.AvesdoState.data.clients.map(c => ({ id: c.clientId, name: c.companyName })).sort((a,b) => a.name.localeCompare(b.name));
            window.globalTypes = window.AvesdoState.settings.clientTypes.map(c => typeof c === 'string' ? c : c.name);
            window.pt_managers = window.AvesdoState.settings.managers.map(m => typeof m === 'string' ? m : m.name);
            window.pt_statuses = window.AvesdoState.settings.statuses.map(s => s.name);
            window.pt_timelines = window.AvesdoState.settings.timelines.map(s => s.name);
            window.pt_phases = window.AvesdoState.settings.phases.map(s => s.name);
            window.pt_features = window.AvesdoState.settings.features || [];
            window.pt_services = window.AvesdoState.settings.services || [];

            if (typeof window.setupPtPopovers === 'function') window.setupPtPopovers();
            if (typeof window.populateClientDropdowns === 'function') window.populateClientDropdowns();
            if (typeof window.populateServiceDropdowns === 'function') window.populateServiceDropdowns();
            if (typeof window.populateHeaderProjectDropdown === 'function') window.populateHeaderProjectDropdown();
           
            if (state.user && state.user.name) window.currentUser = state.user.name;

            const initEl = document.getElementById('sidebar-user-initials');
            const nameEl = document.getElementById('sidebar-user-name');
            const emailEl = document.getElementById('sidebar-user-email');
           
            if(initEl && state.user) {
                initEl.innerText = state.user.initials;
                initEl.classList.remove('animate-pulse', 'bg-muted');
                initEl.classList.add('bg-primary', 'text-primary-foreground');
            }
            if(nameEl && state.user) {
                nameEl.innerText = state.user.name;
                nameEl.classList.remove('animate-pulse', 'bg-muted', 'w-24', 'h-4', 'mb-1');
                nameEl.classList.add('text-sm', 'font-medium', 'text-foreground', 'truncate');
            }
            if(emailEl && state.user) {
                emailEl.innerText = state.user.email;
                emailEl.classList.remove('animate-pulse', 'bg-muted', 'w-32', 'h-3');
                emailEl.classList.add('text-xs', 'text-muted-foreground', 'truncate');
            }
           
            window.isInitialLoad = false;
           
            if (typeof window.renderDashboard === 'function') window.renderDashboard();
            if (typeof window.renderProjectTracker === 'function') window.renderProjectTracker(false);
            if (typeof window.applyFiltersAndSort === 'function') window.applyFiltersAndSort(false);
            if (typeof window.renderServiceLedger === 'function') window.renderServiceLedger(false);
        },
        function(err) {
            console.error("Initialization failed:", err);
            const errEl = document.getElementById('global-error-state');
            if(errEl) errEl.classList.remove('hidden');
        }
    );
});

window.runSyncCheck = function(forceRefresh = false) {
    if (forceRefresh) {
        window.location.reload();
    }
};

window.addAutoLog = function(type, id, msg) {
    const d = new Date().toLocaleDateString('en-US', {month: 'short', day: 'numeric', year: 'numeric', hour: 'numeric', minute: '2-digit'});
    const entry = { date: d, user: window.currentUser || "System", text: msg };

    if (type === 'project') {
        let p = window.AvesdoState.data.projects.find(x => x.id === id);
        if (p) {
            p.notes = p.notes || [];
            p.notes.unshift(entry);
            if (window.AvesdoState.ui.activeProjectId === id && document.getElementById('projectDrawer') && !document.getElementById('projectDrawer').classList.contains('translate-x-full')) {
                if(typeof window.renderProjectNotes === 'function') window.renderProjectNotes(p);
            }
        }
    }
    else if (type === 'client') {
        let c = window.AvesdoState.data.clients.find(x => x.clientId === id || x.companyName === id);
        if (c) {
            c.notes = c.notes || [];
            c.notes.unshift(entry);
            if (window.AvesdoState.ui.activeClient && window.AvesdoState.ui.activeClient.clientId === c.clientId && document.getElementById('clientDrawer') && !document.getElementById('clientDrawer').classList.contains('translate-x-full')) {
                if(typeof window.renderClientNotes === 'function') window.renderClientNotes(c);
            }
        }
    }
    else if (type === 'service') {
        let s = window.AvesdoState.data.services.find(x => x.id === id);
        if (s) {
            s.notes = s.notes || [];
            s.notes.unshift(entry);
        }
    }
}

// ==========================================
// 3. ISOLATED SCORING LOGIC
// ==========================================
window.calculateAllScores = function() {
    window.AvesdoState.data.projects.forEach(p => window.calculateProjectScore(p));
    window.AvesdoState.data.clients.forEach(c => window.calculateClientScore(c));
}

window.calculateProjectScore = function(p) {
    if (typeof calculateProjectScoreLogic === 'function') {
        let w = window.AvesdoState.settings ? window.AvesdoState.settings.scoring.weights : { opActivity: 40, featAdoption: 30, userVol: 20, csat: 10 };
        let featLen = pt_features.length > 0 ? pt_features.length : 1;
        p.score = calculateProjectScoreLogic(p, w, featLen);
    } else {
        p.score = "N/A";
    }
    return p.score;
}

window.calculateClientScore = function(c) {
    let clientProjs = window.AvesdoState.data.projects.filter(p => (p.clientIds || []).includes(c.clientId));
    let activeProjs = clientProjs.filter(p => p.projectStatus !== 'Onboarding' && p.projectStatus !== 'Closed');
    
    c.activeProjectCount = activeProjs.length;
    c.onboardingProjectCount = clientProjs.filter(p => p.projectStatus === 'Onboarding').length;
    c.closedProjectCount = clientProjs.filter(p => p.projectStatus === 'Closed').length;

    if (typeof calculateClientScoreLogic === 'function') {
        let cw = window.AvesdoState.settings ? window.AvesdoState.settings.scoring.clientWeights : { billing: 15, engagement: 50, utilization: 25, experience: 10 };
        let featLen = pt_features.length > 0 ? pt_features.length : 1;
        let result = calculateClientScoreLogic(c, activeProjs, cw, featLen);
        c.healthScore = result.healthScore;
        c.metrics = result.metrics;
    } else {
        c.healthScore = "N/A";
        c.metrics = { billing: 100, billingStatus: 'Current', projAct: 0, userAct: 0, feat: 0, csat: "N/A", onbCsat: "N/A", supportCsat: "N/A" };
    }
}

// ==========================================
// 4. MODAL & DRAWER DELEGATION
// ==========================================
window.openAddClientModal = function() {
    window.tempSelectedClients = [];
    document.querySelectorAll('.ap-client-cb:checked').forEach(cb => window.tempSelectedClients.push(cb.value));
    window.openModal('modal-add-client');
}

    window.safeSet('ac-type-text', 'innerText', val);
    document.getElementById('ac-type-text').dataset.val = val;
    window.closePopups();
}

window.setAcMgr = function(val) {
    window.safeSet('ac-mgr-text', 'innerText', val || 'Not Set');
    document.getElementById('ac-mgr-text').dataset.val = val || '';
    window.closePopups();
}

window.setApMgr = function(val) {
    window.safeSet('ap-mgr-text', 'innerText', val || 'Not Set');
    document.getElementById('ap-mgr-text').dataset.val = val || '';
    window.closePopups();
}

window.setAsName = function(name, price = '', preventClose = false) {
    window.safeSet('as-name-text', 'innerText', name);
    document.getElementById('as-name-text').dataset.val = name;
    if(price) window.safeSet('as-price', 'value', String(price).replace(/[^0-9.-]+/g,""));

window.setAsType = function(val) {
    window.safeSet('as-type-text', 'innerText', val);
    document.getElementById('as-type-text').dataset.val = val;
    const priceContainer = document.getElementById('as-price-container');

            priceContainer.classList.remove('hidden');

        }

window.setAsMgr = function(val) {
    window.safeSet('as-mgr-text', 'innerText', val || 'Not Set');

}

// 🧹 THE CLEANUP: Removed the duplicate `closeModal` and `closeAllModals` functions from here. 
// They are safely defined and executed from JS_Utilities.html.

// ==========================================
// 5. NEW ENTRY SAVING LOGIC
// ==========================================
window.saveNewClient = function() {
    if (window.isSavingClientRecord) return;

    try {
        const name = document.getElementById('ac-name').value.trim();
        const type = document.getElementById('ac-type-text').dataset.val;
        const mgr = document.getElementById('ac-mgr-text').dataset.val;
        const note = document.getElementById('ac-note').value;
       
        if (!window.validateForm('ac-error', [
            { isInvalid: !name || !type || type === 'Select Type', message: "Company Name and Client Type are required." },
            { isInvalid: window.AvesdoState.data.clients.some(c => c.companyName.toLowerCase() === name.toLowerCase()), message: "A client with this name already exists." }
        ])) return;
       
        window.isSavingClientRecord = true;

        const newC = {
            clientId: window.generateId('C'),
            companyName: name,
            clientType: type,
            accountManager: mgr,
            healthScore: "N/A",
            activeProjectCount: 0,
            onboardingProjectCount: 0,
            closedProjectCount: 0,
            metrics: { billing:100, projAct:0, userAct:0, feat:0, csat:0 },
            projectList: [],
            notes: []
        };

        window.AvesdoState.data.clients.push(newC);
        if (!window.AvesdoState.data.globalClients) window.AvesdoState.data.globalClients = [];
        window.AvesdoState.data.globalClients.push({id: newC.clientId, name: name});
        window.AvesdoState.data.globalClients.sort((a,b) => a.name.localeCompare(b.name));
        window.addAutoLog('client', newC.clientId, `Client profile created.`);
        if (note) window.addAutoLog('client', newC.clientId, `Initial Note: ${note}`);
       
        if(typeof window.populateClientDropdowns === 'function') window.populateClientDropdowns();
        if(typeof window.setupPtPopovers === 'function') window.setupPtPopovers();
        if(typeof window.populateServiceDropdowns === 'function') window.populateServiceDropdowns();
       
        if(typeof window.applyFiltersAndSort === 'function') window.applyFiltersAndSort(false, true);
        if(typeof window.renderDashboard === 'function') window.renderDashboard(true);

        window.syncClient(newC.clientId, "Client Profile Created");
       
        const pMod = document.getElementById('modal-add-project');
        if (pMod) { pMod.classList.remove('blur-sm', 'brightness-75', 'pointer-events-none'); }
        window.closeModal('modal-add-client');

        if (pMod && !pMod.classList.contains('hidden')) {
            if(typeof window.renderModalClientList === 'function') window.renderModalClientList();
            const checkboxes = document.querySelectorAll('.ap-client-cb');
            checkboxes.forEach(cb => {
                if((window.tempSelectedClients || []).includes(cb.value) || cb.dataset.name === name) cb.checked = true;
            });
            if(typeof window.updateApPills === 'function') window.updateApPills();
        } else {
            setTimeout(() => { if(typeof window.openDrawer === 'function') window.openDrawer(newC, 'health'); }, 300);
        }
    } catch (err) {
        console.error("Client Creation Error:", err);
        if(typeof window.showToast === 'function') window.showToast("Error creating client: " + err.message, "error");
    } finally {
        setTimeout(() => { window.isSavingClientRecord = false; }, 500);
    }
}

window.saveNewProject = function() {
    if (window.isSavingProjectRecord) return;

    try {
        const name = document.getElementById('ap-name').value.trim();
        const mgr = document.getElementById('ap-mgr-text').dataset.val || 'Not Set';
        const dateStr = document.getElementById('ap-date-text').value;
        const note = document.getElementById('ap-notes') ? document.getElementById('ap-notes').value : '';
        const kyc = document.getElementById('ap-kyc').value;
        const units = parseInt(document.getElementById('ap-units') ? document.getElementById('ap-units').value : 0) || 0;
        const checklistUrl = document.getElementById('ap-checklist') ? document.getElementById('ap-checklist').value.trim() : '';
        let selClientIds = []; let selClientNames = [];
        document.querySelectorAll('.ap-client-cb:checked').forEach(cb => { selClientIds.push(cb.value); selClientNames.push(cb.dataset.name); });
       
        let selFeat = [];
        document.querySelectorAll('.ap-feat-cb:checked').forEach(cb => selFeat.push(cb.value));
       
        if (!window.validateForm('ap-error', [
            { isInvalid: !name || selClientIds.length === 0, message: "Project Name and at least 1 Client are required." },
            { isInvalid: window.AvesdoState.data.projects.some(p => (p.name || '').toLowerCase() === name.toLowerCase()), message: "A project with this name already exists." }
        ])) return;

        window.isSavingProjectRecord = true;

        let dVal = 0, dStr = "No Date";
        const isValidFormat = /^\d{4}-\d{2}-\d{2}$/.test(dateStr);
        if (dateStr && isValidFormat) {
            let parts = dateStr.split('-');
            let d = new Date(parts[0], parts[1]-1, parts[2]);
            dVal = d.getTime();
            dStr = d.toLocaleDateString('en-US', {month: 'short', day: 'numeric', year: 'numeric'});
        }
       
        let defaultStatus = pt_statuses.length > 0 ? pt_statuses[0] : 'Onboarding';
        let defaultTimeline = pt_timelines.length > 0 ? pt_timelines[0] : 'Not Started';
        let defaultPhase = pt_phases.length > 0 ? pt_phases[0] : 'Not Started';

        const newP = {
            id: window.generateId('P'),
            name: name,
            clientIds: selClientIds,
            clients: selClientNames,
            assignee: mgr,
            projectStatus: defaultStatus,
            timelineStatus: defaultTimeline,
            onboardingPhase: defaultPhase,
            features: selFeat,
            totalFeatures: pt_features.length,
            releaseDate: dateStr || "",
            releaseDateVal: dVal,
            releaseDateStr: dStr,
            checklistUrl: checklistUrl,
            kyc: kyc,
            notes: [],
            units: units,
            score: "N/A",
            opActivity: 0,
            userVol: 0,
            csat: ""
        };
        window.AvesdoState.data.projects.push(newP);
       
        window.addAutoLog('project', newP.id, `Project created.`);
        if (note) window.addAutoLog('project', newP.id, `Initial Note: ${note}`);

        window.calculateProjectScore(newP);
       
        selClientIds.forEach(cId => {
            let parentClient = window.AvesdoState.data.clients.find(c => c.clientId === cId);
            if (parentClient) window.calculateClientScore(parentClient);
            window.addAutoLog('client', cId, `Project '${newP.name}' added.`);
            window.syncClient(cId, "Client Auto-Updated via Project");
        });

        if(typeof window.setupPtPopovers === 'function') window.setupPtPopovers();
        if(typeof window.populateServiceDropdowns === 'function') window.populateServiceDropdowns();
        if(typeof window.populateHeaderProjectDropdown === 'function') window.populateHeaderProjectDropdown();

        if(typeof window.renderProjectTracker === 'function') window.renderProjectTracker(false, true);
        if(typeof window.renderDashboard === 'function') window.renderDashboard(true);

        window.closeModal('modal-add-project');
        window.syncProject(newP.id, "Project Created");
        setTimeout(() => { if(typeof window.openProjectDrawer === 'function') window.openProjectDrawer(newP.id, 'details'); }, 350);

    } catch (err) {
        console.error("Project Creation Error:", err);
        if(typeof window.showToast === 'function') window.showToast("Error creating project: " + err.message, "error");
    } finally {
        setTimeout(() => { window.isSavingProjectRecord = false; }, 500);
    }
}

window.saveNewService = function() {
    if (window.isSavingServiceRecord) return;

    try {
        const name = document.getElementById('as-name-text').dataset.val;
        const clientId = document.getElementById('as-client-text').dataset.val;
        const clientName = document.getElementById('as-client-text').innerText;
        const projectId = document.getElementById('as-project-text').dataset.val;
        const projectName = projectId ? document.getElementById('as-project-text').innerText : '';
        const type = document.getElementById('as-type-text').dataset.val;
       
        const priceVal = window.parseCurrency(document.getElementById('as-price').value) || 0;
        const mgr = document.getElementById('as-mgr-text').dataset.val;
        const contact = document.getElementById('as-contact').value.trim();
       
        const note = document.getElementById('as-note') ? document.getElementById('as-note').value.trim() : '';
       
        if (!window.validateForm('as-error', [
            { isInvalid: !name || name === 'Select or enter service...', message: "Service Name is required." },
            { isInvalid: !clientId || clientId === 'Select Client' || clientId === '', message: "Client is required." },
            { isInvalid: !mgr || mgr === 'Select Account Manager' || mgr === '', message: "Account Manager is required." }
        ])) return;

        window.isSavingServiceRecord = true;

        let today = new Date();
        let dVal = today.getTime();
        let dDisplay = today.toLocaleDateString('en-US', {month: 'short', day: 'numeric', year: 'numeric'});
        let m = String(today.getMonth() + 1).padStart(2, '0');
        let d = String(today.getDate()).padStart(2, '0');
        let dateStr = `${today.getFullYear()}-${m}-${d}`;

        const newS = {
            id: window.generateId('S'),
            name: name,
            type: type,
            price: "$" + priceVal.toFixed(2),
            projectId: projectId,
            projectName: projectName,
            clientId: clientId,
            clientName: clientName,
            manager: mgr,
            contactName: contact,
            outcome: type === 'Included' ? "Included" : "Pending",
            status: type === 'Included' ? "Awaiting Inputs" : "Proposal Sent",
            dateInput: dateStr,
            dateVal: dVal,
            dateStr: dDisplay,
            invoiceNum: "",
            invoiceSent: "No",
            invoicePaid: "No",
            commission: "$0.00",
            commissionPaid: type === 'Included' ? "Not Applicable" : "No",
            datePaidInput: "",
            datePaidVal: 0,
            datePaidStr: "",
            notes: []
        };

        window.AvesdoState.data.services.push(newS);
        window.addAutoLog('service', newS.id, `Service created.`);
        if (note) window.addAutoLog('service', newS.id, `Initial Note: ${note}`);
       
        if(typeof window.populateServiceDropdowns === 'function') window.populateServiceDropdowns();
        if(typeof window.renderServiceLedger === 'function') window.renderServiceLedger(false, true);
       
        if(typeof window.renderDashboard === 'function') window.renderDashboard(true);
       
        if(projectId) {
            let p = window.AvesdoState.data.projects.find(x => x.id === projectId);
            if(p && typeof window.renderProjectDrawerServicesList === 'function') {
                const pdDrawer = document.getElementById('projectDrawer');
                if (pdDrawer && !pdDrawer.classList.contains('translate-x-full')) window.renderProjectDrawerServicesList(p);
            }
        }
       
        if(clientId) {
            if(typeof window.renderClientDrawerServicesList === 'function') {
                const cdDrawer = document.getElementById('clientDrawer');
                if (cdDrawer && !cdDrawer.classList.contains('translate-x-full')) window.renderClientDrawerServicesList();
            }
        }
       
        window.closeModal('modal-add-service');
       
        window.syncService(newS.id, 1, "Service Created");
        setTimeout(() => { if (typeof window.openServiceDrawer === 'function') window.openServiceDrawer(newS.id); }, 300);

    } catch (err) {
        console.error("Service Creation Error:", err);
        if(typeof window.showToast === 'function') window.showToast("Error creating service: " + err.message, "error");
    } finally {
        setTimeout(() => { window.isSavingServiceRecord = false; }, 500);
    }
}

// ==========================================
// 6. SPARKLINE & TREND CHART LOGIC (RESTORED)
// ==========================================

window.fetchSparklineData = window.fetchSparklineData || function() {
    if (window.isFetchingHistory || window.globalHealthHistory) return;
    window.isFetchingHistory = true;
   
    if (typeof google === 'undefined' || !google.script) return;
    google.script.run
        .withSuccessHandler(function(res) {
            window.globalHealthHistory = res || {};
            window.isFetchingHistory = false;
           
            if (typeof window.applyFiltersAndSort === 'function') {
                window.applyFiltersAndSort(false, true);
            } else if (typeof window.renderClientTable === 'function') {
                window.renderClientTable(window.currentFilteredClients || window.AvesdoState.data.clients, false, true);
            }
           
            if (typeof window.renderProjectTracker === 'function') window.renderProjectTracker(false, true);
            if (typeof window.renderDashboard === 'function') window.renderDashboard(true);
        })
        .withFailureHandler(function(err) {
            console.error("Sparkline Bulk Fetch Failed:", err);
            window.globalHealthHistory = {};
            window.isFetchingHistory = false;
           
            if (typeof window.applyFiltersAndSort === 'function') {
                window.applyFiltersAndSort(false, true);
            } else if (typeof window.renderClientTable === 'function') {
                window.renderClientTable(window.currentFilteredClients || window.AvesdoState.data.clients, false, true);
            }
           
            if (typeof window.renderProjectTracker === 'function') window.renderProjectTracker(false, true);
            if (typeof window.renderDashboard === 'function') window.renderDashboard(true);
        })
        .getAllHealthHistory();
};

window.createSparkline = window.createSparkline || function(entityId) {
    if (!window.globalHealthHistory) return "<div class=\"sparkline-trigger h-6 animate-pulse bg-muted rounded w-12 shrink-0 cursor-pointer\"></div>";
   
    let historyArr = window.globalHealthHistory[entityId] || [];
    let validPts = historyArr.map(p => ({ date: p.date, score: (p.score === "N/A" || !p.score ? 0 : Number(p.score)) }));
    if (validPts.length < 2) return "<div class=\"sparkline-trigger w-12 h-6 flex items-center justify-center shrink-0 cursor-pointer hover:bg-muted/50 rounded transition-colors\"><span class=\"text-[10px] font-bold text-muted-foreground opacity-50\">-</span></div>";

    var pts = validPts.slice(-10);
    var w = 48, h = 24;
    var scores = pts.map(function(p){ return p.score; });
    var min = Math.min.apply(null, scores), max = Math.max.apply(null, scores);
       
    if (min === max) {
        min = Math.max(0, min - 10);
        max = Math.min(100, max + 10);
    } else {
        var pad = (max - min) * 0.15;
        min = Math.max(0, min - pad);
        max = Math.min(100, max + pad);
    }
       
    var stepX = w / (pts.length - 1);
    var d = pts.map(function(p, i) {
        var x = i * stepX;
        var y = h - ((p.score - min) / (max - min) * h);
        return (i === 0 ? 'M' : 'L') + " " + x + "," + y;
    }).join(' ');

    var strokeColor = pts[pts.length - 1].score > pts[0].score ? '#65a30d' : (pts[pts.length - 1].score < pts[0].score ? '#dc2626' : '#94a3b8');
    var dotY = h - ((pts[pts.length - 1].score - min) / (max - min) * h);
   
    return "<div class=\"sparkline-trigger cursor-pointer hover:opacity-80 hover:bg-muted/50 rounded transition-all flex items-center justify-center p-0.5\" title=\"View Trends\"><svg width=\"" + w + "\" height=\"" + h + "\" viewBox=\"0 0 " + w + " " + h + "\" class=\"overflow-visible shrink-0\"><path d=\"" + d + "\" fill=\"none\" stroke=\"" + strokeColor + "\" stroke-width=\"1.5\" stroke-linecap=\"round\" stroke-linejoin=\"round\"/><circle cx=\"" + w + "\" cy=\"" + dotY + "\" r=\"2.5\" fill=\"" + strokeColor + "\" stroke=\"#ffffff\" stroke-width=\"1\" /></svg></div>";
};

window.fetchTrendData = function(id, type) {
    let context = type === 'client' ? 'cd' : 'pd';
    window.updateTrendChart(context, 'all');
};

window.updateTrendChart = window.updateTrendChart || function(context, timeframe) {
    try {
        var containerId = context === 'cd' ? 'tabContent-trends' : 'pd-tabContent-trends';
        var container = document.getElementById(containerId);
       
        if(container) {
            container.querySelectorAll('.trend-filter-btn').forEach(function(btn) {
                if(btn.getAttribute('data-filter') == timeframe) {
                    btn.classList.add('bg-background', 'text-foreground', 'shadow-sm');
                    btn.classList.remove('text-muted-foreground', 'hover:text-foreground');
                } else {
                    btn.classList.remove('bg-background', 'text-foreground', 'shadow-sm');
                    btn.classList.add('text-muted-foreground', 'hover:text-foreground');
                }
            });
        }
       
        var entityId = context === 'cd' ? (window.AvesdoState.ui.activeClient ? window.AvesdoState.ui.activeClient.clientId : null) : window.AvesdoState.ui.activeProjectId;
        if (!entityId) return;
       
        if (window.globalHealthHistory !== null && typeof window.globalHealthHistory === 'object') {
            window.drawTrendChart(context, window.globalHealthHistory[entityId] || [], timeframe);
            return;
        }
       
        if (typeof google === 'undefined' || !google.script) return;
       
        google.script.run
            .withSuccessHandler(function(h) { window.drawTrendChart(context, h || [], timeframe); })
            .withFailureHandler(function(err) {
                console.error("Trend Chart Fetch Failed:", err);
                window.drawTrendChart(context, [], timeframe);
             })
            .getHealthHistory(entityId);

    } catch (err) {
        console.error("updateTrendChart Error:", err);
        window.drawTrendChart(context, [], timeframe);
    }
};

window.drawTrendChart = window.drawTrendChart || function(context, history, timeframe) {
    var canvasId = context === 'cd' ? 'cd-trendChart' : 'pd-trendChart';
    var skeletonId = context === 'cd' ? 'cd-trend-skeleton' : 'pd-trend-skeleton';
    var canvas = document.getElementById(canvasId);
    var skeleton = document.getElementById(skeletonId);
    var tbody = document.getElementById(context === 'cd' ? 'cd-trend-list' : 'pd-trend-list');

    try {
        // Kill skeletons immediately
        if (skeleton) skeleton.classList.add('hidden');
        if (canvas) canvas.classList.remove('hidden');

        var rawHistory = Array.isArray(history) ? history : [];
        var now = new Date().getTime();
           
        if (timeframe !== 'all') {
            var ms = timeframe * 24 * 60 * 60 * 1000;
            rawHistory = rawHistory.filter(function(h) { return (now - h.timeVal) <= ms; });
        }
       
        let dailyMap = {};
        let dailyKeys = [];
       
        rawHistory.forEach(h => {
            if (!h || !h.timeVal) return;
             let dStr = new Date(h.timeVal).toLocaleDateString('en-US');
            if (!dailyMap[dStr]) dailyKeys.push(dStr);
            dailyMap[dStr] = h;
        });
       
        let dailyHistory = dailyKeys.map(k => dailyMap[k]);
        let filteredHistory = [];
        let lastScore = null;
       
        dailyHistory.forEach((h, i) => {
             if (i === 0) {
                filteredHistory.push(h);
                lastScore = h.score;
                return;
            }
             if (h.score !== lastScore) {
                filteredHistory.push(h);
                lastScore = h.score;
            } else if (i === dailyHistory.length - 1) {
                filteredHistory.push(h);
            }
        });

        if (tbody) {
            if (filteredHistory.length === 0) {
                tbody.innerHTML = "<tr><td colspan=\"3\" class=\"px-4 py-8 text-center text-sm text-muted-foreground\">No historical data available for this timeframe.</td></tr>";
            } else {
                tbody.innerHTML = filteredHistory.slice().reverse().map(function(h, i, arr) {
                    var prevScore = i < arr.length - 1 ? arr[i+1].score : h.score;
                    var diff = h.score - prevScore;
                    var diffHtml = diff > 0 ? "<span class=\"text-emerald-600 font-bold\">+" + diff + "</span>" : (diff < 0 ? "<span class=\"text-red-600 font-bold\">" + diff + "</span>" : "<span class=\"text-muted-foreground\">-</span>");
                    var bgTint = diff > 0 ? "trend-up-row" : (diff < 0 ? "trend-down-row" : "");
                    var displayDate = new Date(h.timeVal).toLocaleDateString('en-US', {month: 'short', day: 'numeric', year: 'numeric'});

                    return "<tr class=\"transition-colors border-b border-border last:border-0 " + bgTint + "\"><td class=\"px-4 py-3 text-sm font-medium\">" + displayDate + "</td><td class=\"px-4 py-3 text-sm text-right font-bold\">" + h.score + "</td><td class=\"px-4 py-3 text-sm text-right\">" + diffHtml + "</td></tr>";
                }).join('');
            }
        }
           
        if (!canvas) return;
        var ctx = canvas.getContext('2d');
           
        if (window.trendChartInstances && window.trendChartInstances[canvasId]) {
             window.trendChartInstances[canvasId].destroy();
            window.trendChartInstances[canvasId] = null;
        }
           
        if (filteredHistory.length === 0) return;
       
        if (typeof Chart === 'undefined') {
            console.error("Chart.js is not loaded.");
            return;
        }
       
        window.trendChartInstances[canvasId] = new Chart(ctx, {
            type: 'line',
            data: {
                labels: filteredHistory.map(function(h) { return new Date(h.timeVal).toLocaleDateString('en-US', {month: 'short', day: 'numeric'}); }),
                datasets: [{
                    label: 'Health Score',
                    data: filteredHistory.map(function(h) { return h.score; }),
                    borderColor: '#059669',
                    backgroundColor: 'hsl(var(--primary) / 0.1)',
                    borderWidth: 2,
                    pointBackgroundColor: '#059669',
                    pointBorderColor: '#fff',
                    pointBorderWidth: 2,
                    pointRadius: 4,
                    fill: true,
                    tension: 0.3
                }]
            },
            options: {
                responsive: true,
                maintainAspectRatio: false,
                animation: { duration: 0 },
                scales: {
                    y: { min: 0, max: 100, grid: { color: 'hsla(214.3, 31.8%, 91.4%, 0.5)' } },
                    x: { grid: { display: false } }
                },
                plugins: {
                    legend: { display: false },
                    tooltip: { backgroundColor: 'hsl(222.2, 47.4%, 11.2%)', titleColor: '#fff', bodyColor: '#fff', padding: 10, cornerRadius: 4, displayColors: false }
                },
                interaction: { intersect: false, mode: 'index' }
            }
        });

    } catch (err) {
        console.error("drawTrendChart Error:", err);
        if (skeleton) skeleton.classList.add('hidden');
    }
};
</script>
