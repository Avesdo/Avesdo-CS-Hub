<script>
// ==========================================
// 1. FIREBASE INITIALIZATION & CONFIG
// ==========================================
window.db = null;

async function bootstrapFirebase() {
    let config = {
        projectId: "avesdo-cs-hub",
        authDomain: "avesdo-cs-hub.firebaseapp.com",
        databaseURL: "https://avesdo-cs-hub.firebaseio.com",
        storageBucket: "avesdo-cs-hub.appspot.com"
    };

    try {
        const response = await fetch('/__/firebase/init.json');
        if (response.ok) {
            config = await response.json();
            console.log("Firebase initialized via auto-config.");
        }
    } catch (e) {
        console.warn("Auto-config unavailable. Falling back to local default configuration.");
    }

    firebase.initializeApp(config);
    window.db = firebase.firestore();
}

window.firebaseInitPromise = bootstrapFirebase();

// ==========================================
// 2. TOAST SYSTEM
// ==========================================
window.showSyncToast = function(msg, isSaving = false, isError = false) {
    let container = document.getElementById('toast-stack');
    if (!container) {
        container = document.createElement('div');
        container.id = 'toast-stack';
        container.className = 'fixed bottom-0 right-0 z-[2147483647] flex flex-col gap-3 pointer-events-none items-end w-full max-w-sm pr-6 pb-6';
        document.body.appendChild(container);
    }

    let existingSpinner = document.getElementById('toast-saving-spinner');
    if (!isSaving && existingSpinner) {
        existingSpinner.classList.add('translate-x-full', 'opacity-0');
        setTimeout(() => existingSpinner.remove(), 300);
    }

    if (isSaving && existingSpinner) {
        existingSpinner.querySelector('.toast-msg').innerText = msg;
        return;
    }

    let t = document.createElement('div');
    t.className = 'pointer-events-auto transition-all duration-300 transform translate-x-full opacity-0 px-5 py-3 rounded-lg shadow-xl font-semibold text-sm flex items-center gap-3 text-white max-w-sm w-fit';

    if (isSaving) t.id = 'toast-saving-spinner';

    let w3 = "http" + "://" + "www.w3.org/2000/svg";
    let iconHtml = '';

    if (isError) {
        t.classList.add('bg-destructive');
        iconHtml = `<svg class="w-5 h-5 shrink-0" fill="none" viewBox="0 0 24 24" stroke="currentColor" stroke-width="2" xmlns="${w3}"><path stroke-linecap="round" stroke-linejoin="round" d="M12 8v4m0 4h.01M21 12a9 9 0 11-18 0 9 9 0 0118 0z"></path></svg>`;
    } else if (isSaving) {
        t.classList.add('bg-primary');
        iconHtml = `<svg class="w-5 h-5 animate-spin text-white shrink-0" fill="none" viewBox="0 0 24 24" xmlns="${w3}"><circle class="opacity-25" cx="12" cy="12" r="10" stroke="currentColor" stroke-width="4"></circle><path class="opacity-75" fill="currentColor" d="M4 12a8 8 0 018-8V0C5.373 0 0 5.373 0 12h4zm2 5.291A7.962 7.962 0 014 12H0c0 3.042 1.135 5.824 3 7.938l3-2.647z"></path></svg>`;
    } else {
        t.style.backgroundColor = '#16a34a';
        iconHtml = `<svg class="w-5 h-5 shrink-0" fill="none" viewBox="0 0 24 24" stroke="currentColor" stroke-width="2" xmlns="${w3}"><path stroke-linecap="round" stroke-linejoin="round" d="M5 13l4 4L19 7"></path></svg>`;
    }

    let closeBtnHtml = isError ? `<button onclick="this.parentElement.classList.add('translate-x-full', 'opacity-0'); setTimeout(() => this.parentElement.remove(), 300);" class="ml-2 p-1 hover:bg-black/20 rounded-md transition-colors shrink-0 focus:outline-none"><svg class="w-4 h-4" fill="none" viewBox="0 0 24 24" stroke="currentColor" stroke-width="2" xmlns="${w3}"><path stroke-linecap="round" stroke-linejoin="round" d="M6 18L18 6M6 6l12 12"></path></svg></button>` : '';

    t.innerHTML = `${iconHtml} <span class="toast-msg leading-tight">${msg}</span> ${closeBtnHtml}`;
    container.appendChild(t);

    requestAnimationFrame(() => {
        t.classList.remove('translate-x-full', 'opacity-0');
    });

    if (!isError && !isSaving) {
        setTimeout(() => {
            if(t) {
                t.classList.add('translate-x-full', 'opacity-0');
                setTimeout(() => t.remove(), 300);
            }
        }, 4000);
    }
};

window.hideSyncToast = function(successMsg) {
    if (successMsg) window.showSyncToast(successMsg, false, false);
    else {
        let existingSpinner = document.getElementById('toast-saving-spinner');
        if (existingSpinner) {
            existingSpinner.classList.add('translate-x-full', 'opacity-0');
            setTimeout(() => existingSpinner.remove(), 300);
        }
    }
};

// ==========================================
// 3. FIRESTORE DATABASE RUNNER MAPPING
// ==========================================
async function executeCloudAction(actionName, args, onSuccess, onFailure) {
    await window.firebaseInitPromise;
    
    try {
        if (actionName === 'getInitialAppState') {
            const settingsSnap = await window.db.collection('settings').doc('global_config').get();
            let settings = settingsSnap.exists ? settingsSnap.data() : null;
            
            if (!settings) {
                settings = {
                    managers: [{name: "Roell P", color: "indigo"}, {name: "Jason H", color: "indigo"}, {name: "Rashi G", color: "indigo"}, {name: "Elton P", color: "indigo"}],
                    clientTypes: [{name: "Developer", color: "blue"}, {name: "Sales & Marketing", color: "blue"}],
                    features: ["API Integrations", "Worksheets", "Realtor Portal", "Credit Card", "Deposit Reminders", "Closing"],
                    services: [
                        {name: "Sales Training", price: 750}, {name: "Admin Training", price: 1000}, {name: "Developer Training", price: 500},
                        {name: "Dedicated Launch Support", price: 1500}, {name: "Project Realignment", price: 0}, {name: "Contract Downloading", price: 0},
                        {name: "Assignee ADS", price: 800}
                    ],
                    statuses: [{ name: "Onboarding", color: "blue" }, { name: "Active", color: "green" }, { name: "Suspended", color: "red" }, { name: "Closed", color: "slate" }],
                    timelines: [{ name: "Not Started", color: "slate" }, { name: "Indefinitely Delayed", color: "fuchsia" }, { name: "On Schedule", color: "green" }, { name: "Possible Launch Delay", color: "orange" }, { name: "Delayed", color: "red" }, { name: "Released", color: "blue" }],
                    phases: [{ name: "Not Started", color: "slate" }, { name: "Onboarding Email Sent", color: "sky" }, { name: "Onboarding Survey Received", color: "sky" }, { name: "Awaiting Inputs", color: "purple" }, { name: "Setup In Progress", color: "purple" }, { name: "Primary QA", color: "fuchsia" }, { name: "Client QA", color: "fuchsia" }, { name: "Secondary QA", color: "fuchsia" }, { name: "Project Certification", color: "indigo" }, { name: "Released", color: "indigo" }],
                    scoring: { weights: { opActivity: 40, featAdoption: 30, userVol: 20, csat: 10 }, clientWeights: { billing: 15, engagement: 50, utilization: 25, experience: 10 }, thresholds: { healthy: 80, warning: 50 } }
                };
                await window.db.collection('settings').doc('global_config').set(settings);
            }

            const clientsSnap = await window.db.collection('clients').get();
            const clients = [];
            clientsSnap.forEach(doc => clients.push(doc.data()));

            const projectsSnap = await window.db.collection('projects').get();
            const projects = [];
            projectsSnap.forEach(doc => projects.push(doc.data()));

            const servicesSnap = await window.db.collection('services').get();
            const services = [];
            servicesSnap.forEach(doc => services.push(doc.data()));

            const userSnap = await window.db.collection('settings').doc('user_profile').get();
            let user = userSnap.exists ? userSnap.data() : { name: "Corporate Hub User", email: "corporate@avesdo.com", initials: "CH" };

            if (onSuccess) {
                onSuccess({
                    user: user,
                    settings: settings,
                    clients: clients,
                    projects: projects,
                    services: services,
                    timestamp: new Date().getTime().toString()
                });
            }
        }
        else if (actionName === 'checkGlobalTimestamp') {
            if (onSuccess) onSuccess(new Date().getTime().toString());
        }
        else if (actionName === 'getAllHealthHistory' || actionName === 'getHealthHistory') {
            try {
                const historySnap = await window.db.collection('settings').doc('health_history').get();
                if (historySnap.exists) {
                    const data = historySnap.data();
                    if (onSuccess) onSuccess(data.historyMap || {});
                } else {
                    if (onSuccess) onSuccess({});
                }
            } catch (err) {
                console.error("Failed to load health history:", err);
                if (onSuccess) onSuccess({});
            }
        }
        else if (actionName === 'updateClient') {
            const client = args[0];
            await window.db.collection('clients').doc(client.clientId).set(client);
            if (onSuccess) onSuccess(new Date().getTime().toString());
        }
        else if (actionName === 'updateProject') {
            const project = args[0];
            await window.db.collection('projects').doc(project.id).set(project);
            if (onSuccess) onSuccess(new Date().getTime().toString());
        }
        else if (actionName === 'updateService') {
            const service = args[0];
            await window.db.collection('services').doc(service.id).set(service);
            if (onSuccess) onSuccess(new Date().getTime().toString());
        }
        else if (actionName === 'deleteClientRecord') {
            await window.db.collection('clients').doc(args[0]).delete();
            if (onSuccess) onSuccess({ success: true });
        }
        else if (actionName === 'deleteProjectRecord') {
            await window.db.collection('projects').doc(args[0]).delete();
            if (onSuccess) onSuccess({ success: true });
        }
        else if (actionName === 'deleteServiceRecord') {
            await window.db.collection('services').doc(args[0]).delete();
            if (onSuccess) onSuccess({ success: true });
        }
        else if (actionName === 'saveSettings') {
            await window.db.collection('settings').doc('global_config').set(args[0]);
            if (onSuccess) onSuccess({ success: true });
        }
        else if (actionName === 'bulkUpdateProjects') {
            const ids = args[0];
            const updates = args[1];
            const batch = window.db.batch();
            for (const id of ids) {
                const docRef = window.db.collection('projects').doc(id);
                batch.update(docRef, updates);
            }
            await batch.commit();
            if (onSuccess) onSuccess({ success: true });
        }
        else if (actionName === 'bulkUpdateClients') {
            const ids = args[0];
            const updates = args[1];
            const batch = window.db.batch();
            for (const id of ids) {
                const docRef = window.db.collection('clients').doc(id);
                batch.update(docRef, updates);
            }
            await batch.commit();
            if (onSuccess) onSuccess({ success: true });
        }
        else if (actionName === 'bulkUpdateServices') {
            const ids = args[0];
            const updates = args[1];
            const batch = window.db.batch();
            for (const id of ids) {
                const docRef = window.db.collection('services').doc(id);
                batch.update(docRef, updates);
            }
            await batch.commit();
            if (onSuccess) onSuccess({ success: true });
        }
        else if (actionName === 'cascadeSettingsUpdate') {
            // Unused or simply resolve
            if (onSuccess) onSuccess({ success: true });
        }
    } catch (e) {
        console.error(`Error executing action [${actionName}]:`, e);
        if (onFailure) onFailure(e);
    }
}

// ==========================================
// 4. LEGACY API MOCK WRAPPER (PROXY BRIDGE)
// ==========================================
window.AvesdoAPI = {
    run: function(functionName, args, onSuccess, onFailure) {
        executeCloudAction(functionName, [args], onSuccess, onFailure);
    }
};

const makeMethodRunner = (onSuccess, onFailure) => {
    return new Proxy({}, {
        get: (target, prop) => {
            return (...args) => {
                executeCloudAction(prop, args, onSuccess, onFailure);
            };
        }
    });
};

window.google = {
    script: {
        run: new Proxy({}, {
            get: (target, prop) => {
                if (prop === 'withSuccessHandler') {
                    return (successCallback) => {
                        return {
                            withFailureHandler: (failureCallback) => makeMethodRunner(successCallback, failureCallback),
                            ...makeMethodRunner(successCallback, null)
                        };
                    };
                }
                if (prop === 'withFailureHandler') {
                    return (failureCallback) => {
                        return {
                            withSuccessHandler: (successCallback) => makeMethodRunner(successCallback, failureCallback),
                            ...makeMethodRunner(null, failureCallback)
                        };
                    };
                }
                
                // Direct calls e.g. google.script.run.someMethod()
                return (...args) => {
                    executeCloudAction(prop, args, null, null);
                };
            }
        })
    }
};
</script>
