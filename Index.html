  <script>
    tailwind.config = {
      theme: {
        extend: {
          fontFamily: { sans: ['Inter', 'sans-serif'] },

            'tiny': ['10px', '14px'], 'xs': ['11px', '16px'], 'sm': ['13px', '20px'], 'base': ['14px', '24px'], 'lg': ['18px', '28px'], 'xl': ['20px', '28px'], '2xl': ['24px', '32px'], '3xl': ['30px', '36px'] },
          colors: {
            border: "var(--border)",
            input: "var(--input)",
            ring: "var(--ring)",
            background: "var(--background)",
            foreground: "var(--foreground)",
            primary: { DEFAULT: "var(--primary)", foreground: "var(--primary-foreground)" },
            secondary: { DEFAULT: "var(--secondary)", foreground: "var(--secondary-foreground)" },
            destructive: { DEFAULT: "var(--destructive)", foreground: "var(--destructive-foreground)" },
            muted: { DEFAULT: "var(--muted)", foreground: "var(--muted-foreground)" },
            accent: { DEFAULT: "var(--accent)", foreground: "var(--accent-foreground)" },
            popover: { DEFAULT: "var(--popover)", foreground: "var(--popover-foreground)" },
            card: { DEFAULT: "var(--card)", foreground: "var(--card-foreground)" },
            sidebar: {
              DEFAULT: "var(--sidebar)",
              foreground: "var(--sidebar-foreground)",
              primary: "var(--sidebar-primary)",
              "primary-foreground": "var(--sidebar-primary-foreground)",
              accent: "var(--sidebar-accent)",
              "accent-foreground": "var(--sidebar-accent-foreground)",
              border: "var(--sidebar-border)",
              ring: "var(--sidebar-ring)"
            }
          }
        }
      }
    }
  </script>
 
  <style>
    :root {
      --background: oklch(100% 0 0);
      --foreground: #172122;
      --card: oklch(100% 0 0);
      --card-foreground: #172122;
      --popover: oklch(100% 0 0);
      --popover-foreground: oklch(14.5% 0 0);
      --primary: #00bdd9;
      --primary-foreground: #fbfcfd;
      --secondary: #f8fafa;
      --secondary-foreground: #172122;
      --muted: #f8fafa;
      --muted-foreground: #74868a;
      --accent: oklch(97% 0 0);
      --accent-foreground: oklch(20.5% 0 0);
      --destructive: oklch(57.7% .245 27.325);
      --destructive-foreground: oklch(98% 0 0);
      --border: #e1eaeb;
      --input: #e1eaeb;
      --ring: oklch(70.8% 0 0);
      --radius: .625rem;
      --sidebar: #fbfcfd;
      --sidebar-foreground: #172122;
      --sidebar-primary: #00bdd9;
      --sidebar-primary-foreground: #fbfcfd;
      --sidebar-accent: #f0fbfd;
      --sidebar-accent-foreground: #172122;
      --sidebar-border: #e1eaeb;
      --sidebar-ring: oklch(70.8% 0 0);
      --highlight: #f0fbfd;
      --highlight-foreground: #00a7c2;
      --color-amber-500: oklch(76.9% .188 70.08);
      --color-lime-600: oklch(64.8% .2 131.684);
      --color-red-600: oklch(57.7% .245 27.325);
    }

<body class="bg-white text-foreground overflow-hidden antialiased font-sans text-sm">

  <!-- 1. Outer Layout Wrapper -->
  <div data-slot="sidebar-wrapper" class="group/sidebar-wrapper flex min-h-svh w-full has-data-[variant=inset]:bg-sidebar" style="--sidebar-width: 16rem; --sidebar-width-icon: 3rem;">
    <div class="flex h-screen w-full bg-white">
      
      <!-- 2. Left Sidebar Navigation -->
      <?!= include('View_Sidebar'); ?>

      <!-- 3. Right Content main container -->
      <main class="flex-1 flex flex-col min-w-0 relative h-full overflow-hidden">
        
        <!-- 4. Global Top Header Bar (h-60) -->
        <div class="w-full bg-white shrink-0" id="global-header-bar">
          <div class="h-[60px] flex items-center px-4 md:px-6 py-4 gap-2 md:gap-4">
            
            <!-- Mobile Menu Toggle Button -->
            <button onclick="document.getElementById('mobile-sidebar').classList.toggle('-translate-x-full');" class="inline-flex shrink-0 items-center justify-center gap-2 rounded-md text-sm font-medium whitespace-nowrap transition-all outline-none size-9 md:hidden relative h-8 w-8 hover:bg-accent hover:text-accent-foreground text-foreground active:scale-95 transition-all">
              <i data-lucide="menu" class="w-4 h-4"></i>
            </button>
            
            <!-- Global Search Container (Moved from Sidebar) -->
            <div class="relative max-w-[300px] hidden md:block flex-grow" id="global-search-container">
              <i data-lucide="search" class="w-4 h-4 text-muted-foreground absolute left-2.5 top-1/2 -translate-y-1/2"></i>
              <input 
                type="text" 
                id="globalSearchInput" 
                placeholder="Search..." 
                class="w-full min-w-0 rounded-md border border-input bg-transparent px-3 py-1 text-sm shadow-xs transition-all outline-none placeholder:text-muted-foreground pl-8 h-8 focus-visible:border-ring focus-visible:ring-[3px] focus-visible:ring-ring/50"
                onfocus="window.handleGlobalSearch(this.value)"
                oninput="window.handleGlobalSearch(this.value)"
              >
              <button 
                id="globalSearchClear" 
                onclick="window.clearGlobalSearch()" 
                class="hidden absolute right-2 top-1/2 -translate-y-1/2 p-1 text-muted-foreground hover:bg-muted hover:text-foreground rounded-md transition-colors focus:outline-none"
              >
                <i data-lucide="x" class="w-3.5 h-3.5"></i>
              </button>
              
              <div 
                id="globalSearchResultsPop" 
                class="absolute top-10 left-0 w-[380px] bg-white border border-border rounded-xl shadow-2xl max-h-[70vh] overflow-y-auto hidden z-[9999] p-3 flex-col gap-1.5"
                onclick="event.stopPropagation()"
              >
              </div>
            </div>
            
            <div class="flex-grow flex-1"></div>
            
          </div>
        </div>

        <!-- 5. SPA Pages View Wrapper -->
        <div class="flex-grow flex-1 overflow-hidden relative flex flex-col w-full h-full">
          <div id="global-error-state" class="hidden flex-1 flex flex-col items-center justify-center p-8 text-center bg-white z-50 absolute inset-0">
              <i data-lucide="alert-triangle" class="w-16 h-16 text-destructive mb-4"></i>
              <h2 class="text-2xl font-bold text-foreground mb-2">Error Loading Data</h2>
              <p class="text-muted-foreground max-w-md mb-6">We couldn't reach the Google Sheets server. This could be due to a timeout or a missing data sheet.</p>
              <button onclick="location.reload()" class="inline-flex items-center justify-center rounded-md text-sm font-medium whitespace-nowrap transition-all bg-primary text-primary-foreground hover:bg-primary/90 h-10 px-8 shadow-sm active:scale-95 transition-all duration-200">Refresh Application</button>
          </div>
