<script>
window.dashDrilldownData = {};
var dash_amFilter = 'all';

window.dd_activeConfig = null;
window.dashPortfolioChart = null;

window.toggleActionTab = function(tab) {
    const riskTab = document.getElementById('dash-action-tab-risk');
    const susTab = document.getElementById('dash-action-tab-sus');
    const riskContent = document.getElementById('dash-action-risk-list');
    const susContent = document.getElementById('dash-action-sus-list');
    
    if(!riskTab || !susTab || !riskContent || !susContent) return;

    if (tab === 'risk') {
        riskTab.classList.add('bg-white', 'text-foreground', 'shadow-sm', 'border', 'border-black/5'); riskTab.classList.remove('text-muted-foreground');
        susTab.classList.remove('bg-white', 'text-foreground', 'shadow-sm', 'border', 'border-black/5'); susTab.classList.add('text-muted-foreground');
        riskContent.classList.remove('hidden');
        susContent.classList.add('hidden');
    } else {
        susTab.classList.add('bg-white', 'text-foreground', 'shadow-sm', 'border', 'border-black/5'); susTab.classList.remove('text-muted-foreground');
        riskTab.classList.remove('bg-white', 'text-foreground', 'shadow-sm', 'border', 'border-black/5'); riskTab.classList.add('text-muted-foreground');
        susContent.classList.remove('hidden');
        riskContent.classList.add('hidden');
    }
};

window.toggleDashFeatTab = function(tab) {
    const actTab = document.getElementById('dash-feat-tab-active');
    const onbTab = document.getElementById('dash-feat-tab-onb');
    const actContent = document.getElementById('dash-feature-adopt');
    const onbContent = document.getElementById('dash-feature-adopt-onb');
    
    if(!actTab || !onbTab || !actContent || !onbContent) return;

    if (tab === 'active') {
        actTab.classList.add('bg-white', 'text-foreground', 'shadow-sm', 'border', 'border-black/5'); actTab.classList.remove('text-muted-foreground');
        onbTab.classList.remove('bg-white', 'text-foreground', 'shadow-sm', 'border', 'border-black/5'); onbTab.classList.add('text-muted-foreground');
        actContent.classList.remove('hidden'); actContent.classList.add('grid');
        onbContent.classList.add('hidden'); onbContent.classList.remove('grid');
    } else {
        onbTab.classList.add('bg-white', 'text-foreground', 'shadow-sm', 'border', 'border-black/5'); onbTab.classList.remove('text-muted-foreground');
        actTab.classList.remove('bg-white', 'text-foreground', 'shadow-sm', 'border', 'border-black/5'); actTab.classList.add('text-muted-foreground');
        onbContent.classList.remove('hidden'); onbContent.classList.add('grid');
        actContent.classList.add('hidden'); actContent.classList.remove('grid');
    }
};

window.setDashAmFilter = function(val) {
    dash_amFilter = val;
    window.safeSet('dash-am-filter-text', 'innerText', val === 'all' ? 'All Managers' : val);
    window.closePopups();
   
    const dashPage = document.getElementById('page-dashboard');
    if (dashPage) {
        dashPage.classList.add('opacity-50', 'pointer-events-none');
        dashPage.style.transition = 'opacity 0.2s ease';
    }
   
    setTimeout(() => window.renderDashboard(true), 50);
}

window.openDashDrilldown = function(title, subtitle, cacheKey, context, isRefresh = false) {
    window.dd_activeConfig = { title, subtitle, cacheKey, context };
   
    window.safeSet('dd-title', 'innerText', title);
    window.safeSet('dd-subtitle', 'innerText', subtitle);
    const list = document.getElementById('dd-project-list');
    const projs = window.dashDrilldownData[cacheKey] || [];
   
    if(list) {
        if(projs.length === 0) {
            list.innerHTML = `<div class="flex flex-col items-center justify-center text-center p-8 h-full"><div class="w-12 h-12 rounded-full bg-muted/50 text-muted-foreground flex items-center justify-center mb-3"><i data-lucide="folder-search" class="w-6 h-6 opacity-50"></i></div><h4 class="text-sm font-bold text-foreground mb-1">No Projects Found</h4><p class="text-xs text-muted-foreground">Try adjusting your filters.</p></div>`;
        } else {
            list.innerHTML = projs.map(p => {
                let pName = window.sanitizeHTML(p.name || 'Unnamed');
                let pClients = window.sanitizeHTML((p.clients || []).join(', ') || 'No Client Attached');
                let pDate = window.sanitizeHTML(p.releaseDateStr || 'No Date');
                let pScore = p.score !== undefined ? p.score : "N/A";
               
                let featLen = typeof pt_features !== 'undefined' && pt_features.length > 0 ? pt_features.length : 1;
                let featCount = (p.features || []).length;
                let featPct = Math.round((featCount / featLen) * 100);

                let phProps = window.getBadgeProps('phase', p.onboardingPhase);
                let tlProps = window.getBadgeProps('timeline', p.timelineStatus);
                let mProps = window.getBadgeProps('Manager', p.assignee);
                let hProps = window.getHealthBadgeProps(pScore);
                let fProps = window.getFeatureBadgeProps(featPct);
               
                let badgeHtml = '';
                let dateHtml = '';
               
                if (['am_active', 'am_onb'].includes(context)) {
                    dateHtml = `<span class="text-xs font-medium text-muted-foreground flex items-center"><i data-lucide="calendar" class="w-3.5 h-3.5 mr-1.5"></i>${pDate}</span>`;
                }

                if (context === 'timeline') badgeHtml = window.buildBadge(phProps, p.onboardingPhase || 'Not Started', 'px-2.5 py-0.5 rounded text-[11px] font-semibold');
                else if (context === 'phase') badgeHtml = window.buildBadge(tlProps, p.timelineStatus || 'Not Started', 'px-2.5 py-0.5 rounded-full border border-border text-[11px] font-semibold');
                else if (context === 'feature' || context === 'feature_onb') {
                    badgeHtml = window.buildBadge(fProps, `${featPct}% Adoption`, 'px-2.5 py-0.5 rounded-full border border-border text-[11px] font-bold');
                }
                else if (context === 'am_active') {
                    badgeHtml = `<div class="w-8 h-8 rounded-full border ${hProps.bg.replace('badge', '')} flex items-center justify-center text-[10px] font-bold shrink-0 shadow-sm" title="Health Score">${pScore}</div>`;
                }
                else if (context === 'am_onb') {
                    badgeHtml = `<div class="flex items-center gap-1.5">${window.buildBadge(phProps, p.onboardingPhase || 'Not Started', 'px-2.5 py-0.5 rounded text-[11px] font-semibold')}${window.buildBadge(tlProps, p.timelineStatus || 'Not Started', 'px-2.5 py-0.5 rounded-full border border-border text-[11px] font-semibold')}</div>`;
                }
               
                let showManager = ['timeline', 'phase', 'feature', 'feature_onb'].includes(context);
                let bottomBarHtml = '';
               
                if (showManager || badgeHtml || dateHtml) {
                    let managerHtml = showManager ? `<div class="flex items-center gap-1.5">${window.buildBadge(mProps, p.assignee || 'Not Set', 'px-2.5 py-0.5 text-[11px] font-semibold')}</div>` : ``;
                    let leftSideHtml = `<div class="flex flex-col gap-1 items-start justify-center">${managerHtml}${dateHtml}</div>`;
                    bottomBarHtml = `<div class="flex justify-between items-center pt-3 mt-3 border-t border-border">${leftSideHtml}<div class="flex items-center gap-1.5 flex-wrap justify-end">${badgeHtml}</div></div>`;
                }
               
                return `<div class="bg-card border border-border rounded-xl p-4 shadow-sm hover:shadow-md hover:border-primary/40 hover:-translate-y-1 transition-all duration-300 cursor-pointer group" onclick="if(typeof window.openProjectDrawer === 'function') window.openProjectDrawer('${p.id}')"><div class="flex justify-between items-start mb-1"><h3 class="font-bold text-sm text-foreground group-hover:text-primary transition-colors truncate pr-2" title="${pName}">${pName}</h3></div><p class="text-xs text-muted-foreground truncate font-medium" title="${pClients}">${pClients}</p>${bottomBarHtml}</div>`;
            }).join('');
        }
    }
   
    if (!isRefresh) {
        const o = document.getElementById('dashDrilldownOverlay');
        const d = document.getElementById('dashDrilldownDrawer');
        if(o && d) {
            o.classList.remove('hidden');
            setTimeout(() => o.classList.remove('opacity-0'), 10);
            d.classList.remove('translate-x-full');
        }
    }
   
    if(typeof lucide !== 'undefined' && lucide.createIcons) setTimeout(() => lucide.createIcons(), 50);
}

window.renderDashboard = function(isFilterUpdate = false) {
    window.dashDrilldownData = {};
    const dom = {
        moversEl: document.getElementById('dash-health-movers'),
        amList: document.getElementById('dash-am-list'),
        hEl: document.getElementById('dash-kpi-health'),
        uEl: document.getElementById('dash-kpi-units'),
        pEl: document.getElementById('dash-kpi-pipeline'),
        rEl: document.getElementById('dash-kpi-revenue'),
        distEl: document.getElementById('dash-health-dist'),
        
        actionReqWidget: document.getElementById('widget-action-req'),
        riskList: document.getElementById('dash-action-risk-list'),
        susList: document.getElementById('dash-action-sus-list'),
        
        portfolioWidget: document.getElementById('widget-portfolio'),
        moversWidget: document.getElementById('widget-movers'), 
        phaseEl: document.getElementById('dash-bottlenecks'),
        tlEl: document.getElementById('dash-timeline-chart'),
        featActEl: document.getElementById('dash-feature-adopt'),
        featOnbEl: document.getElementById('dash-feature-adopt-onb'),
        wlEl: document.getElementById('dash-manager-workload'),
        rsEl: document.getElementById('dash-recent-services'),
        rsCount: document.getElementById('dash-rs-count'),
        rsRev: document.getElementById('dash-rs-rev'),
        rglEl: document.getElementById('dash-recent-golives'),
        rglCount: document.getElementById('dash-rgl-count')
    };
   
    if (dom.amList && typeof pt_managers !== 'undefined') {                            
        dom.amList.innerHTML = pt_managers.map(m => `<div class="radix-item font-medium rounded-md" onclick="window.setDashAmFilter('${window.sanitizeHTML(m).replace(/'/g, "\\'")}')">${window.sanitizeHTML(m)}</div>`).join('');
    }

    if (!window.globalHealthHistory) {
        if (dom.moversEl) dom.moversEl.innerHTML = `<div class="p-4 space-y-4 w-full"><div class="h-6 bg-muted rounded animate-pulse w-1/2 mb-3"></div><div class="h-14 bg-muted rounded-xl animate-pulse w-full"></div><div class="h-14 bg-muted rounded-xl animate-pulse w-full"></div></div>`;
        if (typeof window.fetchSparklineData === 'function') window.fetchSparklineData();
    }

    let fProjects = window.AvesdoState.data.projects;
    let fClients = window.AvesdoState.data.clients;
    let fServices = window.AvesdoState.data.services;
   
    if (dash_amFilter !== 'all') {
        fProjects = window.AvesdoState.data.projects.filter(p => p.assignee === dash_amFilter);
        fClients = window.AvesdoState.data.clients.filter(c => c.accountManager === dash_amFilter);
        fServices = window.AvesdoState.data.services.filter(s => s.manager === dash_amFilter);
    }
   
    let healthyThresh = window.AvesdoState.settings ? window.AvesdoState.settings.scoring.thresholds.healthy : 80;
    let warningThresh = window.AvesdoState.settings ? window.AvesdoState.settings.scoring.thresholds.warning : 50;

    let thirtyDaysAgo = new Date().getTime() - (30 * 24 * 60 * 60 * 1000);
   
    let totalScore = 0; let scoredCount = 0;
    let prevTotalScore = 0; let prevScoredCount = 0;
   
    let activeClients = fClients.filter(c => c.activeProjectCount > 0);
    
    activeClients.forEach(c => {
        if(c.healthScore !== "N/A" && typeof c.healthScore === 'number') {
            totalScore += c.healthScore;
            scoredCount++;
            
            if (window.globalHealthHistory && window.globalHealthHistory[c.clientId]) {
                let pastRecords = window.globalHealthHistory[c.clientId].filter(h => h.timeVal <= thirtyDaysAgo).sort((a,b) => b.timeVal - a.timeVal);
                if (pastRecords.length > 0) {
                    prevTotalScore += pastRecords[0].score;
                    prevScoredCount++;
                } else {
                    prevTotalScore += c.healthScore;
                    prevScoredCount++;
                }
            } else {
                prevTotalScore += c.healthScore;
                prevScoredCount++;
            }
        }
    });
   
    let avgHealth = scoredCount > 0 ? Math.round(totalScore / scoredCount) : 0;
    let prevHealth = prevScoredCount > 0 ? Math.round(prevTotalScore / prevScoredCount) : avgHealth;
    let healthProps = window.getHealthBadgeProps(avgHealth);
    let healthColor = healthProps.text;
   
    if(dom.hEl) dom.hEl.className = 'relative z-10 mt-auto pt-2';
    if(dom.uEl) dom.uEl.className = 'relative z-10 mt-auto pt-2';
    if(dom.pEl) dom.pEl.className = 'relative z-10 mt-auto pt-2';
    if(dom.rEl) dom.rEl.className = 'relative z-10 mt-auto pt-2';
   
    if(dom.hEl) dom.hEl.innerHTML = scoredCount > 0 ? window.getTrendHtml(avgHealth, prevHealth, '', '', healthColor, 'last 30 days') : `<span class="text-3xl font-bold text-muted-foreground">N/A</span>`;

    let totalUnits = 0;
    let prevUnits = 0;
    fProjects.forEach(p => {
        if (p.projectStatus === 'Active' || p.projectStatus === 'Suspended') {
            let u = parseInt(p.units) || 0;
            totalUnits += u;
            if (p.releaseDateVal && p.releaseDateVal <= thirtyDaysAgo) {
                prevUnits += u;
            }
        }
    });
    if(dom.uEl) dom.uEl.innerHTML = window.getTrendHtml(totalUnits, prevUnits, '', '', 'text-foreground', 'last 30 days');

    let pipelineCount = 0;
    let prevPipelineCount = 0;
    const fortyFiveDays = new Date().getTime() + (45 * 86400000);
    const fifteenDays = new Date().getTime() + (15 * 86400000);
   
    fProjects.forEach(p => {
        if (p.projectStatus === 'Onboarding') {
            if (p.releaseDateVal && p.releaseDateVal <= fortyFiveDays) pipelineCount++;
            if (p.releaseDateVal && p.releaseDateVal <= fifteenDays) prevPipelineCount++;
        }
        if (p.projectStatus === 'Active' || p.projectStatus === 'Suspended') {
            if (p.releaseDateVal && p.releaseDateVal > thirtyDaysAgo && p.releaseDateVal <= fortyFiveDays) {
                prevPipelineCount++;
            }
        }
    });
    if(dom.pEl) dom.pEl.innerHTML = window.getTrendHtml(pipelineCount, prevPipelineCount, '', '', 'text-foreground', 'last 30 days');

    let qRev = 0;
    let prevQRev = 0;
    let today = new Date(); let currYear = today.getFullYear(); let currQtr = Math.floor(today.getMonth() / 3);
   
    fServices.forEach(s => {
        if (s.outcome === 'Won') {
            let d = new Date(s.dateVal || s.dateInput || 0);
            let y = d.getFullYear();
            let q = Math.floor(d.getMonth() / 3);
            if (y === currYear && q === currQtr) {
                 qRev += window.parseCurrency(s.price);
            } else if ((y === currYear && q === currQtr - 1) || (y === currYear - 1 && currQtr === 0 && q === 3)) {
                 prevQRev += window.parseCurrency(s.price);
            }
        }
    });
    if(dom.rEl) dom.rEl.innerHTML = window.getTrendHtml(qRev, prevQRev, '$', '', 'text-foreground', 'last quarter');

    let risk = 0, warning = 0, healthy = 0;
    activeClients.forEach(c => {
        if (c.healthScore !== "N/A" && typeof c.healthScore === 'number') {
            if (c.healthScore >= healthyThresh) healthy++;
            else if (c.healthScore >= warningThresh) warning++;
            else risk++;
        }
    });
   
    if (dom.distEl) {
        let total = risk + warning + healthy;
        if (total === 0) {
            dom.distEl.innerHTML = `<div class="flex flex-col items-center justify-center h-full text-center p-6 w-full"><div class="w-12 h-12 rounded-full bg-muted/50 text-muted-foreground flex items-center justify-center mb-3"><i data-lucide="pie-chart" class="w-6 h-6 opacity-50"></i></div><h4 class="text-sm font-bold text-foreground mb-1">No Data Available</h4><p class="text-xs text-muted-foreground">No scored clients match this filter.</p></div>`;
        } else {
            dom.distEl.innerHTML = `
            <div class="flex flex-row items-center justify-center gap-6 w-full h-full px-2">
                <div class="w-60 h-60 shrink-0 relative flex items-center justify-center">
                    <canvas id="dashPortfolioChartCanvas"></canvas>
                    <div class="absolute inset-0 flex flex-col items-center justify-center pointer-events-none mt-1">
                        <span class="text-4xl font-bold text-foreground leading-none">${total}</span>
                        <span class="text-[11px] text-muted-foreground font-semibold mt-1 text-center leading-tight">Active<br>Clients</span>
                    </div>
                </div>
                <div class="flex flex-col justify-center space-y-4 shrink-0 pr-2">
                    <button class="px-5 py-2.5 rounded-full text-[13px] font-medium bg-lime-500/10 text-lime-700 border border-lime-500/20 hover:bg-lime-500/20 hover:-translate-y-1 hover:shadow-md transition-all duration-300 shadow-sm text-left flex items-center justify-between min-w-[120px] active:scale-95 transition-all duration-200" onclick="window.switchPage('health'); setTimeout(function(){window.setKpiFilter('healthy')}, 100);">
                        <span>Healthy</span>
                        <span class="ml-3 text-sm font-bold">${healthy}</span>
                    </button>
                    <button class="px-5 py-2.5 rounded-full text-[13px] font-medium bg-orange-500/10 text-orange-700 border border-orange-500/20 hover:bg-orange-500/20 hover:-translate-y-1 hover:shadow-md transition-all duration-300 shadow-sm text-left flex items-center justify-between min-w-[120px] active:scale-95 transition-all duration-200" onclick="window.switchPage('health'); setTimeout(function(){window.setKpiFilter('warning')}, 100);">
                        <span>Warning</span>
                        <span class="ml-3 text-sm font-bold">${warning}</span>
                    </button>
                    <button class="px-5 py-2.5 rounded-full text-[13px] font-medium bg-red-500/10 text-destructive border border-red-500/20 hover:bg-destructive/20 hover:-translate-y-1 hover:shadow-md transition-all duration-300 shadow-sm text-left flex items-center justify-between min-w-[120px] active:scale-95 transition-all duration-200" onclick="window.switchPage('health'); setTimeout(function(){window.setKpiFilter('risk')}, 100);">
                        <span>At Risk</span>
                        <span class="ml-3 text-sm font-bold">${risk}</span>
                    </button>
                </div>
            </div>`;

            if (window.dashPortfolioChart) { window.dashPortfolioChart.destroy(); window.dashPortfolioChart = null; }
            
            if (typeof Chart !== 'undefined') {
                const ctx = document.getElementById('dashPortfolioChartCanvas').getContext('2d');
                window.dashPortfolioChart = new Chart(ctx, {
                    type: 'doughnut',
                    data: { 
                        labels: ['Healthy', 'Warning', 'At Risk'], 
                        datasets: [{ data: [healthy, warning, risk], backgroundColor: ['#84cc16', '#f97316', '#ef4444'], borderWidth: 2, borderColor: '#ffffff', hoverOffset: 4 }] 
                    },
                    options: {
                        responsive: true, maintainAspectRatio: false, cutout: '70%',
                        plugins: { 
                            legend: { display: false }, 
                            tooltip: { 
                                backgroundColor: '#ffffff', titleColor: '#0f172a', bodyColor: '#0f172a', borderColor: '#e2e8f0', borderWidth: 1, padding: 10, cornerRadius: 4, displayColors: true, boxPadding: 4, usePointStyle: false,
                                callbacks: {
                                    title: function() { return ''; },
                                    label: function(context) { return context.label + ' ' + context.raw; }
                                }
                            } 
                        },
                        animation: { animateScale: true, animateRotate: true },
                        onClick: (e, elements) => {
                            if (elements.length > 0) {
                                const idx = elements[0].index;
                                const filters = ['healthy', 'warning', 'risk'];
                                window.switchPage('health');
                                setTimeout(() => window.setKpiFilter(filters[idx]), 100);
                            }
                        },
                        onHover: (e, elements, chart) => {
                            chart.canvas.style.cursor = elements.length ? 'pointer' : 'default';
                        }
                    }
                });
            }
        }
    }

    let riskClients = activeClients.filter(c => c.healthScore !== "N/A" && c.healthScore < warningThresh).sort((a,b) => a.healthScore - b.healthScore);
    let suspended = fProjects.filter(p => p.projectStatus === 'Suspended');
   
    if (dom.actionReqWidget && dom.riskList && dom.susList && dom.portfolioWidget && dom.moversWidget) {
        
        let hasRisk = riskClients.length > 0;
        let hasSus = suspended.length > 0;
        
        if (hasRisk) {
            dom.riskList.innerHTML = riskClients.map(c => `
                <div class="flex justify-between items-center p-3.5 rounded-xl border border-border bg-white shadow-sm cursor-pointer hover:border-destructive/50 hover:-translate-y-1 hover:shadow-md transition-all duration-300 group" onclick="if(typeof window.openDrawer==='function') window.openDrawer({clientId: '${c.clientId}'}, 'health')">
                    <div class="flex flex-col min-w-0 pr-3">
                        <span class="text-sm font-semibold text-foreground truncate group-hover:text-destructive transition-colors" title="${window.sanitizeHTML(c.companyName)}">${window.sanitizeHTML(c.companyName)}</span>
                    </div>
                    <div class="flex shrink-0">
                        ${window.buildBadge(window.getHealthBadgeProps(c.healthScore), c.healthScore)}
                    </div>
                </div>
            `).join('');
        } else {
            dom.riskList.innerHTML = `<div class="flex flex-col items-center justify-center h-full text-center p-6"><div class="w-12 h-12 rounded-full bg-muted/50 text-muted-foreground flex items-center justify-center mb-3"><i data-lucide="shield-check" class="w-6 h-6 opacity-50"></i></div><h4 class="text-sm font-bold text-foreground mb-1">All Clear</h4><p class="text-xs text-muted-foreground">No clients are currently at risk.</p></div>`;
        }

        if (hasSus) {
            dom.susList.innerHTML = suspended.map(p => {
                let clientDisplay = (p.clients || []).join(', ');
                return `
                <div class="flex justify-between items-center p-3.5 rounded-xl border border-border bg-white shadow-sm cursor-pointer hover:border-destructive/50 hover:-translate-y-1 hover:shadow-md transition-all duration-300 group" onclick="if(typeof window.openProjectDrawer==='function') window.openProjectDrawer('${p.id}', 'details')">
                     <div class="flex flex-col min-w-0 pr-3 flex-1">
                          <span class="text-sm font-semibold text-foreground group-hover:text-destructive transition-colors break-words leading-tight" title="${window.sanitizeHTML(p.name)}">${window.sanitizeHTML(p.name)}</span>
                          <div class="flex flex-col mt-1.5 gap-0.5">
                              <span class="text-[10px] font-bold text-muted-foreground break-words leading-tight" title="${window.sanitizeHTML(clientDisplay)}">${window.sanitizeHTML(clientDisplay)}</span>
                          </div>
                     </div>
                     <div class="flex items-center shrink-0 pl-2">
                         <i data-lucide="pause-circle" class="w-5 h-5 text-red-500 group-hover:text-destructive transition-colors"></i>
                     </div>
                 </div>`;
            }).join('');
        } else {
            dom.susList.innerHTML = `<div class="flex flex-col items-center justify-center h-full text-center p-6"><div class="w-12 h-12 rounded-full bg-muted/50 text-muted-foreground flex items-center justify-center mb-3"><i data-lucide="play-circle" class="w-6 h-6 opacity-50"></i></div><h4 class="text-sm font-bold text-foreground mb-1">No Suspensions</h4><p class="text-xs text-muted-foreground">There are no suspended projects.</p></div>`;
        }

        if (hasRisk || hasSus) {
            dom.actionReqWidget.classList.remove('hidden');
            
            let headerHtml = '';
            if (hasRisk && hasSus) {
                headerHtml = `
                <div class="flex flex-col p-4 pb-3 border-b border-red-200 bg-red-50 w-full">
                    <div class="font-bold text-base tracking-tight text-destructive flex items-center gap-2 mb-3"><i data-lucide="alert-octagon" class="w-4 h-4"></i> Action Required</div>            
                    <div class="bg-red-100 p-1 rounded-lg inline-flex items-center h-8 shrink-0 shadow-sm border border-red-200 w-full">
                        <button onclick="window.toggleActionTab('risk')" id="dash-action-tab-risk" class="relative inline-flex flex-1 items-center justify-center rounded-md px-2 py-1 text-[11px] font-bold whitespace-nowrap transition-all text-destructive bg-white shadow-sm border-transparent active:scale-95 transition-all duration-200">At Risk</button>
                        <button onclick="window.toggleActionTab('sus')" id="dash-action-tab-sus" class="relative inline-flex flex-1 items-center justify-center rounded-md px-2 py-1 text-[11px] font-bold whitespace-nowrap transition-all text-muted-foreground hover:text-destructive active:scale-95 transition-all duration-200">Suspended</button>
                    </div>
                </div>`;
                dom.riskList.classList.remove('hidden'); dom.susList.classList.add('hidden');
            } else if (hasRisk) {

                            ${act} Active
                        </button>
                        <button onclick="window.openDashDrilldown('Onboarding Projects', '${window.sanitizeHTML(m).replace(/'/g, "\\'")}', '${cacheOnb}', 'am_onb')" class="inline-flex flex-1 items-center justify-center px-3 py-2 rounded-md bg-blue-500/10 text-blue-700 text-xs font-bold shadow-sm whitespace-nowrap group/btn hover:-translate-y-1 hover:shadow-md transition-all duration-300 active:scale-95 transition-all duration-200">
                            ${onb} Onboarding
                        </button>
                    </div>
                </div>`;
            });
           
            if(!workloadHtml) workloadHtml = `<div class="flex flex-col items-center justify-center h-full text-center p-6 w-full"><div class="w-12 h-12 rounded-full bg-muted/50 text-muted-foreground flex items-center justify-center mb-3"><i data-lucide="users-2" class="w-6 h-6 opacity-50"></i></div><h4 class="text-sm font-bold text-foreground mb-1">No Workload</h4><p class="text-xs text-muted-foreground">No projects assigned matching this filter.</p></div>`;
            dom.wlEl.innerHTML = workloadHtml;
        }
    }, 30);

    setTimeout(() => {
        let today = new Date(); let currYear = today.getFullYear(); let currQtr = Math.floor(today.getMonth() / 3);

        if (dom.rsEl) {
            let qServices = fServices.filter(s => {
                if (s.outcome !== 'Won') return false;
                let d = new Date(s.dateVal || s.dateInput || 0);
                return d.getFullYear() === currYear && Math.floor(d.getMonth() / 3) === currQtr;
            }).sort((a,b) => (b.dateVal || 0) - (a.dateVal || 0));
           
            let qRevCalc = 0;
            qServices.forEach(s => qRevCalc += window.parseCurrency(s.price));
            if(dom.rsCount) dom.rsCount.innerText = qServices.length;
             if(dom.rsRev) dom.rsRev.innerText = '$' + qRevCalc.toLocaleString('en-US', {minimumFractionDigits: 2, maximumFractionDigits: 2});
           
            if (qServices.length === 0) {
                dom.rsEl.innerHTML = `<div class="flex flex-col items-center justify-center h-full text-center p-6"><div class="w-12 h-12 rounded-full bg-muted/50 text-muted-foreground flex items-center justify-center mb-3"><i data-lucide="briefcase" class="w-6 h-6 opacity-50"></i></div><h4 class="text-sm font-bold text-foreground mb-1">No Recent Services</h4><p class="text-xs text-muted-foreground">No services delivered this quarter.</p></div>`;
            } else {
                dom.rsEl.innerHTML = '<div class="flex flex-col">' + qServices.slice(0, 10).map(s => {
                    let dStr = s.dateVal ? new Date(s.dateVal).toLocaleDateString('en-US', {month: 'short', day: 'numeric', year: 'numeric'}) : (s.dateStr || '-');
                    let val = "$" + window.parseCurrency(s.price).toLocaleString('en-US', {minimumFractionDigits: 2, maximumFractionDigits: 2});
                    
                    let svcTypeDef = window.AvesdoState.settings && window.AvesdoState.settings.serviceTypes ? window.AvesdoState.settings.serviceTypes.find(t => t.name === s.type) : null;
                    let cKey = (svcTypeDef && svcTypeDef.color) ? svcTypeDef.color : 'slate';
                    let iconName = (svcTypeDef && svcTypeDef.icon) ? svcTypeDef.icon : 'briefcase';
                    let hex = window.hexColorMap && window.hexColorMap[cKey] ? window.hexColorMap[cKey] : '#94a3b8';

                    let sName = window.sanitizeHTML(s.name || '-');
                    let cName = window.sanitizeHTML(s.clientName || s.projectName || 'No Client attached');

                    return `
                    <div class="flex justify-between items-center p-4 -mx-2 rounded-lg hover:bg-muted/50 transition-colors cursor-pointer group border-b border-border/50 last:border-0" onclick="if(typeof window.openServiceDrawer === 'function') window.openServiceDrawer('${s.id}')">
                        <div class="flex items-center gap-3.5 min-w-0 pr-3 w-[70%]">
                            <div style="background-color: ${hex}20; color: ${hex};" class="w-10 h-10 rounded-full flex items-center justify-center shrink-0">
                                <i data-lucide="${iconName}" class="w-5 h-5"></i>
                            </div>
                            <div class="flex flex-col min-w-0">
                                <span class="text-[13px] font-bold text-foreground truncate group-hover:text-primary transition-colors" title="${sName}">${sName}</span>
                                <span class="text-xs font-medium text-muted-foreground mt-0.5 truncate" title="${cName} • ${window.sanitizeHTML(s.manager || 'Unassigned')}">${cName} <span class="mx-1 opacity-50">•</span> ${window.sanitizeHTML(s.manager || 'Unassigned')}</span>
                            </div>
                        </div>
                        <div class="flex flex-col items-end justify-center shrink-0 w-[30%]">
                            <span class="text-[13px] font-bold text-foreground tabular-nums">${val}</span>
                            <span class="text-xs text-muted-foreground font-medium tabular-nums mt-0.5">${dStr}</span>
                        </div>
                    </div>`;
                }).join('') + '</div>';
            }
        }

        if (dom.rglEl) {
            let qLaunches = fProjects.filter(p => {
                if (p.timelineStatus !== 'Released' && p.onboardingPhase !== 'Released') return false;
                let d = new Date(p.releaseDateVal || 0);
                return d.getFullYear() === currYear && Math.floor(d.getMonth() / 3) === currQtr;
             }).sort((a,b) => (b.releaseDateVal || 0) - (a.releaseDateVal || 0));
           
            if(dom.rglCount) dom.rglCount.innerText = qLaunches.length;
           
            if (qLaunches.length === 0) {
                dom.rglEl.innerHTML = `<div class="flex flex-col items-center justify-center h-full text-center p-6"><div class="w-12 h-12 rounded-full bg-muted/50 text-muted-foreground flex items-center justify-center mb-3"><i data-lucide="rocket" class="w-6 h-6 opacity-50"></i></div><h4 class="text-sm font-bold text-foreground mb-1">No Recent Launches</h4><p class="text-xs text-muted-foreground">No projects released this quarter.</p></div>`;
            } else {
                dom.rglEl.innerHTML = '<div class="flex flex-col">' + qLaunches.slice(0, 10).map(p => {
                    let dStr = p.releaseDateVal ? new Date(p.releaseDateVal).toLocaleDateString('en-US', {month: 'short', day: 'numeric', year: 'numeric'}) : (p.releaseDateStr || '-');
                    let hProps = window.getHealthBadgeProps(p.score);
                   
                    let iconBg = 'badge-' + (hProps.colorKey || 'slate');

                    let pName = window.sanitizeHTML(p.name || '-');
                    let clientDisplay = window.sanitizeHTML((p.clients || []).join(', ') || 'Internal');

                    return `
                    <div class="flex justify-between items-center p-4 -mx-2 rounded-lg hover:bg-muted/50 transition-colors cursor-pointer group border-b border-border/50 last:border-0" onclick="if(typeof window.openProjectDrawer==='function') window.openProjectDrawer('${p.id}', 'details')">
                        <div class="flex items-center gap-3.5 min-w-0 pr-3 w-[75%]">
                            <div class="w-10 h-10 rounded-full ${iconBg} flex items-center justify-center shrink-0">
                                <i data-lucide="rocket" class="w-5 h-5"></i>
                            </div>
                            <div class="flex flex-col min-w-0">
                                <span class="text-[13px] font-bold text-foreground truncate group-hover:text-primary transition-colors" title="${pName}">${pName}</span>
                                <span class="text-xs font-medium text-muted-foreground mt-0.5 truncate" title="${clientDisplay} • ${window.sanitizeHTML(p.assignee || 'Unassigned')}">${clientDisplay} <span class="mx-1 opacity-50">•</span> ${window.sanitizeHTML(p.assignee || 'Unassigned')}</span>
                            </div>
                        </div>
                        <div class="flex flex-col items-end justify-center shrink-0 w-[25%]">
                            <div class="inline-flex items-center justify-center rounded-full text-xs font-bold w-7 h-7 shadow-sm text-white ${hProps.fill.replace('bg-', 'bg-')}" title="Health Score">${p.score !== "N/A" ? p.score : '-'}</div>
                            <span class="text-xs text-muted-foreground font-medium tabular-nums mt-1">${dStr}</span>
                        </div>
                    </div>`;
                }).join('') + '</div>';
            }
        }
       
        if(typeof lucide !== 'undefined' && lucide.createIcons) lucide.createIcons();

        const ddDrawer = document.getElementById('dashDrilldownDrawer');
        if (window.dd_activeConfig && ddDrawer && !ddDrawer.classList.contains('translate-x-full')) {
            window.openDashDrilldown(window.dd_activeConfig.title, window.dd_activeConfig.subtitle, window.dd_activeConfig.cacheKey, window.dd_activeConfig.context, true);
        }

        if (isFilterUpdate) {
            const dashPage = document.getElementById('page-dashboard');
            if (dashPage) {
                dashPage.classList.remove('opacity-50', 'pointer-events-none');
                dashPage.style.animation = 'none';
                void dashPage.offsetHeight;
                dashPage.style.animation = 'fadeIn 0.3s ease-out forwards';
            }
        }
    }, 40);
}

window.exportAllClients = function() {
    if (!window.AvesdoState.data.clients || window.AvesdoState.data.clients.length === 0) return window.showToast("No data to export.", "error");
    window.showToast("Preparing export...", "success");
    const headers = ["Company Name", "Client Type", "Health Score", "Active Projects", "Onboarding Projects", "Closed Projects", "Account Manager"];
    const rowMapper = (c) => {
        let name = `"${(c.companyName || '').replace(/"/g, '""')}"`;
        let type = `"${(c.clientType || '').replace(/"/g, '""')}"`;
        let score = c.healthScore;
        let active = c.activeProjectCount || 0;
        let onb = c.onboardingProjectCount || 0;
        let closed = c.closedProjectCount || 0;
        let mgr = `"${(c.accountManager || '').replace(/"/g, '""')}"`;
        return `${name},${type},${score},${active},${onb},${closed},${mgr}`;
    };
    window.universalExportCSV("All_Clients", headers, window.AvesdoState.data.clients, rowMapper);
};

window.exportAllProjects = function() {
    if (!window.AvesdoState.data.projects || window.AvesdoState.data.projects.length === 0) return window.showToast("No data to export.", "error");
    window.showToast("Preparing export...", "success");
    const headers = ["Project Name", "Clients", "Score", "Release Date", "Manager", "Status", "Timeline", "Phase", "Units", "Features Active", "Checklist URL"];
    const rowMapper = (p) => {
        let name = `"${(p.name || '').replace(/"/g, '""')}"`;
        let clients = `"${(p.clients || []).join(', ').replace(/"/g, '""')}"`;
        let score = p.score === "N/A" || !p.score ? "N/A" : p.score;
        let rDate = `"${(p.releaseDateStr || 'No Date')}"`;
        let mgr = `"${(p.assignee || '').replace(/"/g, '""')}"`;
        let status = `"${(p.projectStatus || '').replace(/"/g, '""')}"`;
        let timeline = `"${(p.timelineStatus || '').replace(/"/g, '""')}"`;
        let phase = `"${(p.onboardingPhase || '').replace(/"/g, '""')}"`;
        let units = p.units || 0;
        let feats = `"${(p.features || []).join(', ').replace(/"/g, '""')}"`;
        let chk = `"${(p.checklistUrl || '').replace(/"/g, '""')}"`;
        return `${name},${clients},${score},${rDate},${mgr},${status},${timeline},${phase},${units},${feats},${chk}`;
    };
    window.universalExportCSV("All_Projects", headers, window.AvesdoState.data.projects, rowMapper);
};

window.exportAllServices = function() {
    if (!window.AvesdoState.data.services || window.AvesdoState.data.services.length === 0) return window.showToast("No data to export.", "error");
    window.showToast("Preparing export...", "success");
    const headers = ["Service Name", "Project", "Type", "Client", "Manager", "Price", "Outcome", "Status", "Date", "Invoice Sent", "Invoice Paid", "Commission", "Commission Paid", "Date Paid"];
    const rowMapper = (s) => {
        let name = `"${(s.name || '').replace(/"/g, '""')}"`;
        let project = `"${(s.projectName || '').replace(/"/g, '""')}"`;
        let type = `"${(s.type || '').replace(/"/g, '""')}"`;
        let client = `"${(s.clientName || '').replace(/"/g, '""')}"`;
        let mgr = `"${(s.manager || '').replace(/"/g, '""')}"`;
        let price = `"${(s.price || '$0.00').replace(/"/g, '""')}"`;
        let outcome = `"${(s.outcome || '').replace(/"/g, '""')}"`;
        let status = `"${(s.status || '').replace(/"/g, '""')}"`;
        let dateStr = `"${(s.dateInput || s.dateStr || '').replace(/"/g, '""')}"`;
        let invSent = `"${(s.invoiceSent || 'No')}"`;
        let invPaid = `"${(s.invoicePaid || 'No')}"`;
        let comm = `"${(s.commission || '$0.00').replace(/"/g, '""')}"`;
        let commPaid = `"${(s.commissionPaid || 'No')}"`;
        let datePaidStr = `"${(s.datePaidInput || s.datePaidStr || '').replace(/"/g, '""')}"`;
        return `${name},${project},${type},${client},${mgr},${price},${outcome},${status},${dateStr},${invSent},${invPaid},${comm},${commPaid},${datePaidStr}`;
    };
    window.universalExportCSV("All_Services", headers, window.AvesdoState.data.services, rowMapper);
};
</script>
