                 <input type="text" id="as-contact" class="w-full min-w-0 rounded-md border border-input bg-white px-3 py-2 shadow-sm outline-none focus:border-primary focus:ring-[3px] focus:ring-primary/20 transition-all hover:border-primary/50 text-sm" placeholder="Enter primary contact name...">

        <button onclick="window.saveNewService()" class="inline-flex items-center justify-center rounded-md text-sm font-medium whitespace-nowrap transition-all duration-200 active:scale-95 bg-primary text-primary-foreground hover:bg-primary/90 shadow-sm h-10 px-6 focus-visible:outline-none focus-visible:ring-[3px] focus-visible:ring-primary/20">Create Service</button>
