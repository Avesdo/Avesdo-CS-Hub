<script>
// ==========================================
// SETTINGS LOGIC (Refactored w/ Event Delegation & Bulk Updates)
// ==========================================

window.switchSettingsTab = function(tabId) {
    ['org', 'workflow', 'products', 'scoring'].forEach(t => {
        const btn = document.getElementById('set-btn-' + t);
        const content = document.getElementById('set-tab-' + t);
        if (btn) {
            btn.classList.remove('bg-accent', 'text-foreground', 'shadow-sm');
            btn.classList.add('text-muted-foreground');
        }
        if (content) { content.classList.add('hidden'); content.classList.remove('block'); }
    });
    const activeBtn = document.getElementById('set-btn-' + tabId);
    const activeContent = document.getElementById('set-tab-' + tabId);
    if (activeBtn) {
        activeBtn.classList.remove('text-muted-foreground');
        activeBtn.classList.add('bg-accent', 'text-foreground', 'shadow-sm');
    }
    if (activeContent) {
        activeContent.classList.remove('hidden');
        activeContent.classList.add('block');
        activeContent.style.animation = 'none';
        void activeContent.offsetHeight;
        activeContent.style.animation = 'fadeIn 0.3s ease-out forwards';
    }
}

window.initSettingsUI = function() {
    window.renderSettingsList('mgr'); window.renderSettingsList('status'); window.renderSettingsList('tl');
    window.renderSettingsList('phase'); window.renderSettingsList('svcout'); window.renderSettingsList('svcstat');
    window.renderSettingsList('svc'); window.renderSettingsList('feat'); window.renderSettingsList('ctype');
    window.renderSettingsList('svctype');
    if (window.AvesdoState.settings && window.AvesdoState.settings.scoring) {
        let cw = window.AvesdoState.settings.scoring.clientWeights;
        if(document.getElementById('set-w-fin')) document.getElementById('set-w-fin').value = cw.billing;
        if(document.getElementById('set-w-eng')) document.getElementById('set-w-eng').value = cw.engagement;
        if(document.getElementById('set-w-util')) document.getElementById('set-w-util').value = cw.utilization;
        if(document.getElementById('set-w-csat')) document.getElementById('set-w-csat').value = cw.experience;
       
        let pw = window.AvesdoState.settings.scoring.weights;
        if(document.getElementById('set-pw-op')) document.getElementById('set-pw-op').value = pw.opActivity;
        if(document.getElementById('set-pw-feat')) document.getElementById('set-pw-feat').value = pw.featAdoption;
        if(document.getElementById('set-pw-user')) document.getElementById('set-pw-user').value = pw.userVol;
        if(document.getElementById('set-pw-csat')) document.getElementById('set-pw-csat').value = pw.csat;
       
        let t = window.AvesdoState.settings.scoring.thresholds;
        if(document.getElementById('set-t-healthy')) document.getElementById('set-t-healthy').value = t.healthy;
        if(document.getElementById('set-t-risk')) document.getElementById('set-t-risk').value = t.warning;
       
        window.updateScoreLabels();
    }
}

// 🛡️ EVENT DELEGATION MASTER LISTENER
document.addEventListener('DOMContentLoaded', () => {
    document.body.addEventListener('click', (e) => {
        const btn = e.target.closest('.set-action-btn');
        if (!btn) return;
       
        const action = btn.dataset.action;
        const type = btn.dataset.type;
        const idx = btn.dataset.idx;

        if (action === 'switch-settings-tab') { e.preventDefault(); window.switchSettingsTab(btn.dataset.target); }
        if (action === 'add-setting') { e.preventDefault(); window.addSettingItem(type); }
        if (action === 'edit') { e.preventDefault(); window.startSettingEdit(type, parseInt(idx)); }
        if (action === 'delete') { e.preventDefault(); window.startSettingDelete(type, parseInt(idx)); }
        if (action === 'save') { e.preventDefault(); window.saveSettingEdit(type, parseInt(idx)); }
        if (action === 'cancel-edit') { e.preventDefault(); window.cancelSettingEdit(); }
        if (action === 'confirm-delete') { e.preventDefault(); window.confirmSettingDelete(type, parseInt(idx)); }
        if (action === 'cancel-delete') { e.preventDefault(); window.cancelSettingDelete(); }
        if (action === 'move-up') { e.preventDefault(); window.moveSetting(type, parseInt(idx), -1); }
        if (action === 'move-down') { e.preventDefault(); window.moveSetting(type, parseInt(idx), 1); }
       
        if (action === 'toggle-color-pop') {
            e.preventDefault();
            if (typeof window.togglePop === 'function') window.togglePop(e, btn.dataset.target);
        }
       
        if (action === 'pick-new-color') {
            e.preventDefault();
            const color = btn.dataset.color;
            const colorName = btn.dataset.colorname;
            let inp = document.getElementById(`set-color-${type}`);
            let txt = document.getElementById(`set-color-${type}-text`);
            if(inp) inp.value = color;
            if(txt) txt.innerHTML = window.buildColorItemHtml(color, colorName);
            if (typeof window.closePopups === 'function') window.closePopups();
        }
        if (action === 'pick-edit-color') {
            e.preventDefault();
            const color = btn.dataset.color;
            const colorName = btn.dataset.colorname;
            const t = btn.dataset.type;
            const i = btn.dataset.idx;
            document.getElementById(`edit-color-${t}-${i}`).value = color;
            document.getElementById(`edit-color-${t}-${i}-text`).innerHTML = window.buildColorItemHtml(color, colorName);
            window.closePopups();
        }
        if (action === 'pick-new-icon') {
            e.preventDefault();
            const icon = btn.dataset.icon;
            const t = btn.dataset.type;
            document.getElementById(`set-icon-${t}`).value = icon;
            document.getElementById(`set-icon-${t}-icon`).setAttribute('data-lucide', icon);
            if(lucide && lucide.createIcons) lucide.createIcons();
            window.closePopups();
        }
        if (action === 'pick-edit-icon') {
            e.preventDefault();
            const icon = btn.dataset.icon;
            const t = btn.dataset.type;
            const i = btn.dataset.idx;
            document.getElementById(`edit-icon-${t}-${i}`).value = icon;
            document.getElementById(`edit-icon-${t}-${i}-icon`).setAttribute('data-lucide', icon);
            if(lucide && lucide.createIcons) lucide.createIcons();
            window.closePopups();
        }


        if (action === 'pick-color') {
            e.preventDefault();
            const color = btn.dataset.color;
            const colorName = btn.dataset.colorname;
            let inp = document.getElementById(`edit-color-${type}-${idx}`);
            let txt = document.getElementById(`edit-color-${type}-${idx}-text`);
            if(inp) inp.value = color;
            if(txt) txt.innerHTML = window.buildColorItemHtml(color, colorName);
            if (typeof window.closePopups === 'function') window.closePopups();
        }

        if (action === 'save-weights') {
            e.preventDefault();
            window.saveScoringWeights();
        }
    });

    document.body.addEventListener('keydown', (e) => {
        if (e.key === 'Enter') {
            const editInput = e.target.closest('.set-edit-input');
            const addInput = e.target.closest('.set-input-enter');
           
            if (editInput) {
                e.preventDefault();
                const type = editInput.dataset.type;
                const idx = editInput.dataset.idx;
                window.saveSettingEdit(type, parseInt(idx));
            } else if (addInput) {
                e.preventDefault();
                const type = addInput.dataset.type;
                window.addSettingItem(type);
            }
        }
    });

    document.body.addEventListener('input', (e) => {
        if (e.target.classList.contains('set-input-range')) {
            window.updateScoreLabels();
        }
    });

    document.body.addEventListener('change', (e) => {
        if (e.target.classList.contains('set-input-threshold')) {
            window.saveThresholds();
        }
    });
});

function getSettingsArray(type) {
    if (type === 'mgr') { if(!window.AvesdoState.settings.managers) window.AvesdoState.settings.managers = []; return window.AvesdoState.settings.managers; }
    if (type === 'status') { if(!window.AvesdoState.settings.statuses) window.AvesdoState.settings.statuses = []; return window.AvesdoState.settings.statuses; }
    if (type === 'tl') { if(!window.AvesdoState.settings.timelines) window.AvesdoState.settings.timelines = []; return window.AvesdoState.settings.timelines; }
    if (type === 'phase') { if(!window.AvesdoState.settings.phases) window.AvesdoState.settings.phases = []; return window.AvesdoState.settings.phases; }
    if (type === 'svcout') return window.AvesdoState.settings.settingsData ? window.AvesdoState.settings.settingsData.filter(s => s.category === 'ServiceOutcome') : [];
    if (type === 'svcstat') return window.AvesdoState.settings.settingsData ? window.AvesdoState.settings.settingsData.filter(s => s.category === 'ServiceStatus') : [];
    if (type === 'svc') { if(!window.AvesdoState.settings.services) window.AvesdoState.settings.services = []; return window.AvesdoState.settings.services; }
    if (type === 'feat') { if(!window.AvesdoState.settings.features) window.AvesdoState.settings.features = []; return window.AvesdoState.settings.features; }
    if (type === 'ctype') { if(!window.AvesdoState.settings.clientTypes) window.AvesdoState.settings.clientTypes = []; return window.AvesdoState.settings.clientTypes; }
    if (type === 'svctype') { if(!window.AvesdoState.settings.serviceTypes) window.AvesdoState.settings.serviceTypes = []; return window.AvesdoState.settings.serviceTypes; }
    return [];
}

window.dragSetStart = function(e, type, idx) {
    e.dataTransfer.effectAllowed = 'move';
    e.dataTransfer.setData('text/plain', JSON.stringify({type: type, idx: idx}));
    if (e.currentTarget) e.currentTarget.classList.add('opacity-50');
};

window.dragSetEnd = function(e) {
    if (e.currentTarget) {
        e.currentTarget.classList.remove('opacity-50');
        e.currentTarget.setAttribute('draggable', 'false');
    }
    document.querySelectorAll('.drag-over-li').forEach(el => el.classList.remove('drag-over-li', 'bg-accent/50', 'border-t-2', 'border-primary'));
};

window.dragSetOver = function(e) {
    e.preventDefault(); 
    e.dataTransfer.dropEffect = 'move';
    const li = e.target.closest('li');
    if(li) li.classList.add('drag-over-li', 'bg-accent/50', 'border-t-2', 'border-primary');
};

window.dragSetLeave = function(e) {
    const li = e.target.closest('li');
    if(li) li.classList.remove('drag-over-li', 'bg-accent/50', 'border-t-2', 'border-primary');
};

window.dragSetDrop = function(e, targetType, targetIdx) {
    e.preventDefault();
    document.querySelectorAll('.drag-over-li').forEach(el => el.classList.remove('drag-over-li', 'bg-accent/50', 'border-t-2', 'border-primary'));
    try {
        let data = JSON.parse(e.dataTransfer.getData('text/plain'));
        if (data.type === targetType && data.idx !== targetIdx) {
            let sourceIdx = data.idx;
            if (['svcout', 'svcstat'].includes(targetType)) {
                let cat = targetType === 'svcout' ? 'ServiceOutcome' : 'ServiceStatus';
                let items = window.AvesdoState.settings.settingsData.filter(s => s.category === cat);
                let item = items.splice(sourceIdx, 1)[0];
                items.splice(targetIdx, 0, item);
                
                window.AvesdoState.settings.settingsData = window.AvesdoState.settings.settingsData.filter(s => s.category !== cat).concat(items);
            } else {
                let arr = getSettingsArray(targetType);
                let item = arr.splice(sourceIdx, 1)[0];
                arr.splice(targetIdx, 0, item);
            }
            window.renderSettingsList(targetType);
            if(typeof window.pushSettingsToServer === 'function') window.pushSettingsToServer(true);
        }
    } catch(err){}
};

window.colorMapNames = {"slate":"Slate","slateDark":"Dark Slate","red":"Red","rose":"Rose","amber":"Amber","orange":"Orange","emerald":"Emerald","lime":"Lime","teal":"Teal","blue":"Blue","cyan":"Cyan","indigo":"Indigo","purple":"Purple","pink":"Pink","violet":"Violet"};

window.hexColorMap = {"slate":"#64748b","slateDark":"#334155","red":"#ef4444","rose":"#f43f5e","amber":"#f59e0b","orange":"#f97316","emerald":"#10b981","lime":"#84cc16","teal":"#14b8a6","blue":"#3b82f6","cyan":"#06b6d4","indigo":"#6366f1","purple":"#a855f7","pink":"#ec4899","violet":"#8b5cf6"};

window.buildColorItemHtml = function(colorKey, colorName) {
    const hex = window.hexColorMap[colorKey] || '#94a3b8';
    return '<div class="flex items-center gap-2"><span class="w-3 h-3 rounded-full shrink-0 border border-black/10" style="background-color: ' + hex + ';"></span><span class="truncate">' + colorName + '</span></div>';
};

function generateColorPickerHtml(type, idx, currentColor, currentIcon) {
    const colorMapNames = window.colorMapNames || {};
    const currentName = colorMapNames[currentColor] || 'Slate (Default)';
    
    let popoverItems = Object.keys(colorMapNames).map(k =>
        '<div class="set-action-btn radix-item text-sm" data-action="pick-edit-color" data-type="' + type + '" data-idx="' + idx + '" data-color="' + k + '" data-colorname="' + colorMapNames[k] + '">' + window.buildColorItemHtml(k, colorMapNames[k]) + '</div>'
    ).join('');

    const iconList = ["alarm-clock","alert-circle","alert-triangle","archive","award","ban","blocks","briefcase","building","building-2","calendar","calendar-check","calendar-clock","calendar-x","check-circle-2","circle-check-big","circle-dashed","circle-ellipsis","circle-x","clipboard-check","clock-alert","contact","file-text","flag","hammer","house","house-plus","inbox","loader","loader-2","loader-circle","mail","package","package-check","pause","pause-circle","play","play-circle","plus-circle","rocket","search","send","settings","shield","shield-check","star","stop-circle","target","thumbs-up","trending-up","trophy","user","users","wrench"];
    let currentIconName = currentIcon || 'circle-dashed';
    let iconPopoverItems = iconList.map(i => 
        `<div class="set-action-btn radix-item flex justify-center p-2 hover:bg-accent rounded-md cursor-pointer" data-action="pick-edit-icon" data-type="${type}" data-idx="${idx}" data-icon="${i}"><i data-lucide="${i}" class="w-4 h-4 pointer-events-none"></i></div>`
    ).join('');

    if (type === 'mgr') {
        return `
        <div class="flex gap-2 shrink-0">
            <div class="relative w-32 shrink-0">
                <input type="hidden" id="edit-color-${type}-${idx}" value="${currentColor}">
                <button class="set-action-btn radix-trigger bordered w-full px-3 h-8 flex justify-between items-center text-sm bg-white border-input shadow-xs hover:border-primary/50 transition-colors" data-action="toggle-color-pop" data-target="pop-edit-color-${type}-${idx}">
                    <span id="edit-color-${type}-${idx}-text" class="flex-1 text-left">${window.buildColorItemHtml(currentColor, currentName)}</span>
                    <i data-lucide="chevron-down" class="w-3 h-3 text-muted-foreground shrink-0 ml-1"></i>
                </button>
                <div id="pop-edit-color-${type}-${idx}" class="radix-popover match-trigger p-1 shadow-lg z-[999] bg-white border border-border rounded-md">
                    ${popoverItems}
                </div>
            </div>
        </div>`;
    }

    return `
    <div class="flex gap-2 shrink-0">
        <div class="relative w-32 shrink-0">
            <input type="hidden" id="edit-color-${type}-${idx}" value="${currentColor}">
            <button class="set-action-btn radix-trigger bordered w-full px-3 h-8 flex justify-between items-center text-sm bg-white border-input shadow-xs hover:border-primary/50 transition-colors" data-action="toggle-color-pop" data-target="pop-edit-color-${type}-${idx}">
                <span id="edit-color-${type}-${idx}-text" class="flex-1 text-left">${window.buildColorItemHtml(currentColor, currentName)}</span>
                <i data-lucide="chevron-down" class="w-3 h-3 text-muted-foreground shrink-0 ml-1"></i>
            </button>
            <div id="pop-edit-color-${type}-${idx}" class="radix-popover match-trigger p-1 shadow-lg z-[999] bg-white border border-border rounded-md">
                ${popoverItems}
            </div>
        </div>
        <div class="relative w-16 shrink-0">
            <input type="hidden" id="edit-icon-${type}-${idx}" value="${currentIconName}">
            <button class="set-action-btn radix-trigger bordered w-full px-2 h-8 flex justify-center items-center text-sm bg-white border-input shadow-xs hover:border-primary/50 transition-colors" data-action="toggle-color-pop" data-target="pop-edit-icon-${type}-${idx}">
                <i id="edit-icon-${type}-${idx}-icon" data-lucide="${currentIconName}" class="w-4 h-4"></i>
            </button>
            <div id="pop-edit-icon-${type}-${idx}" class="radix-popover match-trigger p-2 shadow-lg z-[999] bg-white border border-border rounded-md">
                <div class="grid grid-cols-6 gap-1 w-[260px]">
                    ${iconPopoverItems}
                </div>
            </div>
        </div>
    </div>`;
}

window.renderSettingsList = function(type) {
    const listEl = document.getElementById('set-list-' + type);
    if (!listEl) return;
   
    let arr = getSettingsArray(type);
    if (!arr || arr.length === 0) {
        listEl.innerHTML = `<li class="p-8 flex flex-col items-center justify-center text-center text-sm text-muted-foreground font-medium"><i data-lucide="inbox" class="w-8 h-8 mb-2 opacity-20"></i>No items found.</li>`;
        if(typeof lucide !== 'undefined' && lucide.createIcons) lucide.createIcons();
        return;
    }
   
    let html = '';
    arr.forEach((item, idx) => {
        let name = typeof item === 'string' ? item : item.name;
        let isEditing = (typeof window !== 'undefined' && window.editingSetting && window.editingSetting.key === type && window.editingSetting.idx === idx);
        let isDeleting = (typeof window !== 'undefined' && window.deletingSetting && window.deletingSetting.key === type && window.deletingSetting.idx === idx);
       
        if (isEditing) {
            let extraInputs = '';
            if (['status', 'tl', 'phase', 'svcout', 'svcstat', 'mgr', 'ctype', 'svctype'].includes(type)) {
                let currentColor = item.attribute || item.color || 'slate';
                let currentIcon = item.icon || window.iconMap[currentColor] || 'circle-dashed';
                extraInputs = generateColorPickerHtml(type, idx, currentColor, currentIcon);
            } else if (type === 'svc') {
                extraInputs = `
                <div class="flex items-center gap-2 shrink-0">
                    <span class="text-muted-foreground font-bold text-sm">$</span>
                    <input type="number" id="edit-price-${type}-${idx}" value="${item.price || 0}" class="set-edit-input w-24 min-w-0 rounded-md border border-input bg-white px-2 py-1 shadow-xs outline-none focus-visible:border-ring focus-visible:ring-[3px] focus-visible:ring-ring/50 h-8 text-sm" data-type="${type}" data-idx="${idx}">
                </div>`;
            }
           
            html += `<li class="p-4 flex flex-col sm:flex-row justify-between items-start sm:items-center gap-3 border-b border-border bg-accent/20 last:border-0 relative z-50 shadow-sm border-l-4 border-l-primary bg-slate-50">
                <div class="flex items-center gap-3 w-full">
                    <input type="text" id="edit-name-${type}-${idx}" value="${window.sanitizeHTML(name)}" data-type="${type}" data-idx="${idx}" class="set-edit-input w-full min-w-0 rounded-md border border-primary bg-white px-3 py-1 shadow-xs outline-none focus-visible:border-ring focus-visible:ring-[3px] focus-visible:ring-ring/50 h-8 text-sm flex-1">
                    ${extraInputs}
                </div>
                <div class="flex items-center gap-2 shrink-0">
                    <button data-action="cancel-edit" class="set-action-btn text-xs font-medium text-muted-foreground hover:text-foreground px-2 py-1 transition-colors active:scale-95 transition-all duration-200">Cancel</button>
                    <button data-action="save" data-type="${type}" data-idx="${idx}" class="set-action-btn inline-flex items-center justify-center rounded-md text-xs font-medium transition-all bg-primary text-primary-foreground hover:bg-primary/90 h-8 px-3 shadow-sm active:scale-95 transition-all duration-200">Save</button>
                </div>
            </li>`;
        }
        else if (isDeleting) {
            html += `<li class="p-4 flex flex-col sm:flex-row justify-between items-start sm:items-center gap-3 border-b border-border bg-destructive/5 last:border-0">
                <div class="text-sm font-semibold text-destructive flex items-center gap-2"><i data-lucide="alert-circle" class="w-4 h-4"></i> Delete "${window.sanitizeHTML(name)}"? This will not update historical records.</div>
                <div class="flex items-center gap-2 shrink-0">
                    <button data-action="cancel-delete" class="set-action-btn text-xs font-medium text-muted-foreground hover:text-foreground px-2 py-1 transition-colors active:scale-95 transition-all duration-200">Cancel</button>
                    <button data-action="confirm-delete" data-type="${type}" data-idx="${idx}" class="set-action-btn inline-flex items-center justify-center rounded-md text-xs font-medium transition-all bg-destructive text-destructive-foreground hover:bg-destructive/90 h-8 px-3 shadow-sm active:scale-95 transition-all duration-200">Delete Forever</button>
                </div>
            </li>`;
        }
        else {
            let leftSide = '';
            if (['status', 'tl', 'phase', 'svcout', 'svcstat', 'mgr', 'ctype', 'svctype'].includes(type)) {
                let typeMap = { 'status': 'status', 'tl': 'timeline', 'phase': 'phase', 'svcout': 'ServiceOutcome', 'svcstat': 'ServiceStatus', 'mgr': 'Manager', 'ctype': 'ClientType', 'svctype': 'ServiceType' };
                let badgeType = typeMap[type];
                let props = window.getBadgeProps(badgeType, name);
                leftSide = `<div class="flex items-center gap-3">${window.buildBadge(props, name, 'px-2.5 py-1 text-xs shadow-sm tracking-wide font-semibold')}</div>`;
            } else if (type === 'svc') {
                let pVal = parseFloat(item.price || 0);
                let priceFormatted = "$" + pVal.toLocaleString('en-US', {minimumFractionDigits: 2, maximumFractionDigits: 2});
                leftSide = `<div class="flex items-center gap-3"><span class="text-sm font-medium text-foreground">${window.sanitizeHTML(name)}</span><span class="text-[11px] font-mono font-semibold text-muted-foreground bg-muted px-1.5 py-0.5 rounded border border-border shadow-sm">${priceFormatted}</span></div>`;
            } else {
                leftSide = `<span class="text-sm font-medium text-foreground">${window.sanitizeHTML(name)}</span>`;
            }

            html += `<li class="p-4 flex justify-between items-center border-b border-border hover:bg-muted/30 transition-colors group last:border-0 relative focus-within:z-50 hover:z-50" draggable="false" ondragstart="window.dragSetStart(event, '${type}', ${idx})" ondragover="window.dragSetOver(event)" ondragleave="window.dragSetLeave(event)" ondrop="window.dragSetDrop(event, '${type}', ${idx})" ondragend="window.dragSetEnd(event)">
                ${leftSide}
                <div class="flex items-center gap-1 opacity-0 group-hover:opacity-100 transition-opacity">
                    <button onmousedown="this.closest('li').setAttribute('draggable', 'true')" onmouseup="this.closest('li').setAttribute('draggable', 'false')" ontouchstart="this.closest('li').setAttribute('draggable', 'true')" ontouchend="this.closest('li').setAttribute('draggable', 'false')" class="set-action-btn cursor-grab active:cursor-grabbing p-1 text-muted-foreground hover:text-primary hover:bg-accent rounded-md transition-colors active:scale-95 transition-all duration-200" title="Drag to reorder"><i data-lucide="grip-vertical" class="w-4 h-4"></i></button>
                    <button data-action="move-up" data-type="${type}" data-idx="${idx}" class="set-action-btn p-1 text-muted-foreground hover:text-primary hover:bg-accent rounded-md transition-colors active:scale-95 transition-all duration-200" title="Move Up"><i data-lucide="chevron-up" class="w-4 h-4"></i></button>
                    <button data-action="move-down" data-type="${type}" data-idx="${idx}" class="set-action-btn p-1 text-muted-foreground hover:text-primary hover:bg-accent rounded-md transition-colors active:scale-95 transition-all duration-200" title="Move Down"><i data-lucide="chevron-down" class="w-4 h-4"></i></button>
                    <button data-action="edit" data-type="${type}" data-idx="${idx}" class="set-action-btn p-1 text-muted-foreground hover:text-primary hover:bg-accent rounded-md transition-colors active:scale-95 transition-all duration-200" title="Edit"><i data-lucide="pencil" class="w-4 h-4"></i></button>
                    <button data-action="delete" data-type="${type}" data-idx="${idx}" class="set-action-btn p-1 text-muted-foreground hover:text-destructive hover:bg-destructive/10 rounded-md transition-colors active:scale-95 transition-all duration-200" title="Delete"><i data-lucide="trash-2" class="w-4 h-4"></i></button>
                </div>
            </li>`;
        }
    });
   
    listEl.innerHTML = html;
    listEl.style.animation = 'none';
    void listEl.offsetHeight;
    listEl.style.animation = 'fadeIn 0.3s ease-out forwards';
    if(typeof lucide !== 'undefined' && lucide.createIcons) lucide.createIcons();

    if (window.editingSetting && window.editingSetting.key === type) {
        setTimeout(() => {
            let focusInput = document.getElementById(`edit-name-${type}-${window.editingSetting.idx}`);
            if (focusInput) {
                focusInput.focus();
                let val = focusInput.value;
                focusInput.value = '';
                focusInput.value = val;
            }
        }, 10);
    }
}

window.cascadeSettingRename = function(type, oldName, newName) {
    if (oldName === newName) return;

    let projIds = []; let projUpdates = {};
    let clientIds = []; let clientUpdates = {};
    let svcIds = []; let svcUpdates = {};
   
    if (type === 'mgr') {
        projUpdates.assignee = newName;
        clientUpdates.accountManager = newName;
        svcUpdates.manager = newName;
        if(typeof window.AvesdoState.data.projects!=='undefined') window.AvesdoState.data.projects.forEach(p => { if (p.assignee === oldName) { p.assignee = newName; projIds.push(p.id); } });
        if(typeof window.AvesdoState.data.clients!=='undefined') window.AvesdoState.data.clients.forEach(c => { if (c.accountManager === oldName) { c.accountManager = newName; clientIds.push(c.clientId); } });
        if(typeof window.AvesdoState.data.services!=='undefined') window.AvesdoState.data.services.forEach(s => { if (s.manager === oldName) { s.manager = newName; svcIds.push(s.id); } });
    }
    else if (type === 'status') {
        projUpdates.projectStatus = newName;
        if(typeof window.AvesdoState.data.projects!=='undefined') window.AvesdoState.data.projects.forEach(p => { if (p.projectStatus === oldName) { p.projectStatus = newName; projIds.push(p.id); } });
    }
    else if (type === 'tl') {
        projUpdates.timelineStatus = newName;
        if(typeof window.AvesdoState.data.projects!=='undefined') window.AvesdoState.data.projects.forEach(p => { if (p.timelineStatus === oldName) { p.timelineStatus = newName; projIds.push(p.id); } });
    }
    else if (type === 'phase') {
        projUpdates.onboardingPhase = newName;
        if(typeof window.AvesdoState.data.projects!=='undefined') window.AvesdoState.data.projects.forEach(p => { if (p.onboardingPhase === oldName) { p.onboardingPhase = newName; projIds.push(p.id); } });
    }
    else if (type === 'ctype') {
        clientUpdates.clientType = newName;
        if(typeof window.AvesdoState.data.clients!=='undefined') window.AvesdoState.data.clients.forEach(c => { if (c.clientType === oldName) { c.clientType = newName; clientIds.push(c.clientId); } });
    }
    else if (type === 'svcout') {
        svcUpdates.outcome = newName;
        if(typeof window.AvesdoState.data.services!=='undefined') window.AvesdoState.data.services.forEach(s => { if (s.outcome === oldName) { s.outcome = newName; svcIds.push(s.id); } });
    }
    else if (type === 'svcstat') {
        svcUpdates.status = newName;
        if(typeof window.AvesdoState.data.services!=='undefined') window.AvesdoState.data.services.forEach(s => { if (s.status === oldName) { s.status = newName; svcIds.push(s.id); } });
    }
    else if (type === 'svc') {
        svcUpdates.name = newName;
        if(typeof window.AvesdoState.data.services!=='undefined') window.AvesdoState.data.services.forEach(s => { if (s.name === oldName) { s.name = newName; svcIds.push(s.id); } });
    }

    else if (type === 'feat') {
        let syncDelay = 0;
        let featuresUpdatedCount = 0;
        if(typeof window.AvesdoState.data.projects!=='undefined') {
            window.AvesdoState.data.projects.forEach(p => {
                if (p.features && p.features.includes(oldName)) {
                    let fIdx = p.features.indexOf(oldName);
                    p.features[fIdx] = newName;
                    setTimeout(() => { if(typeof window.syncProject === 'function') window.syncProject(p.id); }, syncDelay);
                    syncDelay += 800;
                    featuresUpdatedCount++;
                }
            });
        }
        if (featuresUpdatedCount > 0 && typeof window.showSyncToast === 'function') {
            window.showSyncToast(`Cascading feature rename to ${featuresUpdatedCount} projects...`, true);
            setTimeout(() => { window.showSyncToast("Feature cascaded successfully!", false, false); }, syncDelay + 1000);
        }
        return; 
    }

    let totalUpdates = projIds.length + clientIds.length + svcIds.length;

    if (totalUpdates > 0) {
        if (typeof window.showSyncToast === 'function') window.showSyncToast(`Cascading name change to ${totalUpdates} records...`, true);
       
        let payload = {
            projIds: projIds, projUpdates: projUpdates,
            clientIds: clientIds, clientUpdates: clientUpdates,
            svcIds: svcIds, svcUpdates: svcUpdates
        };
       
        google.script.run
            .withSuccessHandler(() => {
                window.showSyncToast("Settings cascaded successfully!", false, false);
                google.script.run.withSuccessHandler(t => window.lastKnownSync = t).checkGlobalTimestamp();
            })
            .withFailureHandler((err) => {
                if (err.message === "SYNC_CONFLICT") {
                    window.showSyncToast(`Conflict: Records were modified by someone else. Refreshing...`, false, true);
                    if(typeof window.runSyncCheck === 'function') window.runSyncCheck(true);
                } else {
                    window.showSyncToast(`Failed to cascade updates.`, false, true);
                }
            })
            .cascadeSettingsUpdate(payload, window.lastKnownSync);
    }
};

window.startSettingEdit = function(type, idx) { window.editingSetting = { key: type, idx: idx }; window.deletingSetting = { key: null, idx: -1 }; window.renderSettingsList(type); }
window.cancelSettingEdit = function() { let type = window.editingSetting.key; window.editingSetting = { key: null, idx: -1 }; if(type) window.renderSettingsList(type); }
window.startSettingDelete = function(type, idx) { window.deletingSetting = { key: type, idx: idx }; window.editingSetting = { key: null, idx: -1 }; window.renderSettingsList(type); }
window.cancelSettingDelete = function() { let type = window.deletingSetting.key; window.deletingSetting = { key: null, idx: -1 }; if(type) window.renderSettingsList(type); }

window.moveSetting = function(type, idx, direction) {
    if (['svcout', 'svcstat'].includes(type)) {
        let cat = type === 'svcout' ? 'ServiceOutcome' : 'ServiceStatus';
        let items = window.AvesdoState.settings.settingsData.filter(s => s.category === cat);
        let actualItem = items[idx];
        let globalIndex = window.AvesdoState.settings.settingsData.findIndex(s => s.category === cat && s.name === actualItem.name);
        
        let swapItem = items[idx + direction];
        if (!swapItem) return;
        let targetGlobalIndex = window.AvesdoState.settings.settingsData.findIndex(s => s.category === cat && s.name === swapItem.name);
        
        if (globalIndex !== -1 && targetGlobalIndex !== -1) {
            let temp = window.AvesdoState.settings.settingsData[globalIndex];
            window.AvesdoState.settings.settingsData[globalIndex] = window.AvesdoState.settings.settingsData[targetGlobalIndex];
            window.AvesdoState.settings.settingsData[targetGlobalIndex] = temp;
        }
    } else {
        let arr = getSettingsArray(type);
        if (idx + direction < 0 || idx + direction >= arr.length) return;
        let temp = arr[idx];
        arr[idx] = arr[idx + direction];
        arr[idx + direction] = temp;
    }
    window.renderSettingsList(type);
    if(typeof window.pushSettingsToServer === 'function') window.pushSettingsToServer(true);
};

window.saveSettingEdit = function(type, idx) {
    let newName = document.getElementById(`edit-name-${type}-${idx}`).value.trim();
    if (!newName) return;
    let oldName = '';
    
    if (['status', 'tl', 'phase', 'svcout', 'svcstat', 'mgr', 'ctype', 'svctype'].includes(type)) {
        let newColor = document.getElementById(`edit-color-${type}-${idx}`).value;
        let iconEl = document.getElementById(`edit-icon-${type}-${idx}`);
        let newIcon = iconEl ? iconEl.value : (type === 'mgr' ? 'user' : 'circle-dashed');
        
        let cat = type === 'svcout' ? 'ServiceOutcome' : (type === 'svcstat' ? 'ServiceStatus' : '');
        if (cat) {
            let items = window.AvesdoState.settings.settingsData.filter(s => s.category === cat);
            let actualItem = items[idx];
            oldName = actualItem.name;
            let globalIndex = window.AvesdoState.settings.settingsData.findIndex(s => s.category === cat && s.name === oldName);
            if (globalIndex !== -1) {
                window.AvesdoState.settings.settingsData[globalIndex].name = newName;
                window.AvesdoState.settings.settingsData[globalIndex].attribute = newColor;
                window.AvesdoState.settings.settingsData[globalIndex].color = newColor;
                window.AvesdoState.settings.settingsData[globalIndex].icon = newIcon;
            }
        } else {
            let arr = getSettingsArray(type);
            oldName = arr[idx].name;
            arr[idx].name = newName;
            arr[idx].color = newColor;
            arr[idx].icon = newIcon;
        }
    } else if (type === 'svc') {
        let arr = getSettingsArray(type);
        oldName = arr[idx].name;
        let newPrice = document.getElementById(`edit-price-${type}-${idx}`).value;
        arr[idx] = { name: newName, price: newPrice };
    } else {
        let arr = getSettingsArray(type);
        oldName = arr[idx];
        arr[idx] = newName;
    }

    window.cascadeSettingRename(type, oldName, newName);
    window.editingSetting = { key: null, idx: -1 };
    window.renderSettingsList(type);
    if(typeof window.pushSettingsToServer === 'function') window.pushSettingsToServer(true);
};

window.confirmSettingDelete = function(type, idx) {
    let oldName = '';
    
    if (['svcout', 'svcstat'].includes(type)) {
        let cat = type === 'svcout' ? 'ServiceOutcome' : 'ServiceStatus';
        let items = window.AvesdoState.settings.settingsData.filter(s => s.category === cat);
        let actualItem = items[idx];
        oldName = actualItem.name;
        let globalIndex = window.AvesdoState.settings.settingsData.findIndex(s => s.category === cat && s.name === oldName);
        if (globalIndex !== -1) {
            window.AvesdoState.settings.settingsData.splice(globalIndex, 1);
        }
    } else {
        let arr = getSettingsArray(type);
        if (['status', 'tl', 'phase', 'mgr', 'ctype', 'svctype', 'svc'].includes(type)) {
            oldName = arr[idx].name;
        } else {
            oldName = arr[idx];
        }
        arr.splice(idx, 1);
    }
    
    window.deletingSetting = { key: null, idx: -1 };
    window.renderSettingsList(type);
    if(typeof window.pushSettingsToServer === 'function') window.pushSettingsToServer(true);
};

window.addSettingItem = function(type) {
    let inputEl = document.getElementById('set-new-' + type);
    if(!inputEl) return;
    let val = inputEl.value.trim();
    if(!val) return;

    if (['svcout', 'svcstat'].includes(type)) {
        let colorInput = document.getElementById('set-color-' + type);
        let color = colorInput ? colorInput.value : 'slate';
        let iconInput = document.getElementById('set-icon-' + type);
        let icon = iconInput ? iconInput.value : (window.iconMap[color] || 'circle-dashed');
        
        let cat = type === 'svcout' ? 'ServiceOutcome' : 'ServiceStatus';
        let newItemData = { category: cat, name: val, attribute: color, color: color, icon: icon };
        if(!window.AvesdoState.settings.settingsData) window.AvesdoState.settings.settingsData = [];
        window.AvesdoState.settings.settingsData.push(newItemData);
    } else {
        let arr = getSettingsArray(type);
        if(!arr) return;
        
        if (['status', 'tl', 'phase', 'mgr', 'ctype', 'svctype'].includes(type)) {
            let colorInput = document.getElementById('set-color-' + type);
            let color = colorInput ? colorInput.value : 'slate';
            let iconInput = document.getElementById('set-icon-' + type);
            let icon = iconInput ? iconInput.value : (type === 'mgr' ? 'user' : (window.iconMap[color] || 'circle-dashed'));
            
            let newItem = { name: val, color: color, icon: icon };
            arr.push(newItem);
        } else if (type === 'svc') {
            let priceEl = document.getElementById(`set-new-${type}-price`);
            arr.push({ name: val, price: priceEl && priceEl.value ? priceEl.value : 0 });
            if(priceEl) priceEl.value = '';
        } else {
            arr.push(val);
        }
    }

    inputEl.value = '';
    window.renderSettingsList(type);
    if(typeof window.pushSettingsToServer === 'function') window.pushSettingsToServer(true);
};

window.updateScoreLabels = function() {
    let wFin = parseInt(document.getElementById('set-w-fin').value) || 0;
    let wEng = parseInt(document.getElementById('set-w-eng').value) || 0;
    let wUtil = parseInt(document.getElementById('set-w-util').value) || 0;
    let wCsat = parseInt(document.getElementById('set-w-csat').value) || 0;
    let totalClient = wFin + wEng + wUtil + wCsat;
    if(document.getElementById('lbl-w-fin')) document.getElementById('lbl-w-fin').innerText = wFin + '%';
    if(document.getElementById('lbl-w-eng')) document.getElementById('lbl-w-eng').innerText = wEng + '%';
    if(document.getElementById('lbl-w-util')) document.getElementById('lbl-w-util').innerText = wUtil + '%';
    if(document.getElementById('lbl-w-csat')) document.getElementById('lbl-w-csat').innerText = wCsat + '%';
    let tLblC = document.getElementById('lbl-w-total');
    if (tLblC) {
        tLblC.innerText = 'Total: ' + totalClient + '%';
        if (totalClient !== 100) tLblC.className = 'text-sm font-semibold text-destructive';
        else tLblC.className = 'text-sm font-semibold text-lime-600';
    }

    let pwOp = parseInt(document.getElementById('set-pw-op').value) || 0;
    let pwFeat = parseInt(document.getElementById('set-pw-feat').value) || 0;
    let pwUser = parseInt(document.getElementById('set-pw-user').value) || 0;
    let pwCsat = parseInt(document.getElementById('set-pw-csat').value) || 0;
    let totalProj = pwOp + pwFeat + pwUser + pwCsat;

    if(document.getElementById('lbl-pw-op')) document.getElementById('lbl-pw-op').innerText = pwOp + '%';
    if(document.getElementById('lbl-pw-feat')) document.getElementById('lbl-pw-feat').innerText = pwFeat + '%';
    if(document.getElementById('lbl-pw-user')) document.getElementById('lbl-pw-user').innerText = pwUser + '%';
    if(document.getElementById('lbl-pw-csat')) document.getElementById('lbl-pw-csat').innerText = pwCsat + '%';
    let tLblP = document.getElementById('lbl-pw-total');
    const btn = document.getElementById('btn-save-weights');
   
    if (tLblP) {
        tLblP.innerText = 'Total: ' + totalProj + '%';
        if (totalProj !== 100) tLblP.className = 'text-sm font-semibold text-destructive';
        else tLblP.className = 'text-sm font-semibold text-lime-600';
    }

    if (btn) {
        if (totalClient === 100 && totalProj === 100) {
            btn.disabled = false;
            btn.classList.remove('opacity-50', 'cursor-not-allowed');
        } else {
            btn.disabled = true;
            btn.classList.add('opacity-50', 'cursor-not-allowed');
        }
    }
}

window.saveScoringWeights = function() {
    let wFin = parseInt(document.getElementById('set-w-fin').value) || 0;
    let wEng = parseInt(document.getElementById('set-w-eng').value) || 0;
    let wUtil = parseInt(document.getElementById('set-w-util').value) || 0;
    let wCsat = parseInt(document.getElementById('set-w-csat').value) || 0;
    if (wFin + wEng + wUtil + wCsat !== 100) {
        if(typeof window.showToast === 'function') window.showToast("Client weights must equal 100%", "error");
        return;
    }

    let pwOp = parseInt(document.getElementById('set-pw-op').value) || 0;
    let pwFeat = parseInt(document.getElementById('set-pw-feat').value) || 0;
    let pwUser = parseInt(document.getElementById('set-pw-user').value) || 0;
    let pwCsat = parseInt(document.getElementById('set-pw-csat').value) || 0;
    if (pwOp + pwFeat + pwUser + pwCsat !== 100) {
         if(typeof window.showToast === 'function') window.showToast("Project weights must equal 100%", "error");
         return;
    }

    window.AvesdoState.settings.scoring.clientWeights = { billing: wFin, engagement: wEng, utilization: wUtil, experience: wCsat };
    window.AvesdoState.settings.scoring.weights = { opActivity: pwOp, featAdoption: pwFeat, userVol: pwUser, csat: pwCsat };
   
    if(typeof window.showToast === 'function') window.showToast("Weights updated successfully");
    if(typeof window.pushSettingsToServer === 'function') window.pushSettingsToServer(true);
}

window.saveThresholds = function() {
    let h = parseInt(document.getElementById('set-t-healthy').value) || 80;
    let r = parseInt(document.getElementById('set-t-risk').value) || 50;
    if (r >= h) {
         if(typeof window.showToast === 'function') window.showToast("Risk threshold must be strictly less than Healthy threshold.", "error");
         return;
    }

    window.AvesdoState.settings.scoring.thresholds = { healthy: h, warning: r };
    if(typeof window.showToast === 'function') window.showToast("Thresholds updated successfully");
    if(typeof window.pushSettingsToServer === 'function') window.pushSettingsToServer(true);
}

let settingsSaveTimer = null;
window.pushSettingsToServer = function(recalcScores = false) {
    if (typeof window.showSyncToast === 'function') window.showSyncToast("Syncing settings...", true);
    let payload = {
        managers: window.AvesdoState.settings.managers,
        clientTypes: window.AvesdoState.settings.clientTypes,
        features: window.AvesdoState.settings.features,
        services: window.AvesdoState.settings.services,
        serviceTypes: window.AvesdoState.settings.serviceTypes,
        statuses: window.AvesdoState.settings.statuses,
        timelines: window.AvesdoState.settings.timelines,
        phases: window.AvesdoState.settings.phases,
        scoring: window.AvesdoState.settings.scoring,
        settingsData: window.AvesdoState.settings.settingsData
    };

    clearTimeout(settingsSaveTimer);
    settingsSaveTimer = setTimeout(() => {
        google.script.run
            .withSuccessHandler((res) => {
                if (res.success) {
                    if (typeof window.hideSyncToast === 'function') window.hideSyncToast("Settings Saved");
                    google.script.run.withSuccessHandler(t => window.lastKnownSync = t).checkGlobalTimestamp();

                    pt_managers = window.AvesdoState.settings.managers.map(m => typeof m === 'string' ? m : m.name);
                    globalTypes = window.AvesdoState.settings.clientTypes.map(c => typeof c === 'string' ? c : c.name);
                    pt_statuses = window.AvesdoState.settings.statuses.map(s => s.name);
                    pt_timelines = window.AvesdoState.settings.timelines.map(s => s.name);
                    pt_phases = window.AvesdoState.settings.phases.map(s => s.name);
                    pt_features = window.AvesdoState.settings.features;
                    pt_services = window.AvesdoState.settings.services;

                    if (typeof window.setupPtPopovers === 'function') window.setupPtPopovers();
                    if (typeof window.populateClientDropdowns === 'function') window.populateClientDropdowns();
                    if (typeof window.populateServiceDropdowns === 'function') window.populateServiceDropdowns();

                    if (recalcScores) {
                        if(typeof window.calculateAllScores === 'function') window.calculateAllScores();
                        if(typeof window.applyFiltersAndSort === 'function') window.applyFiltersAndSort();
                        if(typeof window.renderProjectTracker === 'function') window.renderProjectTracker();
                        if(typeof window.renderDashboard === 'function') window.renderDashboard();
                        if(typeof window.renderServiceLedger === 'function') window.renderServiceLedger();
                    }
                } else {
                    if (typeof window.showSyncToast === 'function') window.showSyncToast("Error saving settings", false, true);
                }
            })
            .withFailureHandler((err) => {
                if (typeof window.showSyncToast === 'function') window.showSyncToast("Connection Error", false, true);
                console.error("Settings save error:", err);
            })
            .saveSettings(payload);
    }, 1500);
}
