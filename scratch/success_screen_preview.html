<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Success Screen Preview</title>
  <script src="https://cdn.tailwindcss.com"></script>
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600&display=swap" rel="stylesheet">
  <script src="https://unpkg.com/lucide@latest"></script>
  <script>
    tailwind.config = {
      theme: {
        extend: {
          fontFamily: {
            sans: ['Inter', 'sans-serif'],
          },
          colors: {
            primary: '#00bdd9',
          }
        }
      }
    }
  </script>
</head>
<body class="bg-slate-50 min-h-screen flex items-center justify-center p-6">

  <!-- Success Card -->
  <div class="bg-white rounded-2xl shadow-[0_8px_30px_rgb(0,0,0,0.04)] border border-slate-100 p-10 max-w-md w-full text-center transform transition-all duration-500 hover:-translate-y-1 hover:shadow-[0_8px_30px_rgb(0,0,0,0.08)]">
    
    <!-- Icon Container -->
    <div class="mx-auto w-20 h-20 bg-primary/10 rounded-full flex items-center justify-center mb-6">
      <i data-lucide="check-circle-2" class="w-10 h-10 text-primary"></i>
    </div>

    <!-- Typography -->
    <h2 class="text-2xl font-semibold text-slate-900 mb-3 tracking-tight">Thank You!</h2>
    <p class="text-slate-500 leading-relaxed mb-8">
      Your onboarding survey has been successfully submitted. We will review the details shortly to begin configuration.
    </p>

    <!-- Action -->
    <button class="w-full bg-primary hover:bg-[#00a7c2] text-white font-medium py-3 px-6 rounded-xl transition-colors duration-200 shadow-sm">
      Return to Dashboard
    </button>
    
  </div>

  <script>
    lucide.createIcons();
  </script>
</body>
</html>
